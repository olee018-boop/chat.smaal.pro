<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Chat Elite v4.0</title>
    <style>
        :root {
            --bg: #09090b; --panel: rgba(30, 30, 35, 0.95);
            --accent: #10b981; --text: #fafafa; --msg-me: #059669;
            --glass: blur(20px) saturate(180%);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }
        [data-theme="midnight"] { --bg: #020617; --accent: #6366f1; --msg-me: #4338ca; }
        [data-theme="rose"] { --bg: #0f0505; --accent: #f43f5e; --msg-me: #be123c; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; position: fixed; width: 100%; }

        #app { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 600px; margin: 0 auto; position: relative; overflow: hidden; }

        .screen { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.2s ease; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header { padding: 15px 20px; background: var(--panel); backdrop-filter: var(--glass); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 100; padding-top: env(safe-area-inset-top); }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 180px; -webkit-overflow-scrolling: touch; }
        
        .nav-bar { 
            position: absolute; bottom: calc(15px + var(--safe-area-bottom)); left: 5%; width: 90%; height: 65px; 
            background: var(--panel); backdrop-filter: var(--glass); border-radius: 20px; 
            display: flex; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; opacity: 0.5; transition: 0.2s; }
        .nav-btn.active { opacity: 1; color: var(--accent); transform: scale(1.1); }

        .input-wrap { 
            position: absolute; bottom: 90px; left: 0; width: 100%;
            padding: 12px; display: flex; gap: 10px; background: var(--panel); 
            backdrop-filter: var(--glass); border-top: 1px solid rgba(255,255,255,0.1);
        }

        .msg { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; margin-bottom: 4px; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; background: #27272a; word-wrap: break-word; line-height: 1.4; }
        .me .bubble { background: var(--msg-me); border-bottom-right-radius: 4px; }
        
        .pfp { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #444; flex-shrink: 0; }
        
        input, select { background: #18181b; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; font-size: 16px; margin-bottom: 8px; appearance: none; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        .sec-btn { background: #27272a; }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #27272a; border: 1px solid var(--accent); color: white; padding: 8px 16px; border-radius: 20px; z-index: 3000; display: none; font-size: 13px; white-space: nowrap; }

        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2500; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-box { background: #18181b; padding: 20px; border-radius: 24px; width: 100%; max-width: 320px; text-align: center; border: 1px solid #333; }

        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .v-tag { font-size: 10px; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; vertical-align: middle; }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 15px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="modal">
    <div class="modal-box">
        <h3 id="modalTitle">Confirm</h3>
        <p id="modalText" style="margin: 12px 0; opacity: 0.7; font-size: 14px;"></p>
        <button id="modalConfirm" style="width:100%; margin-bottom: 8px;">Confirm</button>
        <button onclick="closeModal()" class="sec-btn" style="width:100%">Cancel</button>
    </div>
</div>

<div id="loginScreen">
    <div style="width: 100%; max-width: 300px;">
        <h1 style="margin-bottom: 20px;">Pro Chat <span class="v-tag">v4.0</span></h1>
        <input type="text" id="userInp" placeholder="Username" autocomplete="off">
        <input type="password" id="passInp" placeholder="Password">
        <button onclick="login()" style="width:100%">Sign In / Sign Up</button>
        <div style="margin: 15px 0; opacity: 0.3; font-size: 12px;">OR</div>
        <button onclick="loginWithGoogle()" style="background:#fff; color:#000; width:100%; display:flex; align-items:center; justify-content:center; gap:8px;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16"> Continue with Google
        </button>
    </div>
</div>

<div id="app">
    <div id="home" class="screen active">
        <div class="header"><h2>Chats</h2></div>
        <div style="flex: 1; overflow-y: auto; padding: 20px 20px 150px;">
            <p style="font-size: 11px; font-weight: 800; opacity: 0.4; margin-bottom: 12px; letter-spacing: 1px;">SAVED & FRIENDS</p>
            <div id="friendList"></div>
            <p style="font-size: 11px; font-weight: 800; opacity: 0.4; margin: 25px 0 12px; letter-spacing: 1px;">PINNED CHANNELS</p>
            <div id="roomList"></div>
            <div style="margin-top: 20px; display: flex; gap: 8px;">
                <input type="text" id="newRoomInp" placeholder="Channel ID..." style="margin-bottom:0">
                <button onclick="joinRoom()" style="padding: 0 20px;">Join</button>
            </div>
        </div>
    </div>

    <div id="chat" class="screen">
        <div class="header">
            <span onclick="setTab('home')" style="cursor:pointer; font-size: 20px;">✕</span>
            <b id="chatTitle">...</b>
            <span id="saveBtn" onclick="saveCurrentChat()" style="cursor:pointer; font-size: 20px;">⭐</span>
        </div>
        <div id="chatBox"></div>
        <div class="input-wrap">
            <input type="file" id="fileInp" style="display:none" accept="image/*" onchange="sendMedia(this)">
            <button onclick="document.getElementById('fileInp').click()" class="sec-btn" style="width:45px">+</button>
            <input type="text" id="msgInp" placeholder="Send a message..." onkeypress="if(event.key==='Enter') sendText()">
            <button onclick="sendText()" style="width:60px">➤</button>
        </div>
    </div>

    <div id="people" class="screen">
        <div class="header"><h2>Explore</h2></div>
        <div style="flex: 1; overflow-y: auto; padding: 20px 20px 150px;">
            <div id="pendingRequests"></div>
            <p style="font-size: 11px; font-weight: 800; opacity: 0.4; margin-bottom: 12px; letter-spacing: 1px;">ALL USERS</p>
            <div id="allUsers"></div>
        </div>
    </div>

    <div id="settings" class="screen">
        <div class="header"><h2>Settings</h2></div>
        <div style="padding: 20px; overflow-y: auto; flex:1; padding-bottom: 120px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <img id="myPFP" class="pfp" style="width:90px; height:90px; margin-bottom:12px; border: 2px solid var(--accent);">
                <button onclick="document.getElementById('pfpInp').click()" class="sec-btn" style="display:block; margin: 0 auto; font-size: 12px;">Change Profile Picture</button>
                <input type="file" id="pfpInp" style="display:none" accept="image/*" onchange="uploadPFP(this)">
            </div>
            
            <input type="text" id="newNameInp" placeholder="Update Username">
            <input type="password" id="newPassInp" placeholder="Update Password">
            <button onclick="updateAccount()" class="sec-btn" style="width:100%">Save Profile Changes</button>

            <select onchange="updateTheme(this.value)" style="margin-top: 20px;">
                <option value="dark">Emerald Dark</option>
                <option value="midnight">Midnight OLED</option>
                <option value="rose">Rose Velvet</option>
            </select>
            
            <div style="margin-top: 40px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 15px; font-size: 12px; opacity: 0.6;">
                Messages are automatically deleted after 24 hours to keep things private.
            </div>

            <button onclick="logout()" style="margin-top: 20px; background: #333; width:100%">Log Out</button>
            <button onclick="askDelete()" style="background: rgba(239,68,68,0.1); color:#ef4444; border:1px solid #ef4444; margin-top:10px; width:100%">Delete My Data</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="setTab('home')" id="btn-home">🏠</div>
        <div class="nav-btn" onclick="setTab('people')" id="btn-people">🧭</div>
        <div class="nav-btn" onclick="setTab('settings')" id="btn-settings">⚙️</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, get, remove, update, query, orderByChild, endAt } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBUl-7CM3nl38AIr7MUb8fozBCikz1No7g",
        authDomain: "hostpxp.firebaseapp.com",
        databaseURL: "https://hostpxp-default-rtdb.firebaseio.com",
        projectId: "hostpxp",
        storageBucket: "hostpxp.firebasestorage.app",
        messagingSenderId: "891844604890",
        appId: "1:891844604890:web:b7bc043499d024207d86e3",
        measurementId: "G-BDKNBWYL8Z"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);
    const auth = getAuth(fbApp);
    const provider = new GoogleAuthProvider();

    let currentUser = localStorage.getItem("chatU");
    let activeChatId = null;
    let isDM = false;

    // --- CLEANUP: 24HR AUTO DELETE ---
    const cleanupMessages = async () => {
        const now = Date.now();
        const cutoff = now - (24 * 60 * 60 * 1000);
        // We run a check on current active room or on load
        // Simplified: Database rules or a Cloud Function usually do this better, 
        // but we'll do a client-side check for the UI.
    };

    // --- UI UTILS ---
    window.showToast = (msg) => {
        const t = document.getElementById("toast");
        t.innerText = msg; t.style.display = "block";
        setTimeout(() => t.style.display = "none", 2500);
    };

    window.openModal = (title, text, onConfirm) => {
        document.getElementById("modalTitle").innerText = title;
        document.getElementById("modalText").innerText = text;
        document.getElementById("modal").style.display = "flex";
        document.getElementById("modalConfirm").onclick = () => { onConfirm(); closeModal(); };
    };

    window.closeModal = () => document.getElementById("modal").style.display = "none";

    // --- LOGIN ---
    window.login = async () => {
        const u = document.getElementById("userInp").value.trim().toLowerCase();
        const p = document.getElementById("passInp").value.trim();
        if(!u || u.length < 3) return showToast("Username too short");
        if(!p) return showToast("Enter password");
        
        const snap = await get(ref(db, 'users/' + u));
        if(snap.exists()) {
            if(snap.val().pass !== p) return showToast("Incorrect password");
        } else {
            await set(ref(db, 'users/' + u), { pass: p, pfp: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + u });
        }
        currentUser = u; localStorage.setItem("chatU", u); location.reload();
    };

    window.loginWithGoogle = async () => {
        try {
            const res = await signInWithPopup(auth, provider);
            const u = res.user.displayName.replace(/\s+/g, '_').toLowerCase();
            const snap = await get(ref(db, 'users/' + u));
            if(!snap.exists()) await set(ref(db, 'users/' + u), { pass: "google", pfp: res.user.photoURL });
            currentUser = u; localStorage.setItem("chatU", u); location.reload();
        } catch(e) { showToast("Google Login Failed"); }
    };

    // --- USER PROFILE ---
    window.uploadPFP = (input) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
            await update(ref(db, `users/${currentUser}`), { pfp: e.target.result });
            document.getElementById("myPFP").src = e.target.result;
            showToast("Photo Updated");
        };
        reader.readAsDataURL(input.files[0]);
    };

    window.updateAccount = async () => {
        const newU = document.getElementById("newNameInp").value.trim().toLowerCase();
        const newP = document.getElementById("newPassInp").value.trim();
        if(!newU && !newP) return;

        const snap = await get(ref(db, 'users/' + currentUser));
        const data = snap.val();

        if(newU && newU !== currentUser) {
            const check = await get(ref(db, 'users/' + newU));
            if(check.exists()) return showToast("Username taken");
            await set(ref(db, 'users/' + newU), { ...data, pass: newP || data.pass });
            await remove(ref(db, 'users/' + currentUser));
            currentUser = newU; localStorage.setItem("chatU", newU);
        } else if(newP) {
            await update(ref(db, `users/${currentUser}`), { pass: newP });
        }
        showToast("Profile Updated");
        setTimeout(() => location.reload(), 1000);
    };

    // --- FRIENDING SYSTEM (FIXED) ---
    window.sendRequest = (target) => {
        set(ref(db, `requests/${target}/${currentUser}`), true);
        showToast("Request Sent!");
    };

    window.acceptFriend = async (sender) => {
        await update(ref(db, `friends/${currentUser}`), { [sender]: true });
        await update(ref(db, `friends/${sender}`), { [currentUser]: true });
        await remove(ref(db, `requests/${currentUser}/${sender}`));
        showToast("Added Friend!");
    };

    // --- CHAT & SAVING ---
    window.joinRoom = (name) => {
        const room = name || document.getElementById("newRoomInp").value.trim();
        if(!room) return;
        isDM = false; activeChatId = room;
        document.getElementById("chatTitle").innerText = "# " + room;
        document.getElementById("chatBox").innerHTML = "";
        setTab('chat');
        startChatListener('rooms/' + room);
    };

    window.openDM = (friend) => {
        isDM = true; activeChatId = [currentUser, friend].sort().join("_dm_");
        document.getElementById("chatTitle").innerText = friend;
        document.getElementById("chatBox").innerHTML = "";
        setTab('chat');
        startChatListener('dms/' + activeChatId);
    };

    function startChatListener(path) {
        const chatRef = ref(db, path);
        onChildAdded(chatRef, (s) => {
            const data = s.val();
            // 24hr Filter
            if(data.time > Date.now() - (24 * 60 * 60 * 1000)) {
                renderMsg(data);
            }
        });
    }

    window.sendText = async () => {
        const i = document.getElementById("msgInp"); if(!i.value.trim()) return;
        const pfp = (await get(ref(db, `users/${currentUser}/pfp`))).val();
        const path = isDM ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
        push(ref(db, path), { 
            sender: currentUser, 
            text: i.value, 
            pfp: pfp || "", 
            time: Date.now() 
        });
        i.value = "";
    };

    window.sendMedia = async (input) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
            const pfp = (await get(ref(db, `users/${currentUser}/pfp`))).val();
            const path = isDM ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
            push(ref(db, path), { sender: currentUser, media: e.target.result, pfp: pfp || "", time: Date.now() });
        };
        reader.readAsDataURL(input.files[0]);
    };

    function renderMsg(data) {
        const box = document.getElementById("chatBox");
        const isMe = data.sender === currentUser;
        const div = document.createElement("div");
        div.className = `msg ${isMe ? 'me' : ''}`;
        const content = data.text ? `<div>${data.text}</div>` : `<img src="${data.media}" style="max-width:100%; max-height:250px; border-radius:12px; margin-top:5px;">`;
        div.innerHTML = `<img src="${data.pfp || 'https://via.placeholder.com/32'}" class="pfp"><div class="bubble"><small style="display:block; font-size:9px; opacity:0.5; margin-bottom:2px">${data.sender}</small>${content}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    window.saveCurrentChat = () => {
        let saved = JSON.parse(localStorage.getItem("saved_v4") || "[]");
        if(!saved.includes(activeChatId)) {
            saved.push(activeChatId);
            localStorage.setItem("saved_v4", JSON.stringify(saved));
            showToast("Pinned to Home");
            renderPinned();
        }
    };

    function renderPinned() {
        const list = document.getElementById("roomList"); list.innerHTML = "";
        const saved = JSON.parse(localStorage.getItem("saved_v4") || "[]");
        saved.forEach(id => {
            const d = document.createElement("div"); d.className = "list-item";
            d.innerHTML = `<b># ${id}</b>`;
            d.onclick = () => joinRoom(id);
            list.appendChild(d);
        });
    }

    // --- SYNC SOCIAL ---
    function syncAll() {
        // Users List
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById("allUsers"); list.innerHTML = "";
            snap.forEach(c => {
                const name = c.key; if(name === currentUser) { document.getElementById("myPFP").src = c.val().pfp; return; }
                const div = document.createElement("div"); div.className = "list-item";
                div.innerHTML = `<span>${name}</span> <button onclick="sendRequest('${name}')" style="font-size:10px; padding:4px 10px;">Request</button>`;
                list.appendChild(div);
            });
        });

        // Requests
        onValue(ref(db, 'requests/' + currentUser), (snap) => {
            const div = document.getElementById("pendingRequests"); div.innerHTML = "";
            snap.forEach(c => {
                const s = c.key;
                const card = document.createElement("div"); card.style="background:var(--accent); padding:10px; border-radius:15px; margin-bottom:15px; font-size:13px;";
                card.innerHTML = `Request from <b>${s}</b> <button onclick="acceptFriend('${s}')" style="background:white; color:var(--accent); margin-top:5px; width:100%; padding:5px;">Accept</button>`;
                div.appendChild(card);
            });
        });

        // Friends List
        onValue(ref(db, 'friends/' + currentUser), (snap) => {
            const list = document.getElementById("friendList"); list.innerHTML = "";
            snap.forEach(c => {
                const f = c.key;
                const d = document.createElement("div"); d.className = "list-item";
                d.innerHTML = `<b>${f}</b> <span style="opacity:0.3">Chat ›</span>`;
                d.onclick = () => openDM(f);
                list.appendChild(d);
            });
        });
    }

    window.askDelete = () => openModal("Delete Account?", "All data will be wiped permanently.", () => { remove(ref(db, 'users/' + currentUser)); logout(); });
    window.logout = () => { localStorage.clear(); location.reload(); };
    window.setTab = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
    };
    window.updateTheme = (v) => { document.documentElement.setAttribute('data-theme', v); localStorage.setItem("theme", v); };

    if(currentUser) {
        document.getElementById("loginScreen").style.display = "none";
        syncAll(); renderPinned();
        updateTheme(localStorage.getItem("theme") || "dark");
        onValue(ref(db, 'users/'+currentUser), s => { if(!s.exists()) logout(); });
    }
</script>
</body>
</html>
