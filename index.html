<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Chat Elite v4.5</title>
    <style>
        :root {
            --bg: #09090b; --panel: rgba(30, 30, 35, 0.95);
            --accent: #10b981; --text: #fafafa; --msg-me: #059669;
            --glass: blur(20px) saturate(180%);
            --safe-bottom: env(safe-area-inset-bottom);
            --card: #18181b; --dev-gold: #f59e0b;
        }
        /* THEMES */
        [data-theme="light"] { --bg: #f4f4f5; --panel: rgba(255, 255, 255, 0.9); --accent: #10b981; --text: #09090b; --msg-me: #10b981; --card: #ffffff; }
        [data-theme="rumple"] { --bg: #2b1d1d; --panel: rgba(60, 40, 40, 0.95); --accent: #d97706; --text: #fde68a; --msg-me: #92400e; --card: #452b2b; }
        [data-theme="midnight"] { --bg: #020617; --accent: #6366f1; --msg-me: #4338ca; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; position: fixed; width: 100%; }

        /* IPAD & RESPONSIVE CONTAINER */
        #app { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 850px; margin: 0 auto; position: relative; overflow: hidden; border-left: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05); }

        /* IN-APP POPUP NOTIFICATIONS */
        #notifPopup { 
            position: fixed; top: -120px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 450px; background: var(--panel); backdrop-filter: var(--glass);
            padding: 16px; border-radius: 24px; border: 1px solid var(--accent);
            z-index: 5000; display: flex; align-items: center; gap: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #notifPopup.show { top: 25px; }

        .screen { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.2s ease; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .header { padding: 20px; background: var(--panel); backdrop-filter: var(--glass); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 100; padding-top: calc(10px + env(safe-area-inset-top)); }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 220px; -webkit-overflow-scrolling: touch; }
        
        .nav-bar { position: absolute; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; height: 70px; background: var(--panel); backdrop-filter: var(--glass); border-radius: 25px; display: flex; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-btn.active { opacity: 1; color: var(--accent); transform: scale(1.1); }

        .input-wrap { position: absolute; bottom: 100px; left: 0; width: 100%; padding: 15px; display: flex; gap: 12px; background: var(--panel); backdrop-filter: var(--glass); border-top: 1px solid rgba(255,255,255,0.1); }

        .msg { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg.ai { align-self: flex-start; }
        .bubble { padding: 12px 16px; border-radius: 20px; font-size: 16px; background: var(--card); border: 1px solid rgba(255,255,255,0.05); word-wrap: break-word; line-height: 1.4; }
        .me .bubble { background: var(--msg-me); border-bottom-right-radius: 4px; color: white; }
        .ai .bubble { border: 1.5px solid var(--dev-gold); border-bottom-left-radius: 4px; }
        
        .media-content { max-width: 100%; border-radius: 14px; display: block; margin-top: 8px; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .pfp { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #444; flex-shrink: 0; cursor: pointer; border: 2px solid transparent; }
        .pfp:hover { border-color: var(--accent); }
        
        input, select, textarea { background: var(--card); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 14px; border-radius: 14px; width: 100%; outline: none; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        .sec-btn { background: rgba(255,255,255,0.1); color: var(--text); }
        .dev-btn { background: var(--dev-gold); color: black; }

        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-box { background: var(--card); padding: 25px; border-radius: 30px; width: 100%; max-width: 420px; border: 1px solid rgba(255,255,255,0.1); }

        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 18px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--dev-gold); color: black; font-weight: bold; margin-left: 6px; vertical-align: middle; }
    </style>
</head>
<body>

<div id="notifPopup">
    <img id="notifImg" src="" style="width:45px; height:45px; border-radius:50%; display:none; object-fit:cover">
    <div style="flex:1">
        <b id="notifTitle" style="font-size:15px; display:block"></b>
        <span id="notifText" style="font-size:13px; opacity:0.8"></span>
    </div>
</div>

<div id="modal">
    <div class="modal-box" id="modalContent"></div>
</div>

<div id="loginScreen">
    <div style="width: 100%; max-width: 320px;">
        <h1 style="margin-bottom: 10px; font-size: 34px;">Pro Chat</h1>
        <p style="opacity: 0.4; font-size: 14px; margin-bottom: 25px;">Ultimate $v4.5$</p>
        <input type="text" id="userInp" placeholder="Username" style="margin-bottom:12px">
        <input type="password" id="passInp" placeholder="Password" style="margin-bottom:12px">
        <button onclick="login()" style="width:100%; font-size: 18px;">Sign In</button>
    </div>
</div>

<div id="app">
    <div id="home" class="screen active">
        <div class="header"><h2>Home</h2></div>
        <div style="flex: 1; overflow-y: auto; padding: 25px 25px 150px;">
            <p style="font-size: 12px; font-weight: 800; opacity: 0.4; letter-spacing: 1px; margin-bottom: 15px;">DIRECT MESSAGES</p>
            <div id="friendList"></div>
            <p style="font-size: 12px; font-weight: 800; opacity: 0.4; letter-spacing: 1px; margin: 30px 0 15px;">PINNED ROOMS</p>
            <div id="roomList"></div>
            <div style="margin-top: 25px; display: flex; gap: 10px;">
                <input type="text" id="newRoomInp" placeholder="Join Room ID..." style="margin-bottom:0">
                <button onclick="joinRoom()" style="padding: 0 20px;">Join</button>
            </div>
        </div>
    </div>

    <div id="chat" class="screen">
        <div class="header">
            <span onclick="setTab('home')" style="cursor:pointer; font-size: 26px;">✕</span>
            <b id="chatTitle">...</b>
            <span id="pinIcon" onclick="togglePin()" style="cursor:pointer; font-size: 26px;">☆</span>
        </div>
        <div id="chatBox"></div>
        <div class="input-wrap">
            <input type="file" id="mediaInp" style="display:none" accept="image/*,video/*" onchange="sendMedia(this)">
            <button onclick="document.getElementById('mediaInp').click()" class="sec-btn" style="width:50px; font-size: 22px;">+</button>
            <input type="text" id="msgInp" placeholder="Type something..." onkeypress="if(event.key==='Enter') sendText()">
            <button onclick="sendText()" style="width:70px; font-size: 22px;">➤</button>
        </div>
    </div>

    <div id="people" class="screen">
        <div class="header"><h2>Explore</h2></div>
        <div style="flex: 1; overflow-y: auto; padding: 25px 25px 150px;">
            <div id="pendingRequests"></div>
            <p style="font-size: 12px; font-weight: 800; opacity: 0.4; letter-spacing: 1px; margin-bottom: 15px;">COMMUNITY</p>
            <div id="allUsers"></div>
        </div>
    </div>

    <div id="settings" class="screen">
        <div class="header"><h2>Settings</h2></div>
        <div style="padding: 25px; overflow-y: auto; flex:1; padding-bottom: 150px;">
            <div style="text-align: center; margin-bottom: 25px;">
                <img id="myPFP" class="pfp" style="width:90px; height:90px; border: 4px solid var(--accent); margin-bottom: 10px;">
                <h3 id="setDisplayName"></h3>
                <p id="setHandle" style="opacity:0.4; font-size:13px"></p>
            </div>

            <div id="devSection" style="display:none; background: rgba(245, 158, 11, 0.1); border: 1.5px solid var(--dev-gold); padding: 18px; border-radius: 22px; margin-bottom: 20px;">
                <h4 style="color: var(--dev-gold); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;">🛠 Bot Developer Lab</h4>
                <p style="font-size:11px; margin-bottom:12px; opacity:0.7">API Key Active: <code style="background:#000; padding:2px 5px">gsk_08M1...WqVq</code></p>
                <button onclick="openBotLab()" class="dev-btn" style="width:100%">Create AI Bot</button>
            </div>
            
            <p style="font-size:11px; opacity:0.5; margin-bottom:8px">APPEARANCE</p>
            <select id="themeSelect" onchange="changeTheme(this.value)" style="margin-bottom:20px">
                <option value="dark">Dark Mode</option>
                <option value="light">Light Mode</option>
                <option value="rumple">Rumple Style</option>
                <option value="midnight">Midnight Indigo</option>
            </select>
            <button onclick="logout()" style="background: #333; width:100%; opacity: 0.8;">Sign Out</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="setTab('home')" id="btn-home">🏠</div>
        <div class="nav-btn" onclick="setTab('people')" id="btn-people">🧭</div>
        <div class="nav-btn" onclick="setTab('settings')" id="btn-settings">⚙️</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, get, remove, update } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBUl-7CM3nl38AIr7MUb8fozBCikz1No7g",
        authDomain: "hostpxp.firebaseapp.com",
        databaseURL: "https://hostpxp-default-rtdb.firebaseio.com",
        projectId: "hostpxp",
        storageBucket: "hostpxp.firebasestorage.app",
        messagingSenderId: "891844604890",
        appId: "1:891844604890:web:b7bc043499d024207d86e3"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);
    const GROK_KEY = "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";

    let currentUser = localStorage.getItem("chatU");
    let userData = null;
    let activeChatId = null;

    // --- NOTIFICATION ENGINE ---
    window.triggerNotif = (title, text, img = null) => {
        const p = document.getElementById("notifPopup");
        const i = document.getElementById("notifImg");
        document.getElementById("notifTitle").innerText = title;
        document.getElementById("notifText").innerText = text;
        if(img) { i.src = img; i.style.display = "block"; } else { i.style.display = "none"; }
        p.classList.add("show");
        setTimeout(() => p.classList.remove("show"), 4500);
    };

    // --- AUTH & SYNC ---
    window.login = async () => {
        const u = document.getElementById("userInp").value.trim().toLowerCase();
        const p = document.getElementById("passInp").value.trim();
        if(!u || !p) return;

        const snap = await get(ref(db, 'users/' + u));
        if(!snap.exists()) {
            await set(ref(db, 'users/' + u), { 
                pass: p, displayName: u, isDev: false,
                pfp: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + u 
            });
        } else if (snap.val().pass !== p) {
            return triggerNotif("Security", "Incorrect password for this user.");
        }
        
        currentUser = u; localStorage.setItem("chatU", u); location.reload();
    };

    // --- GROK AI INTEGRATION ---
    async function getGrokResponse(prompt, personality) {
        try {
            const res = await fetch("https://api.x.ai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${GROK_KEY}`
                },
                body: JSON.stringify({
                    model: "grok-beta",
                    messages: [
                        { role: "system", content: `Your name is a Bot. Personality: ${personality}. Keep replies relatively concise.` },
                        { role: "user", content: prompt }
                    ]
                })
            });
            const data = await res.json();
            return data.choices[0].message.content;
        } catch (e) { return "Grok Error: Connection failed."; }
    }

    // --- MEDIA & MESSAGING ---
    window.sendMedia = (input) => {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        const type = file.type.startsWith('video') ? 'video' : 'image';
        reader.onload = async (e) => {
            const path = activeChatId.includes("_dm_") ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
            push(ref(db, path), {
                sender: currentUser, senderName: userData.displayName || currentUser,
                media: e.target.result, mediaType: type,
                pfp: userData.pfp || "", time: Date.now()
            });
        };
        reader.readAsDataURL(file);
    };

    window.sendText = async () => {
        const i = document.getElementById("msgInp");
        const txt = i.value.trim();
        if(!txt || !activeChatId) return;

        const path = activeChatId.includes("_dm_") ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
        push(ref(db, path), { 
            sender: currentUser, senderName: userData.displayName || currentUser,
            text: txt, pfp: userData.pfp || "", time: Date.now() 
        });
        i.value = "";

        // Bot Trigger Logic
        const botSnap = await get(ref(db, 'bots'));
        if(botSnap.exists()) {
            botSnap.forEach(async (b) => {
                const bot = b.val();
                if(bot.activeRoom === activeChatId) {
                    const aiReply = await getGrokResponse(txt, bot.personality);
                    push(ref(db, path), {
                        sender: "bot_" + bot.name, senderName: bot.name,
                        text: aiReply, pfp: "https://api.dicebear.com/7.x/bottts/svg?seed=" + bot.name,
                        time: Date.now(), isAI: true
                    });
                }
            });
        }
    };

    function renderMsg(d) {
        const box = document.getElementById("chatBox");
        const isMe = d.sender === currentUser;
        const div = document.createElement("div"); 
        div.className = `msg ${isMe ? 'me' : (d.isAI ? 'ai' : '')}`;
        
        let content = d.text || "";
        if(d.media) {
            content = d.mediaType === 'video' 
                ? `<video src="${d.media}" controls class="media-content"></video>` 
                : `<img src="${d.media}" class="media-content" onclick="window.open('${d.media}')">`;
        }

        div.innerHTML = `<img src="${d.pfp}" class="pfp"><div class="bubble"><small style="display:block; font-size:10px; opacity:0.5; margin-bottom:2px">${d.senderName}</small>${content}</div>`;
        box.appendChild(div); box.scrollTop = box.scrollHeight;
    }

    // --- ADMIN / DEV LOGIC ---
    window.toggleDevStatus = async (uid, currentStatus) => {
        if(currentUser !== 'owen lee') return;
        await update(ref(db, `users/${uid}`), { isDev: !currentStatus });
        triggerNotif("Permissions", `${uid} dev status is now ${!currentStatus}`);
    };

    window.openBotLab = () => {
        const m = document.getElementById("modal");
        document.getElementById("modalContent").innerHTML = `
            <h3>🤖 Bot Developer Lab</h3>
            <p style="font-size:12px; margin-bottom:15px; opacity:0.6">Program an AI to monitor a specific room ID.</p>
            <input type="text" id="botName" placeholder="Bot Name" style="margin-bottom:10px">
            <textarea id="botPers" placeholder="Define Personality (e.g. You are a helpful space explorer)" style="height:80px; margin-bottom:10px"></textarea>
            <input type="text" id="botRoom" placeholder="Target Room ID" style="margin-bottom:12px">
            <button onclick="saveBot()" style="width:100%; margin-bottom:10px">Deploy Bot Instance</button>
            <button onclick="document.getElementById('modal').style.display='none'" class="sec-btn" style="width:100%">Cancel</button>
        `;
        m.style.display = "flex";
    };

    window.saveBot = async () => {
        const name = document.getElementById("botName").value;
        const personality = document.getElementById("botPers").value;
        const room = document.getElementById("botRoom").value;
        if(!name || !personality || !room) return triggerNotif("Error", "Missing fields");
        await push(ref(db, 'bots'), { name, personality, activeRoom: room, creator: currentUser });
        document.getElementById("modal").style.display = "none";
        triggerNotif("Bot Online", `${name} has joined #${room}`);
    };

    // --- CORE LISTENERS ---
    function initListeners() {
        onValue(ref(db, `users/${currentUser}`), (s) => {
            userData = s.val();
            document.getElementById("setDisplayName").innerText = userData.displayName;
            document.getElementById("setHandle").innerText = "@" + currentUser;
            document.getElementById("myPFP").src = userData.pfp;
            if(userData.isDev) document.getElementById("devSection").style.display = "block";
        });

        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById("allUsers"); list.innerHTML = "";
            snap.forEach(c => {
                const id = c.key; if(id === currentUser) return;
                const div = document.createElement("div"); div.className = "list-item";
                let devBtn = (currentUser === 'owen lee') ? `<button class="dev-btn" style="padding:6px; font-size:10px" onclick="toggleDevStatus('${id}', ${c.val().isDev})">${c.val().isDev ? 'Revoke' : 'Grant'} Dev</button>` : '';
                div.innerHTML = `<div><b>${c.val().displayName}</b> ${c.val().isDev ? '<span class="badge">DEV</span>':''}</div> <div style="display:flex; gap:8px">${devBtn} <button onclick="sendReq('${id}')" style="padding:6px 12px; font-size:11px">Add</button></div>`;
                list.appendChild(div);
            });
        });

        onValue(ref(db, 'friends/' + currentUser), (snap) => {
            const list = document.getElementById("friendList"); list.innerHTML = "";
            snap.forEach(c => {
                const d = document.createElement("div"); d.className = "list-item";
                d.innerHTML = `<b>${c.key}</b> <span>💬</span>`; d.onclick = () => openDM(c.key);
                list.appendChild(d);
            });
        });

        onValue(ref(db, `notifs/${currentUser}`), (s) => {
            s.forEach(n => {
                triggerNotif("Alert", n.val().text);
                remove(ref(db, `notifs/${currentUser}/${n.key}`));
            });
        });
    }

    // --- NAVIGATION ---
    window.joinRoom = (n) => {
        const r = n || document.getElementById("newRoomInp").value.trim(); if(!r) return;
        activeChatId = r; document.getElementById("chatTitle").innerText = "# " + r;
        document.getElementById("chatBox").innerHTML = ""; setTab('chat');
        onChildAdded(ref(db, 'rooms/' + r), (s) => renderMsg(s.val()));
    };

    window.openDM = async (f) => {
        activeChatId = [currentUser, f].sort().join("_dm_");
        document.getElementById("chatTitle").innerText = "DM: " + f; 
        document.getElementById("chatBox").innerHTML = ""; setTab('chat');
        onChildAdded(ref(db, 'dms/' + activeChatId), (s) => renderMsg(s.val()));
    };

    window.sendReq = (t) => { set(ref(db, `requests/${t}/${currentUser}`), true); triggerNotif("Sent", "Friend request sent to " + t); };
    window.changeTheme = (t) => { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('userTheme', t); };
    
    window.setTab = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
    };

    window.logout = () => { localStorage.clear(); location.reload(); };

    if(currentUser) {
        document.getElementById("loginScreen").style.display = "none";
        initListeners();
        changeTheme(localStorage.getItem('userTheme') || 'dark');
        document.getElementById("themeSelect").value = localStorage.getItem('userTheme') || 'dark';
    }
</script>
</body>
</html>
