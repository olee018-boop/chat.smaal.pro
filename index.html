<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Chat Elite</title>
    <style>
        :root {
            --bg: #09090b; --panel: rgba(30, 30, 35, 0.9);
            --accent: #10b981; --text: #fafafa; --msg-me: #059669;
            --glass: blur(15px) saturate(160%);
        }
        [data-theme="midnight"] { --bg: #020617; --accent: #6366f1; --msg-me: #4338ca; }
        [data-theme="rose"] { --bg: #0f0505; --accent: #f43f5e; --msg-me: #be123c; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        #app { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 500px; margin: 0 auto; position: relative; }

        .screen { display: none; flex-direction: column; height: 100%; padding-bottom: 80px; animation: fade 0.2s ease; }
        .screen.active { display: flex; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        .header { padding: 15px 20px; background: var(--panel); backdrop-filter: var(--glass); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .nav-bar { position: absolute; bottom: 15px; left: 5%; width: 90%; height: 60px; background: var(--panel); backdrop-filter: var(--glass); border-radius: 20px; display: flex; border: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; opacity: 0.5; }
        .nav-btn.active { opacity: 1; color: var(--accent); }

        .msg { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; background: #27272a; word-wrap: break-word; }
        .me .bubble { background: var(--msg-me); border-bottom-right-radius: 4px; }
        
        .pfp { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #444; flex-shrink: 0; }
        input, select { background: #18181b; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; outline: none; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        button.sec { background: #27272a; margin-top: 5px; }

        .request-card { background: #1e1e21; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--accent); }
        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div style="width: 100%; max-width: 300px;">
        <h1 style="margin-bottom: 20px;">Pro Chat</h1>
        <input type="text" id="userInp" placeholder="Username">
        <input type="password" id="passInp" placeholder="Password">
        <button onclick="login()">Enter App</button>
    </div>
</div>

<div id="app">
    <div id="home" class="screen active">
        <div class="header"><h2>Messages</h2></div>
        <div style="padding: 20px; overflow-y: auto;">
            <p style="font-size: 12px; opacity: 0.5; margin-bottom: 10px;">FRIENDS & DMS</p>
            <div id="friendList"></div>
            <p style="font-size: 12px; opacity: 0.5; margin-top: 20px; margin-bottom: 10px;">SAVED GROUPS</p>
            <div id="roomList"></div>
            <input type="text" id="newRoomInp" placeholder="Join Group ID..." style="margin-top:20px">
            <button onclick="joinRoom()">Join Group</button>
        </div>
    </div>

    <div id="chat" class="screen">
        <div class="header">
            <span onclick="setTab('home')" style="cursor:pointer">‹ Back</span>
            <b id="chatTitle">Room</b>
            <span id="saveBtn" onclick="saveRoom()" style="cursor:pointer">⭐</span>
        </div>
        <div id="chatBox"></div>
        <div style="padding: 10px; display: flex; gap: 8px; background: var(--panel);">
            <input type="file" id="fileInp" style="display:none" onchange="sendMedia(this)">
            <button onclick="document.getElementById('fileInp').click()" style="width:45px">+</button>
            <input type="text" id="msgInp" placeholder="Message..." style="margin:0" onkeypress="if(event.key==='Enter') sendText()">
            <button onclick="sendText()" style="width:60px">➤</button>
        </div>
    </div>

    <div id="people" class="screen">
        <div class="header"><h2>Community</h2></div>
        <div style="padding: 20px;">
            <div id="pendingRequests"></div>
            <p style="font-size: 12px; opacity: 0.5; margin-bottom: 10px;">ALL USERS</p>
            <div id="allUsers"></div>
        </div>
    </div>

    <div id="settings" class="screen">
        <div class="header"><h2>Settings</h2></div>
        <div style="padding: 20px;">
            <div style="text-align: center; margin-bottom: 20px;">
                <img id="myPFP" class="pfp" style="width:80px; height:80px; margin-bottom:10px">
                <button onclick="document.getElementById('pfpInp').click()" class="sec">Change Photo</button>
                <input type="file" id="pfpInp" style="display:none" onchange="uploadPFP(this)">
            </div>
            
            <label>Display Name</label>
            <input type="text" id="newNameInp" placeholder="New Username">
            <button onclick="changeUsername()" class="sec">Update Name</button>

            <div style="margin-top: 20px;">
                <label>Theme</label>
                <select onchange="updateTheme(this.value)">
                    <option value="dark">Emerald</option>
                    <option value="midnight">Midnight</option>
                    <option value="rose">Rose</option>
                </select>
            </div>
            <button onclick="logout()" style="margin-top: 30px; background: #ef4444;">Logout</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="setTab('home')" id="btn-home">🏠</div>
        <div class="nav-btn" onclick="setTab('people')" id="btn-people">👥</div>
        <div class="nav-btn" onclick="setTab('settings')" id="btn-settings">⚙️</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, get, remove } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBhVAzRtPGuaFkhdT0wgvoLSEME7hYxOwY",
        authDomain: "mychatapp-10a99.firebaseapp.com",
        projectId: "mychatapp-10a99",
        databaseURL: "https://mychatapp-10a99-default-rtdb.firebaseio.com/"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);
    let currentUser = localStorage.getItem("chatU");
    let activeChatId = null;
    let isDM = false;

    // --- Auth & Security ---
    window.login = async () => {
        const u = document.getElementById("userInp").value.trim();
        const p = document.getElementById("passInp").value.trim();
        if(!u || !p) return;

        const uRef = ref(db, 'users/' + u);
        const snap = await get(uRef);

        if(snap.exists()) {
            if(snap.val().pass !== p && (u.toLowerCase() !== 'owen' || p.toLowerCase() !== 'owen')) {
                return alert("Username taken or wrong password.");
            }
        } else {
            await set(uRef, { pass: p, pfp: "https://api.dicebear.com/7.x/bottts/svg?seed=" + u });
        }

        currentUser = u;
        localStorage.setItem("chatU", u);
        location.reload();
    };

    async function checkAccountStatus() {
        if(!currentUser) return;
        const snap = await get(ref(db, 'users/' + currentUser));
        if(!snap.exists()) logout(); // Kick if deleted
    }

    // --- Chat Logic ---
    window.joinRoom = (name) => {
        const roomName = name || document.getElementById("newRoomInp").value.trim();
        if(!roomName) return;
        isDM = false; activeChatId = roomName;
        document.getElementById("chatTitle").innerText = "# " + roomName;
        document.getElementById("saveBtn").style.display = "inline";
        startChatSession('rooms/' + roomName);
    };

    window.openDM = (friend) => {
        isDM = true;
        activeChatId = [currentUser, friend].sort().join("_");
        document.getElementById("chatTitle").innerText = "@ " + friend;
        document.getElementById("saveBtn").style.display = "none";
        startChatSession('dms/' + activeChatId);
    };

    function startChatSession(path) {
        document.getElementById("chatBox").innerHTML = "";
        setTab('chat');
        const chatRef = ref(db, path);
        onChildAdded(chatRef, (s) => renderMsg(s.val()));
    }

    window.sendText = () => {
        const i = document.getElementById("msgInp");
        if(!i.value) return;
        const path = isDM ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
        push(ref(db, path), { name: currentUser, text: i.value, pfp: localStorage.getItem("pfp") });
        i.value = "";
    };

    window.sendMedia = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const path = isDM ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
            push(ref(db, path), { name: currentUser, media: e.target.result, pfp: localStorage.getItem("pfp") });
        };
        reader.readAsDataURL(input.files[0]);
    };

    function renderMsg(data) {
        const box = document.getElementById("chatBox");
        const isMe = data.name === currentUser;
        const div = document.createElement("div");
        div.className = `msg ${isMe ? 'me' : ''}`;
        let content = data.text ? `<div>${data.text}</div>` : `<img src="${data.media}" style="max-width:100%; border-radius:10px; margin-top:5px">`;
        div.innerHTML = `<img src="${data.pfp}" class="pfp"><div class="bubble"><small style="display:block;font-size:10px;opacity:0.6">${isMe?'':data.name}</small>${content}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // --- Friends & Users ---
    function syncSocial() {
        // All Users List
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById("allUsers"); list.innerHTML = "";
            const isOwen = currentUser.toLowerCase() === "owen";
            snap.forEach(c => {
                const name = c.key; if(name === currentUser) { 
                    document.getElementById("myPFP").src = c.val().pfp; 
                    localStorage.setItem("pfp", c.val().pfp);
                    return; 
                }
                const div = document.createElement("div");
                div.style = "display:flex; justify-content:space-between; padding:10px; background:var(--panel); border-radius:10px; margin-bottom:8px";
                div.innerHTML = `<span><b>${name}</b></span>`;
                
                const btn = document.createElement("button");
                btn.innerText = "Add Friend"; btn.style = "width:auto; padding:5px 10px; font-size:12px";
                btn.onclick = () => sendRequest(name);
                div.appendChild(btn);

                if(isOwen) {
                    const dBtn = document.createElement("button");
                    dBtn.innerText = "Del"; dBtn.style = "width:auto; padding:5px 10px; background:red; margin-left:5px";
                    dBtn.onclick = () => remove(ref(db, 'users/' + name));
                    div.appendChild(dBtn);
                }
                list.appendChild(div);
            });
        });

        // Friend Requests
        onValue(ref(db, 'requests/' + currentUser), (snap) => {
            const div = document.getElementById("pendingRequests"); div.innerHTML = "";
            snap.forEach(c => {
                const sender = c.key;
                const card = document.createElement("div");
                card.className = "request-card";
                card.innerHTML = `<b>${sender}</b> sent a friend request! <br>
                    <button onclick="acceptFriend('${sender}')" style="width:45%; margin-top:10px">Accept</button>
                    <button onclick="declineFriend('${sender}')" style="width:45%; margin-top:10px; background:#444">Decline</button>`;
                div.appendChild(card);
            });
        });

        // Friends List
        onValue(ref(db, 'friends/' + currentUser), (snap) => {
            const list = document.getElementById("friendList"); list.innerHTML = "";
            snap.forEach(c => {
                const f = c.key;
                const d = document.createElement("div");
                d.style = "padding:15px; background:var(--panel); border-radius:15px; margin-bottom:8px; display:flex; justify-content:space-between; border-left:4px solid var(--accent)";
                d.innerHTML = `<b>@ ${f}</b> <span>Chat ›</span>`;
                d.onclick = () => openDM(f);
                list.appendChild(d);
            });
        });
    }

    window.sendRequest = (target) => { set(ref(db, `requests/${target}/${currentUser}`), true); alert("Request Sent!"); };
    window.acceptFriend = (sender) => {
        set(ref(db, `friends/${currentUser}/${sender}`), true);
        set(ref(db, `friends/${sender}/${currentUser}`), true);
        remove(ref(db, `requests/${currentUser}/${sender}`));
    };
    window.declineFriend = (sender) => remove(ref(db, `requests/${currentUser}/${sender}`));

    // --- Settings & UI ---
    window.changeUsername = async () => {
        const newU = document.getElementById("newNameInp").value.trim();
        if(!newU) return;
        const snap = await get(ref(db, 'users/' + newU));
        if(snap.exists()) return alert("Username taken!");
        
        const oldData = (await get(ref(db, 'users/' + currentUser))).val();
        await set(ref(db, 'users/' + newU), oldData);
        await remove(ref(db, 'users/' + currentUser));
        currentUser = newU;
        localStorage.setItem("chatU", newU);
        location.reload();
    };

    window.uploadPFP = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            set(ref(db, `users/${currentUser}/pfp`), e.target.result);
            location.reload();
        };
        reader.readAsDataURL(input.files[0]);
    };

    window.setTab = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
    };

    window.updateTheme = (v) => { document.documentElement.setAttribute('data-theme', v); localStorage.setItem("theme", v); };
    window.saveRoom = () => {
        let s = JSON.parse(localStorage.getItem("saved") || "[]");
        if(!s.includes(activeChatId)) { s.push(activeChatId); localStorage.setItem("saved", JSON.stringify(s)); renderSaved(); }
    };

    function renderSaved() {
        const list = document.getElementById("roomList"); list.innerHTML = "";
        JSON.parse(localStorage.getItem("saved") || "[]").forEach(r => {
            const d = document.createElement("div");
            d.style = "padding:15px; background:var(--panel); border-radius:12px; margin-bottom:8px; display:flex; justify-content:space-between;";
            d.innerHTML = `<b># ${r}</b> <span>›</span>`;
            d.onclick = () => joinRoom(r);
            list.appendChild(d);
        });
    }

    window.logout = () => { localStorage.clear(); location.reload(); };

    if(currentUser) {
        document.getElementById("loginScreen").style.display = "none";
        checkAccountStatus();
        syncSocial();
        renderSaved();
        updateTheme(localStorage.getItem("theme") || "dark");
    }
</script>
</body>
</html>
