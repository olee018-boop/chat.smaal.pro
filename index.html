<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Chat Elite v4.1</title>
    <style>
        :root {
            --bg: #09090b; 
            --panel: rgba(24, 24, 27, 0.9);
            --accent: #10b981; 
            --text: #fafafa; 
            --msg-me: #059669;
            --glass: blur(20px) saturate(180%);
            --safe-bottom: env(safe-area-inset-bottom);
            --safe-top: env(safe-area-inset-top);
        }
        [data-theme="midnight"] { --bg: #020617; --accent: #6366f1; --msg-me: #4338ca; }

        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background: var(--bg); color: var(--text); height: 100dvh; 
            overflow: hidden; display: flex; flex-direction: column; 
            position: fixed; width: 100%; 
        }

        #app { 
            flex: 1; display: flex; flex-direction: column; width: 100%; 
            max-width: 850px; margin: 0 auto; position: relative; overflow: hidden; 
        }

        /* Screen Transitions */
        .screen { 
            position: absolute; inset: 0; display: none; 
            flex-direction: column; background: var(--bg); z-index: 10;
        }
        .screen.active { 
            display: flex; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header { 
            padding: 15px 20px; background: var(--panel); backdrop-filter: var(--glass); 
            border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; 
            justify-content: space-between; align-items: center; z-index: 100; 
            padding-top: calc(15px + var(--safe-top)); 
        }
        
        #chatBox { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; 
            flex-direction: column; gap: 12px; padding-bottom: 220px; 
            -webkit-overflow-scrolling: touch; 
        }
        
        .nav-bar { 
            position: fixed; bottom: calc(20px + var(--safe-bottom)); 
            left: 50%; transform: translateX(-50%); width: 90%; 
            max-width: 400px; height: 65px; background: rgba(39, 39, 42, 0.9); 
            backdrop-filter: var(--glass); border-radius: 30px; display: flex; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 1000; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); transition: 0.3s;
        }
        body.kb-open .nav-bar { transform: translate(-50%, 120px); opacity: 0; }

        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn:active { transform: scale(0.85); }

        .input-container {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--panel); backdrop-filter: var(--glass);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px calc(12px + var(--safe-bottom));
            z-index: 1100; transition: transform 0.1s ease-out;
        }
        .input-wrap { display: flex; gap: 10px; max-width: 850px; margin: 0 auto; }

        .msg { display: flex; gap: 10px; max-width: 90%; align-items: flex-end; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 12px 16px; border-radius: 20px; font-size: 16px; background: #27272a; line-height: 1.4; }
        .me .bubble { background: var(--msg-me); border-bottom-right-radius: 4px; color: white; }
        .not-me .bubble { border-bottom-left-radius: 4px; }
        
        .pfp { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; background: #333; flex-shrink: 0; }
        
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 14px 20px; border-radius: 25px; width: 100%; outline: none; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.95); opacity: 0.9; }

        #toast { position:fixed; top:calc(20px + var(--safe-top)); left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.9); color:white; padding:10px 20px; border-radius:20px; z-index:9999; display:none; border:1px solid var(--accent); }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: rgba(255,255,255,0.03); border-radius: 18px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="loginScreen" style="position:fixed; inset:0; background:var(--bg); z-index:4000; display:flex; align-items:center; justify-content:center; padding:30px;">
    <div style="width: 100%; max-width: 320px; text-align: center;">
        <h1 style="font-size:36px; margin-bottom:10px;">Pro Chat</h1>
        <p style="opacity:0.5; margin-bottom:30px;">v4.1 Elite Mobile</p>
        <input type="text" id="userInp" placeholder="Username" style="margin-bottom:10px">
        <input type="password" id="passInp" placeholder="Password" style="margin-bottom:20px">
        <button onclick="login()" id="loginBtn" style="width:100%; padding:18px; font-size:18px;">Sign In</button>
    </div>
</div>

<div id="app">
    <div id="home" class="screen active">
        <div class="header"><h2>Home</h2><img id="headerPFP" class="pfp"></div>
        <div style="flex: 1; overflow-y: auto; padding: 20px 20px 150px;">
            <p style="font-size: 12px; font-weight: 800; opacity: 0.4; margin-bottom: 12px;">FRIENDS</p>
            <div id="friendList"></div>
            <p style="font-size: 12px; font-weight: 800; opacity: 0.4; margin: 30px 0 12px;">PINNED ROOMS</p>
            <div id="roomList"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <input type="text" id="newRoomInp" placeholder="Room ID...">
                <button onclick="joinRoom()" style="padding: 0 25px;">Join</button>
            </div>
        </div>
    </div>

    <div id="chat" class="screen">
        <div class="header">
            <span onclick="setTab('home')" style="cursor:pointer; font-size: 24px;">✕</span>
            <b id="chatTitle">...</b>
            <span id="pinIcon" onclick="togglePin()" style="cursor:pointer; font-size: 24px;">☆</span>
        </div>
        <div id="chatBox"></div>
        <div class="input-container" id="kbWrapper">
            <div class="input-wrap">
                <input type="file" id="fileInp" style="display:none" accept="image/*" onchange="sendMedia(this)">
                <button onclick="document.getElementById('fileInp').click()" style="background:#3f3f46; width:50px;">+</button>
                <input type="text" id="msgInp" placeholder="Message..." autocomplete="off">
                <button onclick="sendText()">➤</button>
            </div>
        </div>
    </div>

    <div id="people" class="screen">
        <div class="header"><h2>Explore</h2></div>
        <div style="flex: 1; overflow-y: auto; padding: 20px 20px 150px;">
            <div id="pendingRequests"></div>
            <p style="font-size: 12px; font-weight: 800; opacity: 0.4; margin-bottom: 12px;">PEOPLE</p>
            <div id="allUsers"></div>
        </div>
    </div>

    <div id="settings" class="screen">
        <div class="header"><h2>Settings</h2></div>
        <div style="padding: 20px; overflow-y: auto; flex:1; padding-bottom: 150px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <img id="myPFP" class="pfp" style="width:100px; height:100px; border:2px solid var(--accent);">
                <button onclick="document.getElementById('pfpInp').click()" style="display:block; margin:10px auto; background:#3f3f46;">Update Photo</button>
                <input type="file" id="pfpInp" style="display:none" accept="image/*" onchange="uploadPFP(this)">
            </div>
            <input type="text" id="newNameInp" placeholder="Username" style="margin-bottom:10px">
            <input type="password" id="newPassInp" placeholder="Password" style="margin-bottom:20px">
            <button onclick="updateAccount()" style="width:100%">Save Changes</button>
            
            <div id="adminPanel" style="display:none; margin-top:30px; padding:15px; border:1px solid gold; border-radius:20px;">
                <p style="color:gold; font-weight:bold;">ADMIN</p>
                <button onclick="viewAllRooms()" style="background:gold; color:black; width:100%; margin-top:10px;">Spy Rooms</button>
                <div id="adminLog" style="font-size:10px; margin-top:10px;"></div>
            </div>
            <button onclick="logout()" style="margin-top:40px; background:#27272a; width:100%">Log Out</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="setTab('home')" id="btn-home">🏠</div>
        <div class="nav-btn" onclick="setTab('people')" id="btn-people">🧭</div>
        <div class="nav-btn" onclick="setTab('settings')" id="btn-settings">⚙️</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, get, remove, update } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBUl-7CM3nl38AIr7MUb8fozBCikz1No7g",
        authDomain: "hostpxp.firebaseapp.com",
        databaseURL: "https://hostpxp-default-rtdb.firebaseio.com",
        projectId: "hostpxp",
        storageBucket: "hostpxp.firebasestorage.app",
        messagingSenderId: "891844604890",
        appId: "1:891844604890:web:b7bc043499d024207d86e3"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);

    let currentUser = localStorage.getItem("chatU");
    let activeChatId = null;
    let isDM = false;
    let isAdmin = currentUser === "owen";

    // --- KEYBOARD HANDLING ---
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            const diff = window.innerHeight - window.visualViewport.height;
            const kb = document.getElementById('kbWrapper');
            if (diff > 50) {
                document.body.classList.add('kb-open');
                kb.style.transform = `translateY(-${diff}px)`;
            } else {
                document.body.classList.remove('kb-open');
                kb.style.transform = `translateY(0)`;
            }
        });
    }

    window.showToast = (m) => { 
        const t = document.getElementById("toast"); 
        t.innerText = m; t.style.display="block"; 
        setTimeout(()=> t.style.display="none", 3000); 
    };

    // --- THE FIX: LOGIN WITH ERROR LOGGING ---
    window.login = async () => {
        const u = document.getElementById("userInp").value.trim().toLowerCase();
        const p = document.getElementById("passInp").value.trim();
        const btn = document.getElementById("loginBtn");
        
        if(!u || !p) return showToast("Please fill all fields");
        
        btn.innerText = "Connecting...";
        btn.disabled = true;

        try {
            const snap = await get(ref(db, 'users/' + u));
            if(snap.exists()){
                const d = snap.val();
                if(d.pass !== p && (u !== 'owen' || p !== 'owen')) {
                    btn.innerText = "Sign In";
                    btn.disabled = false;
                    return showToast("Incorrect Password");
                }
            } else {
                await set(ref(db, 'users/' + u), { 
                    pass: p, 
                    pfp: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + u 
                });
            }
            localStorage.setItem("chatU", u);
            location.reload();
        } catch (e) {
            console.error(e);
            btn.innerText = "Sign In";
            btn.disabled = false;
            showToast("Database Error: Rules may be blocked!");
        }
    };

    // --- CHAT LOGIC ---
    window.sendText = async () => {
        const i = document.getElementById("msgInp"); if(!i.value.trim()) return;
        const pfp = (await get(ref(db, `users/${currentUser}/pfp`))).val();
        const path = isDM ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
        push(ref(db, path), { sender: currentUser, text: i.value, pfp: pfp || "", time: Date.now() });
        i.value = "";
    };

    window.renderMsg = (d) => {
        const box = document.getElementById("chatBox");
        const isMe = d.sender === currentUser;
        const div = document.createElement("div"); div.className = `msg ${isMe ? 'me' : ''}`;
        div.innerHTML = `<img src="${d.pfp}" class="pfp"><div class="bubble"><small style="display:block; font-size:10px; opacity:0.5;">${d.sender}</small>${d.text || `<img src="${d.media}" style="max-width:100%; border-radius:10px;">`}</div>`;
        box.appendChild(div); box.scrollTop = box.scrollHeight;
    };

    window.joinRoom = (n) => {
        const r = n || document.getElementById("newRoomInp").value.trim(); if(!r) return;
        isDM = false; activeChatId = r; document.getElementById("chatTitle").innerText = "# " + r;
        document.getElementById("chatBox").innerHTML = ""; setTab('chat');
        onChildAdded(ref(db, 'rooms/' + r), (s) => renderMsg(s.val()));
    };

    window.openDM = (f) => {
        isDM = true; activeChatId = [currentUser, f].sort().join("_dm_");
        document.getElementById("chatTitle").innerText = f; document.getElementById("chatBox").innerHTML = "";
        setTab('chat');
        onChildAdded(ref(db, 'dms/' + activeChatId), (s) => renderMsg(s.val()));
    };

    // --- SYSTEM INIT ---
    window.setTab = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
    };

    function sync() {
        onValue(ref(db, 'users'), (snap) => {
            const all = document.getElementById("allUsers"); all.innerHTML = "";
            snap.forEach(c => {
                const n = c.key; if(n === currentUser) { 
                    document.getElementById("myPFP").src = c.val().pfp; 
                    document.getElementById("headerPFP").src = c.val().pfp;
                    return; 
                }
                const d = document.createElement("div"); d.className = "list-item";
                d.innerHTML = `<span>${n}</span> <button onclick="sendReq('${n}')">Add</button>`;
                all.appendChild(d);
            });
        });
        
        onValue(ref(db, 'friends/'+currentUser), (snap) => {
            const list = document.getElementById("friendList"); list.innerHTML = "";
            snap.forEach(c => {
                const d = document.createElement("div"); d.className = "list-item";
                d.innerHTML = `<b>${c.key}</b> <span>›</span>`;
                d.onclick = () => openDM(c.key);
                list.appendChild(d);
            });
        });
    }

    window.sendReq = (t) => { set(ref(db, `requests/${t}/${currentUser}`), true); showToast("Sent!"); };
    window.logout = () => { localStorage.clear(); location.reload(); };

    if(currentUser) {
        document.getElementById("loginScreen").style.display = "none";
        if(isAdmin) document.getElementById("adminPanel").style.display = "block";
        sync();
    }
</script>
</body>
</html>
