<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Private Chat - Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #111b21; color: #e9edef; height: 100vh; overflow: hidden; }
        
        /* Layout Screens */
        .screen { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 600px; margin: 0 auto; border-left: 1px solid #3b4a54; border-right: 1px solid #3b4a54; background: #0b141a; }
        .active { display: flex; }

        /* Login Styling */
        #loginScreen { justify-content: center; padding: 40px; text-align: center; }
        .login-card { background: #202c33; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        input { background: #2a3942; border: 1px solid #3b4a54; color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; width: 100%; outline: none; }
        button { background: #00a884; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        button:hover { background: #008f6f; }

        /* Header */
        .header { background: #202c33; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3b4a54; }
        .header h2 { font-size: 18px; }

        /* Home Screen Specifics */
        .section-label { padding: 15px 15px 5px; font-size: 12px; color: #00a884; text-transform: uppercase; font-weight: bold; }
        .list-container { flex: 1; overflow-y: auto; padding: 10px; }
        .item-card { background: #202c33; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .item-card span { font-weight: 500; }
        .join-btn { width: auto; padding: 5px 15px; font-size: 12px; }

        /* Chat Styling */
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; background-image: linear-gradient(rgba(11,20,26,0.95), rgba(11,20,26,0.95)), url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { margin-bottom: 12px; padding: 8px 12px; border-radius: 8px; max-width: 85%; font-size: 14px; color: white; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .msg.me { background: #005c4b !important; align-self: flex-end; border-top-right-radius: 0; }
        .msg.other { align-self: flex-start; border-top-left-radius: 0; }
        .msg.action { background: rgba(255, 193, 7, 0.2) !important; align-self: center; border-radius: 20px; font-style: italic; color: #ffc107; border: 1px solid #ffc107; }
        
        .controls { padding: 15px; background: #202c33; display: flex; gap: 10px; align-items: center; }
        #messageInput { flex: 1; margin-bottom: 0; }
        .action-btn { background: #3b4a54; width: auto; font-size: 18px; padding: 8px; }

        #notifToggle.on { background: #00a884; }
    </style>
</head>
<body>

    <div id="loginScreen" class="screen active">
        <div class="login-card">
            <h1 style="margin-bottom: 20px;">Welcome</h1>
            <input type="text" id="regUser" placeholder="Username">
            <input type="password" id="regPass" placeholder="Password">
            <button onclick="handleAuth()">Enter Chat</button>
        </div>
    </div>

    <div id="homeScreen" class="screen">
        <div class="header">
            <h2 id="welcomeText">Home</h2>
            <button onclick="logout()" style="width:auto; padding: 5px 10px; background:#f44336">Logout</button>
        </div>
        
        <div class="section-label">Create or Join Group</div>
        <div style="padding: 10px; display: flex; gap: 10px;">
            <input type="text" id="newRoomInput" placeholder="Group Name..." style="margin-bottom:0">
            <button onclick="joinNamedRoom()" style="width:100px">Go</button>
        </div>

        <div class="section-label">Users Online</div>
        <div id="userList" class="list-container">
            </div>
    </div>

    <div id="chatScreen" class="screen">
        <div class="header">
            <button onclick="goHome()" style="width:auto; background:transparent; font-size:20px">←</button>
            <h2 id="chatTitle">Room</h2>
            <div style="display:flex; gap:5px">
                <button id="notifToggle" onclick="toggleNotifications()" style="width:40px">🔔</button>
                <button onclick="copyRoomLink()" style="width:40px; background:#3b4a54">🔗</button>
            </div>
        </div>
        <div id="chatBox"></div>
        <div class="controls">
            <button class="action-btn" onclick="sendAction('🍕 is eating...')" title="Eat">🍕</button>
            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button id="sendBtn" onclick="sendMsg()" style="width:80px">Send</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onValue, set, get, off } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhVAzRtPGuaFkhdT0wgvoLSEME7hYxOwY",
            authDomain: "mychatapp-10a99.firebaseapp.com",
            projectId: "mychatapp-10a99",
            storageBucket: "mychatapp-10a99.firebasestorage.app",
            messagingSenderId: "8158664716",
            appId: "1:8158664716:web:8a25281c2a1714ea557629",
            databaseURL: "https://mychatapp-10a99-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser = localStorage.getItem("chatUser") || null;
        let currentRoom = null;
        let roomRef = null;
        let notificationsEnabled = localStorage.getItem("notifEnabled") === "true";

        // --- Navigation ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- Auth Logic ---
        window.handleAuth = async function() {
            const user = document.getElementById("regUser").value.trim();
            const pass = document.getElementById("regPass").value.trim();
            if (!user || !pass) return alert("Fill everything in!");

            const userPath = ref(db, 'users/' + user);
            const snapshot = await get(userPath);

            if (snapshot.exists()) {
                if (snapshot.val().pass === pass) {
                    loginSuccess(user);
                } else {
                    alert("Wrong password!");
                }
            } else {
                // Register new
                await set(userPath, { pass: pass, status: "online" });
                loginSuccess(user);
            }
        };

        function loginSuccess(user) {
            currentUser = user;
            localStorage.setItem("chatUser", user);
            document.getElementById("welcomeText").innerText = "Hi, " + user;
            showScreen("homeScreen");
            loadUserList();
        }

        window.logout = function() {
            localStorage.removeItem("chatUser");
            location.reload();
        };

        // --- User List ---
        function loadUserList() {
            const usersRef = ref(db, 'users');
            onValue(usersRef, (snapshot) => {
                const list = document.getElementById("userList");
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const div = document.createElement("div");
                    div.className = "item-card";
                    div.innerHTML = `<span>👤 ${child.key}</span> <small style="color:gray">Online</small>`;
                    list.appendChild(div);
                });
            });
        }

        // --- Chat Logic ---
        window.joinNamedRoom = function() {
            const name = document.getElementById("newRoomInput").value.trim() || "General";
            connectToRoom(name);
        };

        window.goHome = function() {
            if (roomRef) off(roomRef);
            showScreen("homeScreen");
        };

        function connectToRoom(roomName) {
            currentRoom = roomName;
            document.getElementById("chatTitle").innerText = roomName;
            document.getElementById("chatBox").innerHTML = "";
            showScreen("chatScreen");

            if (roomRef) off(roomRef);
            roomRef = ref(db, "rooms/" + roomName);

            onChildAdded(roomRef, (snapshot) => {
                const data = snapshot.val();
                renderMessage(data);
                if (data.name !== currentUser) {
                    showNotification(data.name, data.text);
                }
            });
        }

        function renderMessage(data) {
            const chatBox = document.getElementById("chatBox");
            const div = document.createElement("div");
            const isMe = data.name === currentUser;
            
            if (data.type === "action") {
                div.className = "msg action";
                div.innerText = `${data.name} ${data.text}`;
            } else {
                div.className = `msg ${isMe ? 'me' : 'other'}`;
                if (!isMe) div.style.backgroundColor = stringToColor(data.name);
                div.innerHTML = `<b>${isMe ? 'You' : data.name}</b>${data.text}<small style="font-size:10px; display:block; text-align:right; opacity:0.6">${data.time}</small>`;
            }
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        window.sendMsg = function() {
            const inp = document.getElementById("messageInput");
            if (!inp.value.trim()) return;
            
            push(ref(db, "rooms/" + currentRoom), {
                name: currentUser,
                text: inp.value,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                type: "text"
            });
            inp.value = "";
        };

        window.sendAction = function(actionText) {
            push(ref(db, "rooms/" + currentRoom), {
                name: currentUser,
                text: actionText,
                type: "action"
            });
        };

        // --- Notifications & Helpers ---
        window.toggleNotifications = function() {
            if (Notification.permission !== "granted") {
                Notification.requestPermission().then(p => {
                    if (p === "granted") {
                        notificationsEnabled = true;
                        updateNotifUI();
                    }
                });
            } else {
                notificationsEnabled = !notificationsEnabled;
                updateNotifUI();
            }
            localStorage.setItem("notifEnabled", notificationsEnabled);
        };

        function updateNotifUI() {
            const btn = document.getElementById("notifToggle");
            notificationsEnabled ? btn.classList.add("on") : btn.classList.remove("on");
        }

        function showNotification(sender, text) {
            if (notificationsEnabled && document.hidden) {
                new Notification(sender, { body: text });
            }
        }

        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
            return `hsl(${Math.abs(hash) % 360}, 40%, 35%)`;
        }

        window.copyRoomLink = function() {
            const url = window.location.origin + window.location.pathname + "?room=" + encodeURIComponent(currentRoom);
            navigator.clipboard.writeText(url).then(() => alert("Room Link Copied!"));
        };

        // Auto-login check
        if (currentUser) {
            loginSuccess(currentUser);
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('room')) connectToRoom(urlParams.get('room'));
        }
        updateNotifUI();
    </script>
</body>
</html>
