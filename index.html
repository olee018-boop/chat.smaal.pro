<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusChat | Secure Real-Time Messaging</title>
    <style>
        :root {
            --bg-dark: #0b141a;
            --header-bg: #202c33;
            --input-bg: #2a3942;
            --accent: #00a884;
            --my-msg: #005c4b;
            --other-msg: #202c33;
            --text-main: #e9edef;
            --text-dim: #8696a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: #111b21; 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            justify-content: center;
            overflow: hidden;
        }

        /* Auth Screen */
        #authScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 100; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .auth-card {
            background: var(--header-bg); padding: 30px; border-radius: 12px;
            width: 90%; max-width: 400px; text-align: center;
        }
        .auth-card input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: var(--input-bg); border: none; border-radius: 6px; color: white;
        }
        .auth-card button {
            width: 100%; padding: 12px; background: var(--accent);
            border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold;
        }

        /* Main Layout */
        #app { display: none; width: 100%; max-width: 1000px; height: 100vh; background: var(--bg-dark); }
        
        /* Sidebar (Rooms) */
        #sidebar {
            width: 30%; border-right: 1px solid #3b4a54;
            display: flex; flex-direction: column;
        }
        .sidebar-header { background: var(--header-bg); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .room-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #222d34; transition: 0.3s; }
        .room-item:hover { background: #2a3942; }

        /* Chat Area */
        #chatWrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        #topBar { 
            background: var(--header-bg); padding: 10px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #3b4a54;
        }

        #chatBox { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column;
            background-image: linear-gradient(rgba(11,20,26,0.95), rgba(11,20,26,0.95)), url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        /* Message Bubbles */
        .msg-container { margin-bottom: 8px; display: flex; flex-direction: column; animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg { 
            padding: 8px 12px; border-radius: 8px; max-width: 65%; 
            position: relative; font-size: 14.5px; line-height: 1.4;
        }
        .msg.me { align-self: flex-end; background: var(--my-msg); border-top-right-radius: 0; }
        .msg.other { align-self: flex-start; background: var(--other-msg); border-top-left-radius: 0; }
        
        .msg-info { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
        .msg-meta { font-size: 10px; opacity: 0.6; text-align: right; margin-top: 4px; }

        /* Controls */
        .controls { background: var(--header-bg); padding: 15px; display: flex; gap: 10px; align-items: center; }
        #messageInput { flex: 1; background: var(--input-bg); border: none; color: white; padding: 12px; border-radius: 8px; outline: none; }
        
        #typingIndicator { font-size: 12px; color: var(--accent); padding: 5px 20px; height: 20px; }

        /* Reactions & Context Menu */
        .reactions { display: flex; gap: 4px; margin-top: 4px; }
        .react-btn { cursor: pointer; font-size: 12px; opacity: 0.7; }
        .react-btn:hover { opacity: 1; }

        .hidden { display: none !important; }
        
        @media (max-width: 768px) {
            #sidebar { display: none; }
            #app { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-card">
            <h2 style="margin-bottom: 20px;">NexusChat</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button id="loginBtn">Login</button>
            <p style="margin-top: 15px; font-size: 12px; color: var(--text-dim); cursor: pointer;" id="toggleAuth">Need an account? Register</p>
        </div>
    </div>

    <div id="app">
        <div id="sidebar">
            <div class="sidebar-header">
                <span>Rooms</span>
                <button onclick="createRoom()" style="background:none; border:1px solid var(--accent); color:var(--accent); border-radius:4px; padding:2px 8px; cursor:pointer;">+ New</button>
            </div>
            <div id="roomList"></div>
        </div>

        <div id="chatWrapper">
            <div id="topBar">
                <div>
                    <strong id="roomTitle">Global Chat</strong>
                    <div id="onlineCount" style="font-size: 11px; color: var(--accent);">0 online</div>
                </div>
                <button id="logoutBtn" style="background:none; border:none; color:var(--text-dim); cursor:pointer;">Logout</button>
            </div>
            
            <div id="chatBox"></div>
            <div id="typingIndicator"></div>

            <div class="controls">
                <button id="notifyToggle" title="Toggle Notifications">🔔</button>
                <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500">
                <button id="sendBtn" style="background:var(--accent); color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer;">Send</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, serverTimestamp, onDisconnect, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- CONFIGURATION ---
const firebaseConfig = {
  apiKey: "AIzaSyBUl-7CM3nl38AIr7MUb8fozBCikz1No7g",
  authDomain: "hostpxp.firebaseapp.com",
  databaseURL: "https://hostpxp-default-rtdb.firebaseio.com",
  projectId: "hostpxp",
  storageBucket: "hostpxp.firebasestorage.app",
  messagingSenderId: "891844604890",
  appId: "1:891844604890:web:b7bc043499d024207d86e3",
  measurementId: "G-BDKNBWYL8Z"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- STATE ---
        let currentUser = null;
        let currentRoom = "global";
        let isNotifyEnabled = false;

        // --- DOM ELEMENTS ---
        const el = (id) => document.getElementById(id);

        // --- AUTHENTICATION ---
        el('loginBtn').onclick = async () => {
            const email = el('email').value;
            const pass = el('password').value;
            try {
                if(el('loginBtn').innerText === "Login") {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                }
            } catch (e) { alert(e.message); }
        };

        el('toggleAuth').onclick = () => {
            const isLogin = el('loginBtn').innerText === "Login";
            el('loginBtn').innerText = isLogin ? "Register" : "Login";
            el('toggleAuth').innerText = isLogin ? "Have an account? Login" : "Need an account? Register";
        };

        el('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                el('authScreen').classList.add('hidden');
                el('app').style.display = 'flex';
                setUserPresence(user);
                initRoomSystem();
                
                // URL Room Parameter support
                const params = new URLSearchParams(window.location.search);
                if(params.get('room')) switchRoom(params.get('room'));
                else loadMessages(currentRoom);
            } else {
                el('authScreen').classList.remove('hidden');
                el('app').style.display = 'none';
            }
        });

        // --- PRESENCE SYSTEM ---
        function setUserPresence(user) {
            const statusRef = ref(db, `status/${user.uid}`);
            const onlineStatus = { state: 'online', last_seen: serverTimestamp(), email: user.email };
            
            onValue(ref(db, '.info/connected'), (snapshot) => {
                if (snapshot.val() === false) return;
                onDisconnect(statusRef).set({ state: 'offline', last_seen: serverTimestamp() });
                set(statusRef, onlineStatus);
            });

            onValue(ref(db, 'status'), (snap) => {
                const count = Object.values(snap.val() || {}).filter(u => u.state === 'online').length;
                el('onlineCount').innerText = `${count} online`;
            });
        }

        // --- ROOMS SYSTEM ---
        window.createRoom = () => {
            const name = prompt("Enter Room Name:");
            if(!name) return;
            const id = name.toLowerCase().replace(/\s+/g, '-');
            set(ref(db, `rooms/${id}`), { name: name, createdBy: currentUser.email });
        };

        function initRoomSystem() {
            onValue(ref(db, 'rooms'), (snap) => {
                el('roomList').innerHTML = `<div class="room-item" onclick="switchRoom('global')"># global-chat</div>`;
                snap.forEach(child => {
                    const room = child.val();
                    el('roomList').innerHTML += `<div class="room-item" onclick="switchRoom('${child.key}')"># ${room.name}</div>`;
                });
            });
        }

        window.switchRoom = (roomId) => {
            currentRoom = roomId;
            el('roomTitle').innerText = roomId.toUpperCase();
            el('chatBox').innerHTML = '';
            loadMessages(roomId);
            window.history.replaceState(null, null, `?room=${roomId}`);
        };

        // --- MESSAGING SYSTEM ---
        const sanitize = (str) => {
            const temp = document.createElement('div');
            temp.textContent = str;
            return temp.innerHTML;
        };

        function loadMessages(roomId) {
            const msgRef = ref(db, `messages/${roomId}`);
            onValue(msgRef, (snap) => {
                el('chatBox').innerHTML = '';
                snap.forEach(child => {
                    const data = child.val();
                    const isMe = data.uid === currentUser.uid;
                    renderMessage(child.key, data, isMe);
                });
                el('chatBox').scrollTop = el('chatBox').scrollHeight;
            });
        }

        function renderMessage(id, data, isMe) {
            const div = document.createElement('div');
            div.className = `msg-container`;
            div.innerHTML = `
                <div class="msg ${isMe ? 'me' : 'other'}">
                    <div class="msg-info">${isMe ? 'You' : data.username}</div>
                    <div class="msg-text">${sanitize(data.text)}</div>
                    <div class="msg-meta">
                        ${new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                        ${isMe ? `<span onclick="deleteMsg('${id}')" style="cursor:pointer; margin-left:8px;">🗑️</span>` : ''}
                    </div>
                    <div class="reactions">
                        <span class="react-btn" onclick="react('${id}', '👍')">👍</span>
                        <span class="react-btn" onclick="react('${id}', '🔥')">🔥</span>
                        ${data.reactions ? Object.values(data.reactions).join('') : ''}
                    </div>
                </div>
            `;
            el('chatBox').appendChild(div);
            
            if(!isMe && document.hidden && isNotifyEnabled) {
                new Notification(`New message from ${data.username}`, { body: data.text });
            }
        }

        window.sendMsg = () => {
            const text = el('messageInput').value.trim();
            if(!text) return;

            push(ref(db, `messages/${currentRoom}`), {
                uid: currentUser.uid,
                username: currentUser.email.split('@')[0],
                text: text,
                timestamp: serverTimestamp(),
                type: 'text'
            });

            el('messageInput').value = '';
        };

        el('messageInput').onkeypress = (e) => {
            if(e.key === 'Enter') sendMsg();
            // Typing indicator logic
            update(ref(db, `typing/${currentRoom}/${currentUser.uid}`), { typing: true });
            clearTimeout(window.typingTimeout);
            window.typingTimeout = setTimeout(() => {
                remove(ref(db, `typing/${currentRoom}/${currentUser.uid}`));
            }, 2000);
        };

        // --- TYPING INDICATOR ---
        onValue(ref(db, `typing/${currentRoom}`), (snap) => {
            const typingUsers = [];
            snap.forEach(child => {
                if(child.key !== currentUser.uid) typingUsers.push("Someone");
            });
            el('typingIndicator').innerText = typingUsers.length ? "Typing..." : "";
        });

        // --- FEATURES: DELETE & REACT ---
        window.deleteMsg = (id) => {
            if(confirm("Delete message?")) remove(ref(db, `messages/${currentRoom}/${id}`));
        };

        window.react = (id, emoji) => {
            const rRef = ref(db, `messages/${currentRoom}/${id}/reactions/${currentUser.uid}`);
            set(rRef, emoji);
        };

        // --- NOTIFICATIONS ---
        el('notifyToggle').onclick = () => {
            Notification.requestPermission().then(perm => {
                if(perm === 'granted') {
                    isNotifyEnabled = !isNotifyEnabled;
                    el('notifyToggle').style.opacity = isNotifyEnabled ? "1" : "0.5";
                    alert("Notifications " + (isNotifyEnabled ? "Enabled" : "Disabled"));
                }
            });
        };

    </script>
</body>
</html>
