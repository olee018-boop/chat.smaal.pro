<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Chat Elite v4.1</title>
    <style>
        :root {
            --bg: #09090b; --panel: rgba(30, 30, 35, 0.8);
            --accent: #10b981; --text: #fafafa; --msg-me: #059669;
            --glass: blur(25px) saturate(200%);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
        }

        #app { 
            height: 100%; 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            position: relative; 
            display: flex;
            flex-direction: column;
        }

        /* Desktop-style container for larger screens */
        @media (min-width: 600px) {
            body { background: #000; }
            #app { border-left: 1px solid #222; border-right: 1px solid #222; }
        }

        .screen { 
            position: absolute;
            inset: 0;
            display: none; 
            flex-direction: column; 
            background: var(--bg);
            z-index: 10;
        }
        
        .screen.active { 
            display: flex; 
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from { transform: translateX(30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .header { 
            padding: calc(var(--safe-top) + 15px) 20px 15px; 
            background: var(--panel); 
            backdrop-filter: var(--glass); 
            border-bottom: 1px solid rgba(255,255,255,0.08); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100; 
        }

        #chatBox { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            padding-bottom: 100px; 
            -webkit-overflow-scrolling: touch; 
        }
        
        /* THE KEYBOARD FIX */
        .input-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--panel);
            backdrop-filter: var(--glass);
            padding: 10px 15px calc(var(--safe-bottom) + 10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.1s ease-out;
            z-index: 1100;
        }

        .input-wrap { 
            display: flex; 
            gap: 10px; 
            max-width: 500px;
            margin: 0 auto;
        }

        .nav-bar { 
            position: fixed;
            bottom: calc(15px + var(--safe-bottom)); 
            left: 50%;
            transform: translateX(-50%);
            width: 90%; 
            max-width: 400px;
            height: 65px; 
            background: rgba(40, 40, 45, 0.8); 
            backdrop-filter: var(--glass); 
            border-radius: 30px; 
            display: flex; 
            border: 1px solid rgba(255,255,255,0.1); 
            z-index: 1000; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
        }

        /* Hide nav when keyboard is open */
        body.keyboard-open .nav-bar { display: none; }

        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: 0.2s; }
        .nav-btn:active { transform: scale(0.9); }
        .nav-btn.active { color: var(--accent); }

        .msg { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { 
            padding: 12px 16px; 
            border-radius: 20px; 
            font-size: 15px; 
            background: #27272a; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .me .bubble { background: var(--msg-me); border-bottom-right-radius: 4px; color: white; }
        .not-me .bubble { border-bottom-left-radius: 4px; }

        .pfp { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #333; }
        
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 18px; border-radius: 25px; width: 100%; outline: none; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: 600; transition: 0.2s; }
        button:active { transform: scale(0.96); opacity: 0.8; }

        .list-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 16px; 
            background: rgba(255,255,255,0.03); 
            border-radius: 18px; 
            margin-bottom: 10px; 
            transition: 0.2s;
        }
        .list-item:active { background: rgba(255,255,255,0.08); }
    </style>
</head>
<body>

<div id="loginScreen" style="position:fixed; inset:0; background:var(--bg); z-index:2000; display:flex; align-items:center; justify-content:center; padding:30px;">
    <div style="width: 100%; max-width: 300px; text-align: center;">
        <h1 style="font-size: 32px; margin-bottom: 10px;">Pro Chat</h1>
        <p style="opacity: 0.5; margin-bottom: 30px;">v4.1 Elite Mobile</p>
        <input type="text" id="userInp" placeholder="Username" style="margin-bottom:10px">
        <input type="password" id="passInp" placeholder="Password" style="margin-bottom:20px">
        <button onclick="login()" style="width:100%; padding:15px">Sign In</button>
    </div>
</div>

<div id="app">
    <div id="home" class="screen active">
        <div class="header"><h2>Chats</h2><span style="font-size:20px">✨</span></div>
        <div style="flex: 1; overflow-y: auto; padding: 20px 20px 100px;">
            <div id="friendList"></div>
            <p style="font-size: 11px; font-weight: 800; opacity: 0.4; margin: 25px 0 12px; letter-spacing: 1px;">ROOMS</p>
            <div id="roomList"></div>
        </div>
    </div>

    <div id="chat" class="screen">
        <div class="header">
            <span onclick="setTab('home')" style="padding:5px 10px; margin-left:-10px">back</span>
            <b id="chatTitle">...</b>
            <span id="pinIcon" onclick="togglePin()">☆</span>
        </div>
        <div id="chatBox"></div>
        <div class="input-container" id="chatInputArea">
            <div class="input-wrap">
                <input type="text" id="msgInp" placeholder="Message..." autocomplete="off">
                <button onclick="sendText()">Send</button>
            </div>
        </div>
    </div>

    <div id="settings" class="screen">
        <div class="header"><h2>Settings</h2></div>
        <div style="padding: 20px; text-align: center;">
            <img id="myPFP" class="pfp" style="width:100px; height:100px; margin-bottom:20px; border:3px solid var(--accent)">
            <button onclick="logout()" style="background:#ef4444; width:100%">Log Out</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="setTab('home')" id="btn-home">🏠</div>
        <div class="nav-btn" onclick="setTab('settings')" id="btn-settings">⚙️</div>
    </div>
</div>

<script type="module">
    // (Keep your Firebase Imports and Config exactly as they were)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, get, remove, update } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBUl-7CM3nl38AIr7MUb8fozBCikz1No7g",
        authDomain: "hostpxp.firebaseapp.com",
        databaseURL: "https://hostpxp-default-rtdb.firebaseio.com",
        projectId: "hostpxp",
        storageBucket: "hostpxp.firebasestorage.app",
        messagingSenderId: "891844604890",
        appId: "1:891844604890:web:b7bc043499d024207d86e3"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);

    let currentUser = localStorage.getItem("chatU");
    let activeChatId = null;

    // --- MOBILE KEYBOARD ADAPTATION ---
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            const currentHeight = window.visualViewport.height;
            const fullHeight = window.innerHeight;
            const chatArea = document.getElementById('chatInputArea');
            
            if (currentHeight < fullHeight - 50) {
                // Keyboard is open
                document.body.classList.add('keyboard-open');
                const offset = fullHeight - currentHeight;
                chatArea.style.transform = `translateY(-${offset}px)`;
            } else {
                // Keyboard is closed
                document.body.classList.remove('keyboard-open');
                chatArea.style.transform = `translateY(0)`;
            }
        });
    }

    // --- CORE LOGIC ---
    window.setTab = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const btn = document.getElementById('btn-'+id);
        if(btn) btn.classList.add('active');
        
        // Auto-scroll chat when opening
        if(id === 'chat') {
            setTimeout(() => {
                const cb = document.getElementById('chatBox');
                cb.scrollTop = cb.scrollHeight;
            }, 350);
        }
    };

    window.login = async () => {
        const u = document.getElementById("userInp").value.trim().toLowerCase();
        if(!u) return;
        currentUser = u;
        localStorage.setItem("chatU", u);
        location.reload();
    };

    window.logout = () => {
        localStorage.clear();
        location.reload();
    };

    window.sendText = async () => {
        const i = document.getElementById("msgInp");
        if(!i.value.trim() || !activeChatId) return;
        
        const path = 'rooms/' + activeChatId;
        push(ref(db, path), {
            sender: currentUser,
            text: i.value,
            pfp: `https://api.dicebear.com/7.x/avataaars/svg?seed=${currentUser}`,
            time: Date.now()
        });
        i.value = "";
        i.focus();
    };

    function renderMsg(d) {
        const box = document.getElementById("chatBox");
        const isMe = d.sender === currentUser;
        const div = document.createElement("div");
        div.className = `msg ${isMe ? 'me' : 'not-me'}`;
        div.innerHTML = `<img src="${d.pfp}" class="pfp"><div class="bubble"><small style="display:block; font-size:10px; opacity:0.6; margin-bottom:4px">${d.sender}</small>${d.text}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // Initialize
    if(currentUser) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("myPFP").src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${currentUser}`;
        
        // Mocking a room join for the demo
        activeChatId = "Global_Lounge";
        document.getElementById("chatTitle").innerText = "Global Lounge";
        onChildAdded(ref(db, 'rooms/' + activeChatId), (s) => renderMsg(s.val()));
        
        // Render a dummy list item for rooms
        document.getElementById("roomList").innerHTML = `<div class="list-item" onclick="setTab('chat')"><b># Global Lounge</b> <span>›</span></div>`;
    }
</script>
</body>
</html>
