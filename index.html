<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Chat Elite v5.0</title>
    <style>
        :root {
            --bg: #09090b; --panel: rgba(24, 24, 27, 0.95);
            --accent: #10b981; --text: #fafafa; --msg-me: #059669;
            --glass: blur(25px) saturate(180%);
            --safe-bottom: env(safe-area-inset-bottom);
            --card: #18181b; --dev-gold: #f59e0b;
        }
        [data-theme="midnight"] { --bg: #020617; --accent: #6366f1; --msg-me: #4338ca; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* IPAD SCROLL FIX */
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); position: fixed; }

        #app { height: 100dvh; width: 100%; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; position: relative; }

        .screen { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.2s ease; overflow: hidden; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header { padding: 15px 20px; background: var(--panel); backdrop-filter: var(--glass); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding-top: env(safe-area-inset-top); }
        
        /* HARDWARE MOUSE COMPATIBLE SCROLL AREA */
        .scroll-area { 
            flex: 1; overflow-y: scroll; padding: 20px; padding-bottom: 200px; 
            -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
        }
        
        .nav-bar { 
            position: absolute; bottom: calc(15px + var(--safe-bottom)); left: 5%; width: 90%; height: 65px; 
            background: var(--panel); backdrop-filter: var(--glass); border-radius: 20px; 
            display: flex; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; opacity: 0.5; }
        .nav-btn.active { opacity: 1; color: var(--accent); transform: scale(1.1); }

        .input-wrap { 
            position: absolute; bottom: 90px; left: 0; width: 100%;
            padding: 12px; display: flex; gap: 10px; background: var(--panel); 
            backdrop-filter: var(--glass); border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }

        .msg { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; margin-bottom: 12px; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; background: #27272a; word-wrap: break-word; line-height: 1.4; }
        .me .bubble { background: var(--msg-me); border-bottom-right-radius: 4px; }
        .ai .bubble { border: 2px solid var(--dev-gold); border-bottom-left-radius: 4px; }
        
        .pfp { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: #444; flex-shrink: 0; }
        
        input, select, textarea { background: #18181b; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .dev-btn { background: var(--dev-gold); color: black; }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: rgba(255,255,255,0.03); border-radius: 18px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
        
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-box { background: #18181b; padding: 25px; border-radius: 28px; width: 100%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="modal"><div class="modal-box" id="modalContent"></div></div>

<div id="loginScreen" style="position:fixed; inset:0; background:var(--bg); z-index:4000; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="width: 100%; max-width: 300px; text-align: center;">
        <h1 style="margin-bottom: 25px;">Pro Chat <span style="font-size:12px; opacity:0.5;">v5.0</span></h1>
        <input type="text" id="userInp" placeholder="Username" style="margin-bottom:10px;">
        <input type="password" id="passInp" placeholder="Password" style="margin-bottom:20px;">
        <button onclick="login()" style="width:100%">Sign In / Register</button>
    </div>
</div>

<div id="app">
    <div id="home" class="screen active">
        <div class="header">
            <h2>Home</h2>
            <button onclick="openCreateHub()" style="padding: 5px 15px; font-size:12px;">+ Create</button>
        </div>
        <div class="scroll-area">
            <p style="font-size: 11px; font-weight: 800; opacity: 0.4; margin-bottom: 12px; letter-spacing: 1px;">DIRECT MESSAGES</p>
            <div id="friendList"></div>
            <p style="font-size: 11px; font-weight: 800; opacity: 0.4; margin: 30px 0 12px; letter-spacing: 1px;">PUBLIC LOBBIES</p>
            <div id="roomList"></div>
        </div>
    </div>

    <div id="chat" class="screen">
        <div class="header">
            <span onclick="setTab('home')" style="cursor:pointer; font-size: 20px;">✕</span>
            <b id="chatTitle">...</b>
            <span id="pinIcon" onclick="togglePin()" style="cursor:pointer; font-size: 20px;">☆</span>
        </div>
        <div id="chatBox" class="scroll-area"></div>
        <div class="input-wrap">
            <button onclick="document.getElementById('fileInp').click()" style="width:45px; background:#27272a;">+</button>
            <input type="file" id="fileInp" style="display:none" accept="image/*" onchange="sendMedia(this)">
            <input type="text" id="msgInp" placeholder="Message..." onkeypress="if(event.key==='Enter') sendText()">
            <button onclick="sendText()" style="width:60px">➤</button>
        </div>
    </div>

    <div id="people" class="screen">
        <div class="header"><h2>Explore</h2></div>
        <div class="scroll-area">
            <div id="pendingRequests"></div>
            <p style="font-size: 11px; font-weight: 800; opacity: 0.4; margin-bottom: 12px;">DISCOVER PEOPLE</p>
            <div id="allUsers"></div>
        </div>
    </div>

    <div id="settings" class="screen">
        <div class="header"><h2>Settings</h2></div>
        <div class="scroll-area">
            <div style="text-align: center; margin-bottom: 30px;">
                <div style="position:relative; display:inline-block;">
                    <img id="myPFP" class="pfp" style="width:100px; height:100px; border:3px solid var(--accent);">
                    <button onclick="document.getElementById('pfpInp').click()" style="position:absolute; bottom:0; right:0; width:35px; height:35px; border-radius:50%; padding:0;">📸</button>
                </div>
                <h3 id="displayU" style="margin-top:10px;"></h3>
                <input type="file" id="pfpInp" style="display:none" accept="image/*" onchange="uploadPFP(this)">
            </div>

            <div id="devSection" style="display:none; background:rgba(245,158,11,0.1); border:1px solid var(--dev-gold); padding:15px; border-radius:20px; margin-bottom:20px;">
                <p style="color:var(--dev-gold); font-size:11px; font-weight:bold; margin-bottom:10px;">🛠 BOT DEVELOPER HUB</p>
                <button onclick="openBotLab()" class="dev-btn" style="width:100%;">Create New AI Bot</button>
            </div>

            <button onclick="logout()" style="width:100%; background:#333;">Logout</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="setTab('home')" id="btn-home">🏠</div>
        <div class="nav-btn" onclick="setTab('people')" id="btn-people">🧭</div>
        <div class="nav-btn" onclick="setTab('settings')" id="btn-settings">⚙️</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, get, remove, update } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBUl-7CM3nl38AIr7MUb8fozBCikz1No7g",
        authDomain: "hostpxp.firebaseapp.com",
        databaseURL: "https://hostpxp-default-rtdb.firebaseio.com",
        projectId: "hostpxp",
        storageBucket: "hostpxp.firebasestorage.app",
        messagingSenderId: "891844604890",
        appId: "1:891844604890:web:b7bc043499d024207d86e3"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);
    const GROK_KEY = "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";

    let currentUser = localStorage.getItem("chatU");
    let userData = null;
    let activeChatId = null;
    let isDM = false;

    // --- AUTH ---
    window.login = async () => {
        const u = document.getElementById("userInp").value.trim().toLowerCase();
        const p = document.getElementById("passInp").value.trim();
        if(!u || !p) return;
        const snap = await get(ref(db, 'users/' + u));
        if(!snap.exists()){
            await set(ref(db, 'users/' + u), { pass: p, isDev: (u === 'owen'), pfp: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + u });
        } else if(snap.val().pass !== p) return alert("Wrong password");
        currentUser = u; localStorage.setItem("chatU", u); location.reload();
    };

    // --- BOT ENGINE ---
    async function askGrok(prompt, personality) {
        try {
            const res = await fetch("https://api.x.ai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROK_KEY}` },
                body: JSON.stringify({ model: "grok-beta", messages: [{ role: "system", content: personality }, { role: "user", content: prompt }] })
            });
            const d = await res.json();
            return d.choices[0].message.content;
        } catch(e) { return "Grok is resting right now."; }
    }

    // --- MESSAGING ---
    window.sendText = async () => {
        const i = document.getElementById("msgInp");
        const txt = i.value.trim();
        if(!txt || !activeChatId) return;
        const path = isDM ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
        
        push(ref(db, path), { sender: currentUser, text: txt, pfp: userData.pfp, time: Date.now() });
        i.value = "";

        // Bot Response Trigger
        const botSnap = await get(ref(db, 'bots'));
        if(botSnap.exists()){
            botSnap.forEach(async (b) => {
                const bot = b.val();
                if(bot.room === activeChatId) {
                    const reply = await askGrok(txt, bot.personality);
                    push(ref(db, path), { sender: "🤖 " + bot.name, text: reply, pfp: "https://api.dicebear.com/7.x/bottts/svg?seed=" + bot.name, isAI: true, time: Date.now() });
                }
            });
        }
    };

    function renderMsg(d) {
        const box = document.getElementById("chatBox");
        const isMe = d.sender === currentUser;
        const div = document.createElement("div"); 
        div.className = `msg ${isMe ? 'me' : ''} ${d.isAI ? 'ai' : ''}`;
        div.innerHTML = `<img src="${d.pfp}" class="pfp"><div class="bubble"><small style="display:block; font-size:9px; opacity:0.5">${d.sender}</small>${d.text}</div>`;
        box.appendChild(div); box.scrollTop = box.scrollHeight;
    }

    // --- HUB LOGIC ---
    window.openCreateHub = () => {
        document.getElementById("modal").style.display = "flex";
        document.getElementById("modalContent").innerHTML = `
            <h3>Create Space</h3><br>
            <button onclick="startStep('dm')" style="width:100%; margin-bottom:10px;">Direct Message</button>
            <button onclick="startStep('lobby')" style="width:100%; background:#27272a;">Public Lobby</button>
            <button onclick="closeModal()" style="background:none; width:100%; margin-top:10px;">Cancel</button>
        `;
    };

    window.startStep = (type) => {
        const placeholder = type === 'dm' ? "Enter Username..." : "Enter Room Name...";
        const action = type === 'dm' ? "openDM(document.getElementById('hubInp').value)" : "joinRoom(document.getElementById('hubInp').value)";
        document.getElementById("modalContent").innerHTML = `
            <h3>New ${type.toUpperCase()}</h3><br>
            <input id="hubInp" placeholder="${placeholder}"><br><br>
            <button onclick="${action}; closeModal();" style="width:100%;">Start</button>
        `;
    };

    window.openBotLab = () => {
        document.getElementById("modal").style.display = "flex";
        document.getElementById("modalContent").innerHTML = `
            <h3>Bot Lab</h3><br>
            <input id="botN" placeholder="Bot Name"><br><br>
            <textarea id="botP" placeholder="Personality (e.g. You are a pirate)"></textarea><br><br>
            <input id="botR" placeholder="Target Room ID"><br><br>
            <button onclick="saveBot()" style="width:100%;">Deploy Bot</button>
        `;
    };

    window.saveBot = async () => {
        const name = document.getElementById("botN").value;
        const personality = document.getElementById("botP").value;
        const room = document.getElementById("botR").value;
        if(name && personality && room) {
            await push(ref(db, 'bots'), { name, personality, room });
            closeModal();
            alert("Bot Deployed!");
        }
    };

    // --- SYSTEM ---
    window.joinRoom = (r) => {
        if(!r) return; isDM = false; activeChatId = r.toLowerCase();
        document.getElementById("chatTitle").innerText = "# " + r;
        document.getElementById("chatBox").innerHTML = ""; setTab('chat');
        onChildAdded(ref(db, 'rooms/' + activeChatId), s => renderMsg(s.val()));
    };

    window.openDM = (f) => {
        if(!f) return; isDM = true; activeChatId = [currentUser, f.toLowerCase()].sort().join("_dm_");
        document.getElementById("chatTitle").innerText = f;
        document.getElementById("chatBox").innerHTML = ""; setTab('chat');
        onChildAdded(ref(db, 'dms/' + activeChatId), s => renderMsg(s.val()));
    };

    window.uploadPFP = (input) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
            await update(ref(db, `users/${currentUser}`), { pfp: e.target.result });
            document.getElementById("myPFP").src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    };

    window.setTab = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-'+id).classList.add('active');
    };

    window.closeModal = () => document.getElementById("modal").style.display = "none";
    window.logout = () => { localStorage.clear(); location.reload(); };

    // --- INIT ---
    if(currentUser) {
        document.getElementById("loginScreen").style.display = "none";
        onValue(ref(db, 'users/' + currentUser), s => {
            userData = s.val();
            document.getElementById("displayU").innerText = "@" + currentUser;
            document.getElementById("myPFP").src = userData.pfp;
            if(userData.isDev) document.getElementById("devSection").style.display = "block";
        });
        
        onValue(ref(db, 'friends/' + currentUser), snap => {
            const list = document.getElementById("friendList"); list.innerHTML = "";
            snap.forEach(f => {
                const d = document.createElement("div"); d.className = "list-item";
                d.innerHTML = `<b>${f.key}</b>`; d.onclick = () => openDM(f.key);
                list.appendChild(d);
            });
        });
        
        onValue(ref(db, 'users'), snap => {
            const list = document.getElementById("allUsers"); list.innerHTML = "";
            snap.forEach(u => {
                if(u.key === currentUser) return;
                const d = document.createElement("div"); d.className = "list-item";
                d.innerHTML = `<span>${u.key}</span> <button onclick="sendReq('${u.key}')" style="padding:4px 10px; font-size:10px">Add</button>`;
                list.appendChild(d);
            });
        });
    }

    window.sendReq = (t) => set(ref(db, `requests/${t}/${currentUser}`), true);
</script>
</body>
</html>
