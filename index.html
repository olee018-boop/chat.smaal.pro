<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Chat Mobile</title>
    <style>
        :root {
            --bg: #0b141a;
            --panel: #202c33;
            --accent: #00a884;
            --text: #e9edef;
            --msg-me: #005c4b;
            --msg-them: #202c33;
            --danger: #ef5350;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            height: 100dvh; /* Dynamic viewport height for mobile */
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Screen Management */
        .screen { 
            display: none; 
            flex-direction: column; 
            height: 100dvh; 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            background: var(--bg);
            animation: fadeIn 0.3s ease;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Login Screen */
        #loginScreen { justify-content: center; padding: 30px; text-align: center; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        input { 
            background: #2a3942; border: 1px solid #3b4a54; color: white; 
            padding: 14px; border-radius: 12px; margin-bottom: 15px; width: 100%; 
            font-size: 16px; outline: none; transition: border 0.2s;
        }
        input:focus { border-color: var(--accent); }

        button { 
            background: var(--accent); color: white; border: none; 
            padding: 14px; border-radius: 12px; cursor: pointer; 
            font-weight: bold; width: 100%; font-size: 16px;
        }
        button:active { transform: scale(0.98); }

        /* Header UI */
        .header { 
            padding: 15px 20px; background: var(--panel); 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }
        .header h2 { font-size: 20px; font-weight: 600; }

        /* Navigation Bar */
        .nav-bar {
            display: flex; background: var(--panel); border-top: 1px solid rgba(255,255,255,0.05);
            padding-bottom: env(safe-area-inset-bottom); /* Fix for iPhone Notch */
        }
        .nav-item { flex: 1; text-align: center; padding: 12px; font-size: 12px; opacity: 0.6; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--accent); }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 4px; }

        /* Content Areas */
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        
        .card { background: var(--panel); padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #3b4a54; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Chat Specifics */
        #chatBox { 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
            background-color: var(--bg);
        }
        .msg { margin-bottom: 8px; padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 15px; position: relative; }
        .msg.me { background: var(--msg-me); align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.other { background: var(--msg-them); align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg b { display: block; font-size: 12px; margin-bottom: 2px; color: #8696a0; }
        
        .msg.action { 
            background: rgba(255,255,255,0.05) !important; align-self: center; 
            border-radius: 20px; font-size: 13px; color: #ffd700; border: 1px solid rgba(255,215,0,0.3);
        }

        .chat-input-area { 
            padding: 10px 15px; background: var(--panel); display: flex; gap: 10px; align-items: center;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; border: none; color: white; flex-shrink: 0; }
        .action-btn { background: transparent; color: #8696a0; border: none; font-size: 24px; padding: 5px; }

        .status-dot { width: 10px; height: 10px; background: #4caf50; border-radius: 50%; border: 2px solid var(--panel); margin-left: auto; }
    </style>
</head>
<body>

    <div id="loginScreen" class="screen active">
        <div class="login-box">
            <h1 style="margin-bottom: 10px;">Pro Chat</h1>
            <p style="color: #8696a0; margin-bottom: 25px;">Enter your credentials to start</p>
            <input type="text" id="regUser" placeholder="Username">
            <input type="password" id="regPass" placeholder="Password">
            <button onclick="handleAuth()">Sign In / Sign Up</button>
        </div>
    </div>

    <div id="homeScreen" class="screen">
        <div class="header">
            <h2>Chats</h2>
            <button onclick="logout()" style="width:auto; padding: 8px 15px; background:var(--danger); font-size:12px">Logout</button>
        </div>
        
        <div class="scroll-area">
            <div style="margin-bottom: 20px;">
                <input type="text" id="newRoomInput" placeholder="Join or Create a Room..." style="margin-bottom: 8px;">
                <button onclick="joinNamedRoom()">Enter Group</button>
            </div>

            <p style="font-size:12px; color:var(--accent); font-weight:bold; margin-bottom:10px;">GLOBAL USERS</p>
            <div id="userList"></div>
        </div>

        <div class="nav-bar">
            <div class="nav-item active" onclick="showScreen('homeScreen')"><i>🏠</i>Home</div>
            <div class="nav-item" onclick="joinNamedRoom('Lobby')"><i>🌍</i>Lobby</div>
        </div>
    </div>

    <div id="chatScreen" class="screen">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px">
                <span onclick="goHome()" style="font-size:24px; cursor:pointer">‹</span>
                <div>
                    <h2 id="chatTitle" style="font-size:16px">Room</h2>
                    <p id="roomMemberCount" style="font-size:10px; color:#8696a0">online now</p>
                </div>
            </div>
            <div style="display:flex; gap:10px">
                <button id="notifToggle" onclick="toggleNotifications()" style="background:transparent; font-size:18px; width:auto">🔔</button>
                <button onclick="copyRoomLink()" style="background:transparent; font-size:18px; width:auto">🔗</button>
            </div>
        </div>

        <div id="chatBox" class="scroll-area" style="display:flex; flex-direction:column;"></div>

        <div class="chat-input-area">
            <button class="action-btn" onclick="sendAction('is 🍕 eating...')">🍕</button>
            <input type="text" id="messageInput" placeholder="Message" style="margin-bottom:0" onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="circle-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onValue, set, get, off } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

        // CONFIG (Your existing Firebase keys)
        const firebaseConfig = {
            apiKey: "AIzaSyBhVAzRtPGuaFkhdT0wgvoLSEME7hYxOwY",
            authDomain: "mychatapp-10a99.firebaseapp.com",
            projectId: "mychatapp-10a99",
            storageBucket: "mychatapp-10a99.firebasestorage.app",
            messagingSenderId: "8158664716",
            appId: "1:8158664716:web:8a25281c2a1714ea557629",
            databaseURL: "https://mychatapp-10a99-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser = localStorage.getItem("chatUser") || null;
        let currentRoom = null;
        let roomRef = null;
        let notificationsEnabled = localStorage.getItem("notifEnabled") === "true";

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        window.handleAuth = async function() {
            const user = document.getElementById("regUser").value.trim();
            const pass = document.getElementById("regPass").value.trim();
            if (!user || !pass) return alert("Please fill all fields");

            const userPath = ref(db, 'users/' + user);
            const snapshot = await get(userPath);

            if (snapshot.exists()) {
                if (snapshot.val().pass === pass) loginSuccess(user);
                else alert("Wrong password!");
            } else {
                await set(userPath, { pass: pass, created: Date.now() });
                loginSuccess(user);
            }
        };

        function loginSuccess(user) {
            currentUser = user;
            localStorage.setItem("chatUser", user);
            showScreen("homeScreen");
            loadUserList();
        }

        window.logout = () => { localStorage.removeItem("chatUser"); location.reload(); };

        function loadUserList() {
            onValue(ref(db, 'users'), (snapshot) => {
                const list = document.getElementById("userList");
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const div = document.createElement("div");
                    div.className = "card";
                    div.innerHTML = `<div class="avatar">${child.key[0].toUpperCase()}</div> <span>${child.key}</span> <div class="status-dot"></div>`;
                    list.appendChild(div);
                });
            });
        }

        window.joinNamedRoom = function(manualName) {
            const name = manualName || document.getElementById("newRoomInput").value.trim() || "Lobby";
            connectToRoom(name);
        };

        window.goHome = () => { if (roomRef) off(roomRef); showScreen("homeScreen"); };

        function connectToRoom(roomName) {
            currentRoom = roomName;
            document.getElementById("chatTitle").innerText = roomName;
            const chatBox = document.getElementById("chatBox");
            chatBox.innerHTML = `<p style="text-align:center; font-size:10px; color:#8696a0; margin-bottom:15px">Encrypted Group Chat</p>`;
            showScreen("chatScreen");

            if (roomRef) off(roomRef);
            roomRef = ref(db, "rooms/" + roomName);

            onChildAdded(roomRef, (snapshot) => {
                renderMessage(snapshot.val());
                if (snapshot.val().name !== currentUser) showNotification(snapshot.val().name, snapshot.val().text);
            });
        }

        function renderMessage(data) {
            const chatBox = document.getElementById("chatBox");
            const div = document.createElement("div");
            const isMe = data.name === currentUser;
            
            if (data.type === "action") {
                div.className = "msg action";
                div.innerText = `${data.name} ${data.text}`;
            } else {
                div.className = `msg ${isMe ? 'me' : 'other'}`;
                div.innerHTML = `<b>${isMe ? 'You' : data.name}</b>${data.text}`;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        window.sendMsg = function() {
            const inp = document.getElementById("messageInput");
            if (!inp.value.trim()) return;
            push(ref(db, "rooms/" + currentRoom), {
                name: currentUser, text: inp.value, type: "text"
            });
            inp.value = "";
        };

        window.sendAction = (actionText) => {
            push(ref(db, "rooms/" + currentRoom), { name: currentUser, text: actionText, type: "action" });
        };

        window.toggleNotifications = function() {
            if (Notification.permission !== "granted") {
                Notification.requestPermission().then(p => {
                    notificationsEnabled = (p === "granted");
                    updateNotifUI();
                });
            } else {
                notificationsEnabled = !notificationsEnabled;
                updateNotifUI();
            }
            localStorage.setItem("notifEnabled", notificationsEnabled);
        };

        function updateNotifUI() {
            document.getElementById("notifToggle").innerText = notificationsEnabled ? "🔔" : "🔕";
        }

        function showNotification(sender, text) {
            if (notificationsEnabled && document.hidden) new Notification(sender, { body: text });
        }

        window.copyRoomLink = () => {
            const url = `${window.location.origin}${window.location.pathname}?room=${encodeURIComponent(currentRoom)}`;
            navigator.clipboard.writeText(url).then(() => alert("Invite link copied!"));
        };

        if (currentUser) {
            loginSuccess(currentUser);
            const roomParam = new URLSearchParams(window.location.search).get('room');
            if (roomParam) connectToRoom(roomParam);
        }
        updateNotifUI();
    </script>
</body>
</html>
