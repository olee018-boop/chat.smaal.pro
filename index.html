<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Private Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #111b21; display: flex; justify-content: center; height: 100vh; color: #e9edef; }
        
        #chatWrapper { width: 100%; max-width: 600px; height: 100vh; background: #0b141a; display: flex; flex-direction: column; border-left: 1px solid #3b4a54; border-right: 1px solid #3b4a54; }
        
        #topBar { background: #202c33; padding: 10px; display: flex; gap: 8px; border-bottom: 1px solid #3b4a54; align-items: center; }
        #topBar input { background: #111b21; border: 1px solid #3b4a54; color: white; padding: 8px; border-radius: 5px; flex: 1; outline: none; font-size: 14px; }
        #topBar button { background: #00a884; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        #topBar button:hover { background: #008f6f; }
        
        /* Specific button colors */
        #shareBtn { background: #3b4a54 !important; }
        #notifToggle { background: #3b4a54; font-size: 16px; }
        #notifToggle.on { background: #00a884 !important; }

        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; background-image: linear-gradient(rgba(11,20,26,0.95), rgba(11,20,26,0.95)), url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        .msg { margin-bottom: 12px; padding: 8px 12px; border-radius: 8px; max-width: 85%; font-size: 14px; position: relative; color: white; box-shadow: 0 1px 2px rgba(0,0,0,0.3); line-height: 1.4; }
        .msg.other { align-self: flex-start; border-top-left-radius: 0; }
        .msg.me { background: #005c4b !important; align-self: flex-end; border-top-right-radius: 0; }
        
        .msg b { display: block; font-size: 11px; margin-bottom: 2px; filter: brightness(1.8); }
        .msg small { font-size: 10px; opacity: 0.6; display: block; text-align: right; margin-top: 4px; }

        .controls { padding: 15px; background: #202c33; display: flex; gap: 10px; }
        #messageInput { flex: 1; background: #2a3942; border: none; color: white; padding: 12px; border-radius: 8px; outline: none; }
        #sendBtn { background: #00a884; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="chatWrapper">
        <div id="topBar">
            <input type="text" id="usernameInput" placeholder="Name">
            <input type="text" id="roomInput" placeholder="Room">
            <button onclick="connectToRoom()">Join</button>
            <button id="notifToggle" onclick="toggleNotifications()" title="Toggle Notifications">🔔</button>
            <button id="shareBtn" onclick="copyRoomLink()" title="Copy Room Link">🔗</button>
        </div>
        <div id="chatBox"></div>
        <div class="controls">
            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKey(event)">
            <button id="sendBtn" onclick="sendMsg()">Send</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, off } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhVAzRtPGuaFkhdT0wgvoLSEME7hYxOwY",
            authDomain: "mychatapp-10a99.firebaseapp.com",
            projectId: "mychatapp-10a99",
            storageBucket: "mychatapp-10a99.firebasestorage.app",
            messagingSenderId: "8158664716",
            appId: "1:8158664716:web:8a25281c2a1714ea557629",
            measurementId: "G-XHEXJCSHC2",
            databaseURL: "https://mychatapp-10a99-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const userInp = document.getElementById("usernameInput");
        const roomInp = document.getElementById("roomInput");
        const chatBox = document.getElementById("chatBox");
        const msgInp = document.getElementById("messageInput");
        const notifBtn = document.getElementById("notifToggle");

        const urlParams = new URLSearchParams(window.location.search);
        const roomFromUrl = urlParams.get('room');

        userInp.value = localStorage.getItem("chatUser") || "Guest" + Math.floor(Math.random() * 1000);
        roomInp.value = roomFromUrl || localStorage.getItem("chatRoom") || "Lobby";

        let currentRoomRef = null;
        // Load initial notification preference
        let notificationsEnabled = localStorage.getItem("notifEnabled") === "true";

        // --- Notification Logic ---
        function updateNotifUI() {
            if (notificationsEnabled && Notification.permission === "granted") {
                notifBtn.classList.add("on");
                notifBtn.innerText = "🔔";
            } else {
                notifBtn.classList.remove("on");
                notifBtn.innerText = "🔕";
            }
        }

        window.toggleNotifications = function() {
            if (!("Notification" in window)) {
                alert("This browser does not support notifications.");
                return;
            }

            if (Notification.permission === "denied") {
                alert("Notifications are blocked by your browser. Please enable them in your site settings.");
                return;
            }

            if (Notification.permission !== "granted") {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        notificationsEnabled = true;
                        finishToggle();
                    }
                });
            } else {
                notificationsEnabled = !notificationsEnabled;
                finishToggle();
            }
        };

        function finishToggle() {
            localStorage.setItem("notifEnabled", notificationsEnabled);
            updateNotifUI();
        }

        function showNotification(sender, text) {
            // Only trigger if enabled, permitted, and the user isn't currently looking at the chat
            if (notificationsEnabled && Notification.permission === "granted" && document.hidden) {
                new Notification(`New message from ${sender}`, {
                    body: text,
                    icon: "https://cdn-icons-png.flaticon.com/512/733/733585.png"
                });
            }
        }

        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
            return `hsl(${Math.abs(hash) % 360}, 50%, 30%)`;
        }

        window.connectToRoom = function() {
            const roomName = roomInp.value.trim() || "Lobby";
            localStorage.setItem("chatRoom", roomName);
            localStorage.setItem("chatUser", userInp.value.trim());

            if (currentRoomRef) off(currentRoomRef);
            chatBox.innerHTML = `<p style='text-align:center; font-size:12px; opacity:0.5; margin-bottom:10px;'>Room: ${roomName}</p>`; 

            currentRoomRef = ref(db, "rooms/" + roomName);

            onChildAdded(currentRoomRef, (snapshot) => {
                const data = snapshot.val();
                const isMe = data.name === userInp.value.trim();
                
                if (!isMe) {
                    showNotification(data.name, data.text);
                }

                const msgDiv = document.createElement("div");
                msgDiv.className = `msg ${isMe ? 'me' : 'other'}`;
                if (!isMe) msgDiv.style.backgroundColor = stringToColor(data.name);
                
                msgDiv.innerHTML = `
                    <b>${isMe ? 'You' : data.name}</b>
                    ${data.text}
                    <small>${data.time}</small>
                `;
                
                chatBox.appendChild(msgDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        };

        window.sendMsg = function() {
            const text = msgInp.value.trim();
            const name = userInp.value.trim();
            const room = roomInp.value.trim();

            if (text !== "" && room !== "") {
                push(ref(db, "rooms/" + room), {
                    name: name,
                    text: text,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
                msgInp.value = "";
            }
        };

        window.handleKey = function(e) {
            if (e.key === "Enter") sendMsg();
        };

        window.copyRoomLink = function() {
            const room = roomInp.value.trim();
            const url = window.location.origin + window.location.pathname + "?room=" + encodeURIComponent(room);
            navigator.clipboard.writeText(url);
            alert("Room link copied to clipboard!");
        };

        // Initialize UI and connection
        updateNotifUI();
        window.connectToRoom();
    </script>
</body>
</html>
