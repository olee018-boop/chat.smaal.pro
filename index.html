<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Chat Elite v4.5</title>
    <style>
        :root {
            --bg: #09090b; --panel: rgba(30, 30, 35, 0.95);
            --accent: #10b981; --text: #fafafa; --msg-me: #059669;
            --glass: blur(20px) saturate(180%);
            --safe-bottom: env(safe-area-inset-bottom);
            --transit: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="midnight"] { --bg: #020617; --accent: #6366f1; --msg-me: #4338ca; }
        [data-theme="rose"] { --bg: #0f0505; --accent: #f43f5e; --msg-me: #be123c; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; position: fixed; width: 100%; }

        #app { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 600px; margin: 0 auto; position: relative; overflow: hidden; transition: var(--transit); }

        .screen { display: none; flex-direction: column; height: 100%; animation: slideUp 0.4s ease; }
        .screen.active { display: flex; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { padding: 15px 20px; background: var(--panel); backdrop-filter: var(--glass); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 100; padding-top: env(safe-area-inset-top); }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 180px; }
        
        .nav-bar { position: absolute; bottom: calc(15px + var(--safe-bottom)); left: 5%; width: 90%; height: 65px; background: var(--panel); backdrop-filter: var(--glass); border-radius: 20px; display: flex; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; opacity: 0.5; transition: var(--transit); position: relative; }
        .nav-btn.active { opacity: 1; color: var(--accent); transform: translateY(-5px); }
        .notif-dot { position: absolute; top: 15px; right: 25%; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; display: none; }

        .input-wrap { position: absolute; bottom: 90px; left: 0; width: 100%; padding: 12px; display: flex; gap: 10px; background: var(--panel); backdrop-filter: var(--glass); border-top: 1px solid rgba(255,255,255,0.1); }

        .msg { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; margin-bottom: 4px; animation: msgIn 0.3s ease; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; background: #27272a; word-wrap: break-word; }
        .me .bubble { background: var(--msg-me); border-bottom-right-radius: 4px; }
        
        /* System Messages */
        .msg.system { align-self: center; max-width: 90%; margin: 10px 0; }
        .msg.system .bubble { background: rgba(255,255,255,0.05); color: #94a3b8; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; text-align: center; }

        .pfp { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #444; flex-shrink: 0; }
        
        input, select { background: #18181b; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; font-size: 16px; margin-bottom: 8px; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: var(--transit); }
        .sec-btn { background: #27272a; }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #27272a; border: 1px solid var(--accent); color: white; padding: 8px 16px; border-radius: 20px; z-index: 3000; display: none; font-size: 13px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2500; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-box { background: #18181b; padding: 20px; border-radius: 24px; width: 100%; max-width: 320px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 15px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; margin-right: 5px; display: inline-block; }
        .status-dot.online { background: #10b981; box-shadow: 0 0 5px #10b981; }

        @media (min-width: 768px) { #app { max-width: 100%; } .nav-bar { width: 50%; left: 25%; } .msg { max-width: 50%; } }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="passModal" class="modal-overlay">
    <div class="modal-box">
        <h3>Private Access</h3>
        <p id="passModalTitle" style="font-size:12px; opacity:0.6; margin:10px 0;"></p>
        <input type="password" id="lobbyPassVerify" placeholder="Enter Password">
        <button id="passConfirmBtn" style="width:100%; margin-bottom:8px;">Unlock</button>
        <button onclick="document.getElementById('passModal').style.display='none'; setTab('home');" class="sec-btn" style="width:100%">Cancel</button>
    </div>
</div>

<div id="modal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitle">Confirm</h3>
        <p id="modalText" style="margin: 12px 0; opacity: 0.7; font-size: 14px;"></p>
        <button id="modalConfirm" style="width:100%; margin-bottom: 8px;">Confirm</button>
        <button onclick="closeModal()" class="sec-btn" style="width:100%">Cancel</button>
    </div>
</div>

<div id="lobbyCreateModal" class="modal-overlay">
    <div class="modal-box">
        <h3>Create Private Lobby</h3>
        <input type="text" id="lobbyNameInp" placeholder="Lobby Name (Required)">
        <input type="text" id="lobbyPassInp" placeholder="Password (Optional)">
        <button onclick="confirmCreateLobby()" style="width:100%; margin-bottom: 8px;">Create & Join</button>
        <button onclick="document.getElementById('lobbyCreateModal').style.display='none'" class="sec-btn" style="width:100%">Cancel</button>
    </div>
</div>

<div id="loginScreen" style="position:fixed; inset:0; background:var(--bg); z-index:2000; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="width: 100%; max-width: 300px; text-align:center;">
        <h1>Pro Chat <span style="font-size:10px; background:#444; padding:2px 5px; border-radius:4px;">v4.5</span></h1>
        <input type="text" id="userInp" placeholder="Username" style="margin-top:20px">
        <input type="password" id="passInp" placeholder="Password">
        <button onclick="login()" style="width:100%">Enter</button>
    </div>
</div>

<div id="app">
    <div id="home" class="screen active">
        <div class="header"><h2>Home</h2></div>
        <div style="flex: 1; overflow-y: auto; padding: 20px 20px 150px;">
            <p style="font-size: 11px; font-weight: 800; opacity: 0.4; margin-bottom: 12px;">FRIENDS</p>
            <div id="friendList"></div>
            <p style="font-size: 11px; font-weight: 800; opacity: 0.4; margin: 25px 0 12px;">PINNED ROOMS</p>
            <div id="roomList"></div>
            <div style="margin-top: 20px; display: flex; gap: 8px;">
                <input type="text" id="newRoomInp" placeholder="Public ID..." style="margin-bottom:0">
                <button onclick="joinRoom()" style="padding: 0 15px;">Join</button>
            </div>
            <button onclick="document.getElementById('lobbyCreateModal').style.display='flex'" class="sec-btn" style="width:100%; border: 1px dashed var(--accent); margin-top:15px;">+ Create Private Lobby</button>
        </div>
    </div>

    <div id="chat" class="screen">
        <div class="header">
            <span onclick="leaveChatRoom()" style="cursor:pointer; font-size: 20px;">✕</span>
            <div>
                <b id="chatTitle">...</b>
                <div id="onlineCount" style="font-size:10px; opacity:0.5; text-align:center;">0 online</div>
            </div>
            <div class="header-actions">
                <span id="lobbyActionIcon" onclick="manageLobby()" style="cursor:pointer; font-size: 18px; display:none;">⚙️</span>
                <span id="shareIcon" onclick="shareLobby()" style="cursor:pointer; font-size: 18px;">🔗</span>
                <span id="pinIcon" onclick="togglePin()" style="cursor:pointer; font-size: 20px;">☆</span>
            </div>
        </div>
        <div id="chatBox"></div>
        <div class="input-wrap">
            <input type="file" id="fileInp" style="display:none" accept="image/*" onchange="sendMedia(this)">
            <button onclick="document.getElementById('fileInp').click()" class="sec-btn" style="width:45px">+</button>
            <input type="text" id="msgInp" placeholder="Message..." onkeypress="if(event.key==='Enter') sendText()">
            <button onclick="sendText()" style="width:60px">➤</button>
        </div>
    </div>

    <div id="notifications" class="screen">
        <div class="header"><h2>Notifications</h2></div>
        <div id="pendingRequests" style="padding:20px;"></div>
    </div>

    <div id="people" class="screen">
        <div class="header"><h2>Explore</h2></div>
        <div id="allUsers" style="padding:20px;"></div>
    </div>

    <div id="settings" class="screen">
        <div class="header"><h2>Settings</h2></div>
        <div style="padding: 20px;">
            <img id="myPFP" class="pfp" style="width:80px; height:80px; display:block; margin:0 auto 20px;">
            <button onclick="logout()" style="width:100%; background:#333;">Log Out</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="setTab('home')" id="btn-home">🏠</div>
        <div class="nav-btn" onclick="setTab('people')" id="btn-people">🧭</div>
        <div class="nav-btn" onclick="setTab('notifications')" id="btn-notifications">🔔<div class="notif-dot" id="notifDot"></div></div>
        <div class="nav-btn" onclick="setTab('settings')" id="btn-settings">⚙️</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, get, remove, update, onDisconnect } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBUl-7CM3nl38AIr7MUb8fozBCikz1No7g",
        authDomain: "hostpxp.firebaseapp.com",
        databaseURL: "https://hostpxp-default-rtdb.firebaseio.com",
        projectId: "hostpxp",
        storageBucket: "hostpxp.firebasestorage.app",
        messagingSenderId: "891844604890",
        appId: "1:891844604890:web:b7bc043499d024207d86e3"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);
    let currentUser = localStorage.getItem("chatU");
    let activeChatId = null;
    let isDM = false;

    // --- SYSTEM UTILS ---
    window.showToast = (m) => { const t = document.getElementById("toast"); t.innerText = m; t.style.display="block"; setTimeout(()=>t.style.display="none", 2500); };
    window.closeModal = () => document.getElementById("modal").style.display="none";
    window.openModal = (t, m, c) => { document.getElementById("modalTitle").innerText=t; document.getElementById("modalText").innerText=m; document.getElementById("modal").style.display="flex"; document.getElementById("modalConfirm").onclick=()=>{c();closeModal();}; };

    // Request Notification Permission
    if (Notification.permission !== 'granted') Notification.requestPermission();

    function pushNotify(title, body) {
        if (Notification.permission === 'granted') {
            new Notification(title, { body: body, icon: 'https://api.dicebear.com/7.x/avataaars/svg?seed=system' });
        }
    }

    // --- PRESENCE & LOGIN ---
    window.login = async () => {
        const u = document.getElementById("userInp").value.trim().toLowerCase();
        const p = document.getElementById("passInp").value.trim();
        if(!u || !p) return showToast("Required");
        const snap = await get(ref(db, 'users/' + u));
        if(snap.exists() && snap.val().pass !== p) return showToast("Wrong Pass");
        if(!snap.exists()) await set(ref(db, 'users/' + u), { pass: p, pfp: `https://api.dicebear.com/7.x/avataaars/svg?seed=${u}` });
        localStorage.setItem("chatU", u); location.reload();
    };

    if(currentUser) {
        document.getElementById("loginScreen").style.display = "none";
        // Online Presence
        const myStatusRef = ref(db, 'status/' + currentUser);
        set(myStatusRef, true);
        onDisconnect(myStatusRef).remove();
        syncSocial(); renderPins();
    }

    // --- LOBBY LOGIC ---
    window.joinRoom = async (n) => {
        const r = n || document.getElementById("newRoomInp").value.trim(); if(!r) return;
        const metaSnap = await get(ref(db, 'rooms_meta/' + r));
        
        if(metaSnap.exists()) {
            const meta = metaSnap.val();
            if(meta.deletedBy) return showToast("Lobby Deleted by " + meta.deletedBy);
            
            // Password Check
            if(meta.password && meta.creator !== currentUser && !localStorage.getItem("unlocked_"+r)) {
                document.getElementById('passModalTitle').innerText = "Joining: " + meta.name;
                document.getElementById('passModal').style.display = 'flex';
                document.getElementById('passConfirmBtn').onclick = async () => {
                    const typed = document.getElementById('lobbyPassVerify').value;
                    if(typed === meta.password) {
                        localStorage.setItem("unlocked_"+r, "true");
                        document.getElementById('passModal').style.display = 'none';
                        completeJoin(r, meta);
                    } else {
                        // Notify Creator of failed attempt
                        systemMsg(r, `⚠️ Failed entry attempt by ${currentUser}`);
                        showToast("Incorrect Password");
                    }
                };
                return;
            }
            completeJoin(r, meta);
        } else {
            completeJoin(r, { name: r });
        }
    };

    async function completeJoin(id, meta) {
        activeChatId = id; isDM = false;
        document.getElementById("chatTitle").innerText = meta.name;
        document.getElementById("chatBox").innerHTML = "";
        document.getElementById("lobbyActionIcon").style.display = meta.creator === currentUser ? "inline-block" : "none";
        setTab('chat');
        
        // Online Counter
        onValue(ref(db, 'room_presence/' + id), (s) => {
            document.getElementById('onlineCount').innerText = `${s.exists() ? Object.keys(s.val()).length : 0} online`;
        });
        
        // Presence in room
        const roomPres = ref(db, `room_presence/${id}/${currentUser}`);
        set(roomPres, true);
        onDisconnect(roomPres).remove();

        systemMsg(id, `🟢 ${currentUser} joined the lobby`);
        onChildAdded(ref(db, 'rooms/' + id), (s) => renderMsg(s.val()));
    }

    window.leaveChatRoom = () => {
        if(activeChatId && !isDM) {
            systemMsg(activeChatId, `🔴 ${currentUser} left the chat`);
            remove(ref(db, `room_presence/${activeChatId}/${currentUser}`));
        }
        setTab('home');
    };

    async function systemMsg(roomId, text) {
        push(ref(db, 'rooms/' + roomId), { sender: "SYSTEM", text: text, time: Date.now() });
    }

    // --- CORE RENDERING ---
    function renderMsg(d) {
        const box = document.getElementById("chatBox");
        const div = document.createElement("div");
        const isMe = d.sender === currentUser;
        const isSys = d.sender === "SYSTEM";
        
        div.className = `msg ${isMe ? 'me' : ''} ${isSys ? 'system' : ''}`;
        if(isSys) {
            div.innerHTML = `<div class="bubble">${d.text}</div>`;
        } else {
            div.innerHTML = `<img src="${d.pfp}" class="pfp"><div class="bubble"><small style="display:block;font-size:9px;opacity:0.5">${d.sender}</small>${d.text || `<img src="${d.media}" style="max-width:100%; border-radius:10px">`}</div>`;
            if(!isMe && document.visibilityState === 'hidden') pushNotify(`New message from ${d.sender}`, d.text || "Image");
        }
        box.appendChild(div); box.scrollTop = box.scrollHeight;
    }

    window.sendText = async () => {
        const i = document.getElementById("msgInp"); if(!i.value.trim()) return;
        const pfp = (await get(ref(db, `users/${currentUser}/pfp`))).val();
        const path = isDM ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
        push(ref(db, path), { sender: currentUser, text: i.value, pfp: pfp || "", time: Date.now() });
        i.value = "";
    };

    window.sendMedia = (input) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
            const pfp = (await get(ref(db, `users/${currentUser}/pfp`))).val();
            push(ref(db, (isDM ? 'dms/' : 'rooms/') + activeChatId), { sender: currentUser, text: "", media: e.target.result, pfp: pfp, time: Date.now() });
        };
        reader.readAsDataURL(input.files[0]);
    };

    // --- SOCIAL & FRIENDS ---
    function syncSocial() {
        onValue(ref(db, 'users'), snap => {
            const list = document.getElementById("allUsers"); list.innerHTML = "";
            snap.forEach(c => {
                if(c.key === currentUser) return;
                onValue(ref(db, 'status/'+c.key), s => {
                    const isOnline = s.exists();
                    const d = document.createElement("div"); d.className = "list-item";
                    d.innerHTML = `<span><span class="status-dot ${isOnline?'online':''}"></span>${c.key}</span> <button onclick="sendReq('${c.key}')" style="padding:5px 10px; font-size:11px">Add</button>`;
                    list.appendChild(d);
                });
            });
        });

        onValue(ref(db, 'requests/'+currentUser), s => {
            const dot = document.getElementById("notifDot");
            dot.style.display = s.exists() ? "block" : "none";
            if(s.exists()) pushNotify("New Friend Request", "Someone wants to be your friend!");
            // ... (rest of render code from v4.4)
        });
    }

    // Required by logic
    window.setTab = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
    };

    window.logout = () => { localStorage.clear(); location.reload(); };
    window.confirmCreateLobby = async () => {
        const n = document.getElementById('lobbyNameInp').value;
        const p = document.getElementById('lobbyPassInp').value;
        const id = "lobby_" + Math.random().toString(36).substr(2, 9);
        await set(ref(db, 'rooms_meta/' + id), { name: n, password: p, creator: currentUser });
        document.getElementById('lobbyCreateModal').style.display='none';
        joinRoom(id);
    };

    window.manageLobby = () => {
        openModal("Delete Lobby", "Permanently delete this lobby?", async () => {
            await update(ref(db, 'rooms_meta/' + activeChatId), { deletedBy: currentUser });
            leaveChatRoom();
        });
    };
</script>
</body>
</html>
