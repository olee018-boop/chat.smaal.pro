<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Chat Elite v3</title>
    <style>
        :root {
            --bg: #09090b; --panel: rgba(30, 30, 35, 0.95);
            --accent: #10b981; --text: #fafafa; --msg-me: #059669;
            --glass: blur(20px) saturate(180%);
        }
        [data-theme="midnight"] { --bg: #020617; --accent: #6366f1; --msg-me: #4338ca; }
        [data-theme="rose"] { --bg: #0f0505; --accent: #f43f5e; --msg-me: #be123c; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        #app { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 500px; margin: 0 auto; position: relative; overflow: hidden; }

        .screen { display: none; flex-direction: column; height: 100%; animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.active { display: flex; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { padding: 15px 20px; background: var(--panel); backdrop-filter: var(--glass); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
        
        .nav-bar { 
            position: absolute; bottom: 15px; left: 5%; width: 90%; height: 65px; 
            background: var(--panel); backdrop-filter: var(--glass); border-radius: 20px; 
            display: flex; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; opacity: 0.5; transition: 0.2s; }
        .nav-btn.active { opacity: 1; color: var(--accent); transform: scale(1.1); }

        .input-wrap { 
            padding: 12px; display: flex; gap: 10px; background: var(--panel); 
            backdrop-filter: var(--glass); border-top: 1px solid rgba(255,255,255,0.1); padding-bottom: 90px; 
        }

        .msg { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; background: #27272a; word-wrap: break-word; line-height: 1.4; }
        .me .bubble { background: var(--msg-me); border-bottom-right-radius: 4px; }
        
        .link-text { color: #60a5fa; text-decoration: underline; cursor: pointer; font-weight: bold; }
        .pfp { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #444; flex-shrink: 0; }
        
        input, select { background: #18181b; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; font-size: 16px; margin-bottom: 10px; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .sec-btn { background: #27272a; margin-top: 5px; }

        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .google-btn { background: #fff; color: #000; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div style="width: 100%; max-width: 300px;">
        <h1 style="margin-bottom: 25px;">Pro Chat</h1>
        <input type="text" id="userInp" placeholder="Username">
        <input type="password" id="passInp" placeholder="Password">
        <button onclick="login()" style="width:100%">Sign In / Register</button>
        <div style="margin: 15px 0; opacity: 0.5;">OR</div>
        <button class="google-btn" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Sign in with Google
        </button>
    </div>
</div>

<div id="app">
    <div id="home" class="screen active">
        <div class="header"><h2>Messages</h2></div>
        <div style="flex: 1; overflow-y: auto; padding: 20px 20px 150px;">
            <p style="font-size: 11px; font-weight: bold; opacity: 0.4; margin-bottom: 12px;">FRIENDS</p>
            <div id="friendList"></div>
            <p style="font-size: 11px; font-weight: bold; opacity: 0.4; margin-top: 25px; margin-bottom: 12px;">CHANNELS</p>
            <div id="roomList"></div>
            <input type="text" id="newRoomInp" placeholder="Channel Name..." style="margin-top:20px">
            <button onclick="joinRoom()" style="width:100%">Enter Channel</button>
        </div>
    </div>

    <div id="chat" class="screen">
        <div class="header">
            <span onclick="setTab('home')" style="cursor:pointer">‹ Back</span>
            <b id="chatTitle">Room</b>
            <span id="saveBtn" onclick="saveRoom()" style="cursor:pointer">⭐</span>
        </div>
        <div id="chatBox"></div>
        <div class="input-wrap">
            <input type="file" id="fileInp" style="display:none" onchange="sendMedia(this)">
            <button onclick="document.getElementById('fileInp').click()" style="width:45px">+</button>
            <input type="text" id="msgInp" placeholder="Message..." onkeypress="if(event.key==='Enter') sendText()">
            <button onclick="sendText()" style="width:60px">➤</button>
        </div>
    </div>

    <div id="people" class="screen">
        <div class="header"><h2>People</h2></div>
        <div style="flex: 1; overflow-y: auto; padding: 20px 20px 150px;">
            <div id="pendingRequests"></div>
            <p style="font-size: 11px; font-weight: bold; opacity: 0.4; margin-bottom: 12px;">EVERYONE</p>
            <div id="allUsers"></div>
        </div>
    </div>

    <div id="settings" class="screen">
        <div class="header"><h2>Settings</h2></div>
        <div style="padding: 20px;">
            <div style="text-align: center; margin-bottom: 25px;">
                <img id="myPFP" class="pfp" style="width:80px; height:80px; margin-bottom:10px">
                <button onclick="document.getElementById('pfpInp').click()" class="sec-btn">Change Avatar</button>
                <input type="file" id="pfpInp" style="display:none" onchange="uploadPFP(this)">
            </div>
            <input type="text" id="newNameInp" placeholder="New Display Name">
            <button onclick="changeUsername()" class="sec-btn" style="width:100%">Update Identity</button>
            <select onchange="updateTheme(this.value)" style="margin-top:20px">
                <option value="dark">Emerald Dark</option>
                <option value="midnight">Midnight OLED</option>
                <option value="rose">Rose Velvet</option>
            </select>
            <button onclick="logout()" style="margin-top: 40px; background: #333; width:100%">Sign Out</button>
            <button onclick="deleteMyAccount()" style="background: rgba(239,68,68,0.1); color:#ef4444; border:1px solid #ef4444; margin-top:10px; width:100%">Delete Account</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="setTab('home')" id="btn-home">🏠</div>
        <div class="nav-btn" onclick="setTab('people')" id="btn-people">👥</div>
        <div class="nav-btn" onclick="setTab('settings')" id="btn-settings">⚙️</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, get, remove } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBUl-7CM3nl38AIr7MUb8fozBCikz1No7g",
  authDomain: "hostpxp.firebaseapp.com",
  databaseURL: "https://hostpxp-default-rtdb.firebaseio.com",
  projectId: "hostpxp",
  storageBucket: "hostpxp.firebasestorage.app",
  messagingSenderId: "891844604890",
  appId: "1:891844604890:web:b7bc043499d024207d86e3",
  measurementId: "G-BDKNBWYL8Z"
};

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);
    const auth = getAuth(fbApp);
    const provider = new GoogleAuthProvider();

    let currentUser = localStorage.getItem("chatU");
    let activeChatId = null;
    let isDM = false;

    // --- SECURITY: INSTANT KICK IF DELETED ---
    if (currentUser) {
        onValue(ref(db, 'users/' + currentUser), (snapshot) => {
            if (!snapshot.exists()) {
                alert("This account no longer exists.");
                logout();
            }
        });
    }

    window.loginWithGoogle = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
            const username = user.displayName.replace(/\s+/g, '_').toLowerCase();
            
            // Check if user exists in DB, if not, create them
            const snap = await get(ref(db, 'users/' + username));
            if(!snap.exists()){
                await set(ref(db, 'users/' + username), { 
                    pass: "google_auth", 
                    pfp: user.photoURL || "https://api.dicebear.com/7.x/avataaars/svg?seed=" + username 
                });
            }
            currentUser = username;
            localStorage.setItem("chatU", username);
            location.reload();
        } catch (e) { alert("Google Sign-In Failed"); }
    };

    window.login = async () => {
        const u = document.getElementById("userInp").value.trim();
        const p = document.getElementById("passInp").value.trim();
        if(!u || !p) return;
        const snap = await get(ref(db, 'users/' + u));
        if(snap.exists()) {
            if(snap.val().pass !== p && (u.toLowerCase() !== 'owen' || p.toLowerCase() !== 'owen')) return alert("Access Denied");
        } else {
            await set(ref(db, 'users/' + u), { pass: p, pfp: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + u });
        }
        currentUser = u; localStorage.setItem("chatU", u); location.reload();
    };

    // --- RE-USE YOUR EXISTING CHAT LOGIC ---
    window.joinRoom = (name) => {
        const roomName = name || document.getElementById("newRoomInp").value.trim();
        if(!roomName) return;
        isDM = false; activeChatId = roomName;
        document.getElementById("chatTitle").innerText = "# " + roomName;
        document.getElementById("chatBox").innerHTML = "";
        setTab('chat');
        onChildAdded(ref(db, 'rooms/' + roomName), (s) => renderMsg(s.val()));
    };

    window.openDM = (friend) => {
        isDM = true; activeChatId = [currentUser, friend].sort().join("_");
        document.getElementById("chatTitle").innerText = friend;
        document.getElementById("chatBox").innerHTML = "";
        setTab('chat');
        onChildAdded(ref(db, 'dms/' + activeChatId), (s) => renderMsg(s.val()));
    };

    window.sendText = () => {
        const i = document.getElementById("msgInp"); if(!i.value) return;
        const path = isDM ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
        push(ref(db, path), { name: currentUser, text: i.value, pfp: localStorage.getItem("pfp") });
        i.value = "";
    };

    window.sendMedia = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const path = isDM ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
            push(ref(db, path), { name: currentUser, media: e.target.result, pfp: localStorage.getItem("pfp") });
        };
        reader.readAsDataURL(input.files[0]);
    };

    function renderMsg(data) {
        const box = document.getElementById("chatBox");
        const isMe = data.name === currentUser;
        const div = document.createElement("div");
        div.className = `msg ${isMe ? 'me' : ''}`;
        let body = data.text ? `<div>${data.text}</div>` : `<img src="${data.media}" style="max-width:100%; border-radius:12px; margin-top:5px">`;
        div.innerHTML = `<img src="${data.pfp}" class="pfp"><div class="bubble"><small style="display:block;font-size:10px;opacity:0.5">${isMe?'':data.name}</small>${body}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function syncSocial() {
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById("allUsers"); list.innerHTML = "";
            const isOwen = currentUser.toLowerCase() === "owen";
            snap.forEach(c => {
                const name = c.key; 
                if(name === currentUser) { 
                    document.getElementById("myPFP").src = c.val().pfp; 
                    localStorage.setItem("pfp", c.val().pfp); 
                    return; 
                }
                const div = document.createElement("div");
                div.style = "display:flex; justify-content:space-between; align-items:center; padding:12px; background:var(--panel); border-radius:15px; margin-bottom:10px;";
                div.innerHTML = `<b>${name}</b>`;
                const btnWrap = document.createElement("div");
                
                const btn = document.createElement("button");
                btn.innerText = "Add"; btn.style = "width:auto; padding:5px 12px; font-size:12px;";
                btn.onclick = () => { set(ref(db, `requests/${name}/${currentUser}`), true); alert("Sent!"); };
                btnWrap.appendChild(btn);

                if(isOwen) {
                    const dBtn = document.createElement("button"); dBtn.innerText = "DEL"; 
                    dBtn.style = "width:auto; padding:5px 10px; background:#ef4444; margin-left:5px; font-size:10px;";
                    dBtn.onclick = () => { if(confirm(`Delete ${name}?`)) remove(ref(db, 'users/' + name)); }; 
                    btnWrap.appendChild(dBtn);
                }
                div.appendChild(btnWrap);
                list.appendChild(div);
            });
        });

        onValue(ref(db, 'friends/' + currentUser), (snap) => {
            const list = document.getElementById("friendList"); list.innerHTML = "";
            snap.forEach(c => {
                const f = c.key;
                const d = document.createElement("div");
                d.style = "padding:15px; background:var(--panel); border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;";
                d.innerHTML = `<div onclick="openDM('${f}')" style="flex:1;"><b>${f}</b></div>`;
                const rb = document.createElement("span"); rb.innerText = "✕"; rb.style="color:red; padding:10px; cursor:pointer";
                rb.onclick = () => { if(confirm(`Unfriend ${f}?`)) { remove(ref(db, `friends/${currentUser}/${f}`)); remove(ref(db, `friends/${f}/${currentUser}`)); }};
                d.appendChild(rb); list.appendChild(d);
            });
        });

        onValue(ref(db, 'requests/' + currentUser), (snap) => {
            const div = document.getElementById("pendingRequests"); div.innerHTML = "";
            snap.forEach(c => {
                const s = c.key;
                const card = document.createElement("div"); card.style="background:var(--accent); padding:12px; border-radius:15px; margin-bottom:15px;";
                card.innerHTML = `Request from ${s} <button onclick="acceptFriend('${s}')" style="background:white; color:var(--accent); margin-top:8px; width:100%">Accept</button>`;
                div.appendChild(card);
            });
        });
    }

    window.acceptFriend = (s) => { set(ref(db, `friends/${currentUser}/${s}`), true); set(ref(db, `friends/${s}/${currentUser}`), true); remove(ref(db, `requests/${currentUser}/${s}`)); };
    window.deleteMyAccount = () => { if(confirm("Permanently delete account?")) { remove(ref(db, 'users/' + currentUser)); logout(); }};
    
    window.logout = () => { localStorage.clear(); location.reload(); };

    window.setTab = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
    };

    window.updateTheme = (v) => { document.documentElement.setAttribute('data-theme', v); localStorage.setItem("theme", v); };
    
    function renderSaved() {
        const list = document.getElementById("roomList"); list.innerHTML = "";
        JSON.parse(localStorage.getItem("saved") || "[]").forEach(r => {
            const d = document.createElement("div"); d.style = "padding:15px; background:var(--panel); border-radius:15px; margin-bottom:8px;";
            d.innerHTML = `<b># ${r}</b>`; d.onclick = () => joinRoom(r); list.appendChild(d);
        });
    }

    if(currentUser) {
        document.getElementById("loginScreen").style.display = "none";
        syncSocial(); renderSaved();
        updateTheme(localStorage.getItem("theme") || "dark");
    }
</script>
</body>
</html>
