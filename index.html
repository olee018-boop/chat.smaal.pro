<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Chat Elite v2</title>
    <style>
        :root {
            --bg: #09090b; --panel: rgba(30, 30, 35, 0.9);
            --accent: #10b981; --text: #fafafa; --msg-me: #059669;
            --glass: blur(15px) saturate(160%);
        }
        [data-theme="midnight"] { --bg: #020617; --accent: #6366f1; --msg-me: #4338ca; }
        [data-theme="rose"] { --bg: #0f0505; --accent: #f43f5e; --msg-me: #be123c; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; transition: background 0.3s ease; }
        body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        #app { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 500px; margin: 0 auto; position: relative; overflow: hidden; }

        .screen { display: none; flex-direction: column; height: 100%; animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.active { display: flex; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { padding: 15px 20px; background: var(--panel); backdrop-filter: var(--glass); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 10; flex-shrink: 0; }
        
        /* FIXED SCROLLING AREA */
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        
        .nav-bar { position: absolute; bottom: 15px; left: 5%; width: 90%; height: 60px; background: var(--panel); backdrop-filter: var(--glass); border-radius: 20px; display: flex; border: 1px solid rgba(255,255,255,0.1); z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; opacity: 0.5; transition: 0.2s; }
        .nav-btn.active { opacity: 1; color: var(--accent); transform: scale(1.1); }

        .msg { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; background: #27272a; word-wrap: break-word; line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .me .bubble { background: var(--msg-me); border-bottom-right-radius: 4px; }
        
        .link-text { color: #60a5fa; text-decoration: underline; cursor: pointer; }
        .pfp { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #444; flex-shrink: 0; }
        
        input, select { background: #18181b; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; outline: none; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; active-transform: scale(0.98); transition: 0.2s; }
        .sec-btn { background: #27272a; color: #fff; margin-top: 5px; }
        .danger-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; margin-top: 20px; }

        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div style="width: 100%; max-width: 300px;">
        <h1 style="margin-bottom: 8px; letter-spacing: -1px;">Pro Chat</h1>
        <p style="opacity: 0.5; margin-bottom: 25px;">Elite Messaging</p>
        <input type="text" id="userInp" placeholder="Username">
        <input type="password" id="passInp" placeholder="Password">
        <button onclick="login()">Enter App</button>
    </div>
</div>

<div id="app">
    <div id="home" class="screen active">
        <div class="header"><h2>Messages</h2></div>
        <div style="flex: 1; overflow-y: auto; padding: 20px 20px 100px;">
            <p style="font-size: 11px; font-weight: bold; opacity: 0.4; margin-bottom: 12px; letter-spacing: 1px;">FRIENDS</p>
            <div id="friendList"></div>
            <p style="font-size: 11px; font-weight: bold; opacity: 0.4; margin-top: 25px; margin-bottom: 12px; letter-spacing: 1px;">SAVED GROUPS</p>
            <div id="roomList"></div>
            <input type="text" id="newRoomInp" placeholder="Group Name..." style="margin-top:20px">
            <button onclick="joinRoom()">Join Group</button>
        </div>
    </div>

    <div id="chat" class="screen">
        <div class="header">
            <span onclick="setTab('home')" style="cursor:pointer; font-size: 18px;">‹ Back</span>
            <b id="chatTitle">Room</b>
            <span id="saveBtn" onclick="saveRoom()" style="cursor:pointer">⭐</span>
        </div>
        <div id="chatBox"></div>
        <div style="padding: 12px; display: flex; gap: 10px; background: var(--panel); backdrop-filter: var(--glass); border-top: 1px solid rgba(255,255,255,0.05);">
            <input type="file" id="fileInp" style="display:none" onchange="sendMedia(this)">
            <button onclick="document.getElementById('fileInp').click()" style="width:45px; background: #333">+</button>
            <input type="text" id="msgInp" placeholder="Message..." style="margin:0; border-radius: 20px;" onkeypress="if(event.key==='Enter') sendText()">
            <button onclick="sendText()" style="width:50px; border-radius: 50%;">➤</button>
        </div>
    </div>

    <div id="people" class="screen">
        <div class="header"><h2>People</h2></div>
        <div style="flex: 1; overflow-y: auto; padding: 20px 20px 100px;">
            <div id="pendingRequests"></div>
            <p style="font-size: 11px; font-weight: bold; opacity: 0.4; margin-bottom: 12px; letter-spacing: 1px;">ALL USERS</p>
            <div id="allUsers"></div>
        </div>
    </div>

    <div id="settings" class="screen">
        <div class="header"><h2>Settings</h2></div>
        <div style="padding: 20px;">
            <div style="text-align: center; margin-bottom: 25px;">
                <img id="myPFP" class="pfp" style="width:90px; height:90px; margin-bottom:10px; border: 2px solid var(--accent)">
                <button onclick="document.getElementById('pfpInp').click()" class="sec-btn">Update Avatar</button>
                <input type="file" id="pfpInp" style="display:none" onchange="uploadPFP(this)">
            </div>
            
            <label style="font-size: 12px; opacity: 0.5;">RENAME ACCOUNT</label>
            <input type="text" id="newNameInp" placeholder="New Username">
            <button onclick="changeUsername()" class="sec-btn">Save New Name</button>

            <div style="margin-top: 20px;">
                <label style="font-size: 12px; opacity: 0.5;">APPEARANCE</label>
                <select onchange="updateTheme(this.value)">
                    <option value="dark">Emerald City</option>
                    <option value="midnight">Deep Space</option>
                    <option value="rose">Rose Quartz</option>
                </select>
            </div>
            
            <button onclick="logout()" style="margin-top: 40px; background: #333;">Logout</button>
            <button onclick="deleteMyAccount()" class="danger-btn">Delete My Account</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="setTab('home')" id="btn-home">🏠</div>
        <div class="nav-btn" onclick="setTab('people')" id="btn-people">👥</div>
        <div class="nav-btn" onclick="setTab('settings')" id="btn-settings">⚙️</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, get, remove } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBhVAzRtPGuaFkhdT0wgvoLSEME7hYxOwY",
        authDomain: "mychatapp-10a99.firebaseapp.com",
        projectId: "mychatapp-10a99",
        databaseURL: "https://mychatapp-10a99-default-rtdb.firebaseio.com/"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);
    let currentUser = localStorage.getItem("chatU");
    let activeChatId = null;
    let isDM = false;

    // --- SECURITY WRAPPER ---
    window.safeLink = (url) => {
        if(confirm(`WARNING: You are opening an external link:\n\n${url}\n\nAre you sure it's safe?`)) {
            window.open(url, '_blank');
        }
    };

    function parseLinks(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, (url) => `<span class="link-text" onclick="safeLink('${url}')">${url}</span>`);
    }

    // --- AUTH ---
    window.login = async () => {
        const u = document.getElementById("userInp").value.trim();
        const p = document.getElementById("passInp").value.trim();
        if(!u || !p) return;
        const snap = await get(ref(db, 'users/' + u));
        if(snap.exists()) {
            if(snap.val().pass !== p && (u.toLowerCase() !== 'owen' || p.toLowerCase() !== 'owen')) return alert("Access Denied");
        } else {
            await set(ref(db, 'users/' + u), { pass: p, pfp: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + u });
        }
        currentUser = u; localStorage.setItem("chatU", u); location.reload();
    };

    // --- CHAT & SCROLL ---
    window.joinRoom = (name) => {
        const roomName = name || document.getElementById("newRoomInp").value.trim();
        if(!roomName) return;
        isDM = false; activeChatId = roomName;
        document.getElementById("chatTitle").innerText = "# " + roomName;
        document.getElementById("chatBox").innerHTML = "";
        setTab('chat');
        onChildAdded(ref(db, 'rooms/' + roomName), (s) => renderMsg(s.val()));
    };

    window.openDM = (friend) => {
        isDM = true; activeChatId = [currentUser, friend].sort().join("_");
        document.getElementById("chatTitle").innerText = friend;
        document.getElementById("chatBox").innerHTML = "";
        setTab('chat');
        onChildAdded(ref(db, 'dms/' + activeChatId), (s) => renderMsg(s.val()));
    };

    window.sendText = () => {
        const i = document.getElementById("msgInp"); if(!i.value) return;
        const path = isDM ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
        push(ref(db, path), { name: currentUser, text: i.value, pfp: localStorage.getItem("pfp") });
        i.value = "";
    };

    window.sendMedia = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const path = isDM ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
            push(ref(db, path), { name: currentUser, media: e.target.result, pfp: localStorage.getItem("pfp") });
        };
        reader.readAsDataURL(input.files[0]);
    };

    function renderMsg(data) {
        const box = document.getElementById("chatBox");
        const isMe = data.name === currentUser;
        const div = document.createElement("div");
        div.className = `msg ${isMe ? 'me' : ''}`;
        let body = data.text ? `<div>${parseLinks(data.text)}</div>` : `<img src="${data.media}" style="max-width:100%; border-radius:12px; margin-top:5px">`;
        div.innerHTML = `<img src="${data.pfp}" class="pfp"><div class="bubble"><small style="display:block;font-size:10px;opacity:0.5">${isMe?'':data.name}</small>${body}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // --- SOCIAL & FRIENDS ---
    function syncSocial() {
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById("allUsers"); list.innerHTML = "";
            const isOwen = currentUser.toLowerCase() === "owen";
            snap.forEach(c => {
                const name = c.key; if(name === currentUser) { document.getElementById("myPFP").src = c.val().pfp; localStorage.setItem("pfp", c.val().pfp); return; }
                const div = document.createElement("div");
                div.style = "display:flex; justify-content:space-between; padding:12px; background:var(--panel); border-radius:15px; margin-bottom:10px;";
                div.innerHTML = `<b>${name}</b>`;
                const btn = document.createElement("button");
                btn.innerText = "Add Friend"; btn.style = "width:auto; padding:5px 12px; font-size:12px;";
                btn.onclick = () => { set(ref(db, `requests/${name}/${currentUser}`), true); alert("Sent!"); };
                div.appendChild(btn);
                if(isOwen) {
                    const dBtn = document.createElement("button"); dBtn.innerText = "Del"; dBtn.style = "width:auto; padding:5px; background:red; margin-left:5px;";
                    dBtn.onclick = () => remove(ref(db, 'users/' + name)); div.appendChild(dBtn);
                }
                list.appendChild(div);
            });
        });

        onValue(ref(db, 'friends/' + currentUser), (snap) => {
            const list = document.getElementById("friendList"); list.innerHTML = "";
            snap.forEach(c => {
                const f = c.key;
                const d = document.createElement("div");
                d.style = "padding:15px; background:var(--panel); border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;";
                d.innerHTML = `<div onclick="openDM('${f}')" style="flex:1;"><b>${f}</b></div>`;
                const rb = document.createElement("span"); rb.innerText = "✕"; rb.style="color:red; cursor:pointer; padding:5px;";
                rb.onclick = () => removeFriend(f); d.appendChild(rb);
                list.appendChild(d);
            });
        });

        onValue(ref(db, 'requests/' + currentUser), (snap) => {
            const div = document.getElementById("pendingRequests"); div.innerHTML = "";
            snap.forEach(c => {
                const s = c.key;
                const card = document.createElement("div"); card.style="background:var(--accent); color:white; padding:12px; border-radius:15px; margin-bottom:15px;";
                card.innerHTML = `Request from ${s} <br><button onclick="acceptFriend('${s}')" style="width:48%; background:white; color:var(--accent); margin-top:8px;">Accept</button>`;
                div.appendChild(card);
            });
        });
    }

    window.removeFriend = (name) => { if(confirm(`Remove ${name}?`)) { remove(ref(db, `friends/${currentUser}/${name}`)); remove(ref(db, `friends/${name}/${currentUser}`)); }};
    window.acceptFriend = (s) => { set(ref(db, `friends/${currentUser}/${s}`), true); set(ref(db, `friends/${s}/${currentUser}`), true); remove(ref(db, `requests/${currentUser}/${s}`)); };

    // --- ACCOUNT SETTINGS ---
    window.deleteMyAccount = () => { if(confirm("PERMANENTLY delete your account? This cannot be undone.")) { remove(ref(db, 'users/' + currentUser)); logout(); }};
    window.changeUsername = async () => {
        const n = document.getElementById("newNameInp").value.trim(); if(!n) return;
        const snap = await get(ref(db, 'users/' + n)); if(snap.exists()) return alert("Taken!");
        const data = (await get(ref(db, 'users/' + currentUser))).val();
        await set(ref(db, 'users/' + n), data); await remove(ref(db, 'users/' + currentUser));
        currentUser = n; localStorage.setItem("chatU", n); location.reload();
    };

    window.uploadPFP = (input) => {
        const reader = new FileReader(); reader.onload = (e) => {
            set(ref(db, `users/${currentUser}/pfp`), e.target.result);
            location.reload();
        }; reader.readAsDataURL(input.files[0]);
    };

    window.setTab = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
    };

    window.updateTheme = (v) => { document.documentElement.setAttribute('data-theme', v); localStorage.setItem("theme", v); };
    window.saveRoom = () => {
        let s = JSON.parse(localStorage.getItem("saved") || "[]");
        if(!s.includes(activeChatId)) { s.push(activeChatId); localStorage.setItem("saved", JSON.stringify(s)); renderSaved(); }
    };

    function renderSaved() {
        const list = document.getElementById("roomList"); list.innerHTML = "";
        JSON.parse(localStorage.getItem("saved") || "[]").forEach(r => {
            const d = document.createElement("div"); d.style = "padding:15px; background:var(--panel); border-radius:15px; margin-bottom:8px;";
            d.innerHTML = `<b># ${r}</b>`; d.onclick = () => joinRoom(r); list.appendChild(d);
        });
    }

    window.logout = () => { localStorage.clear(); location.reload(); };

    if(currentUser) {
        document.getElementById("loginScreen").style.display = "none";
        syncSocial(); renderSaved();
        updateTheme(localStorage.getItem("theme") || "dark");
    }
</script>
</body>
</html>
