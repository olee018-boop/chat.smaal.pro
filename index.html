<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Chat Simple</title>
    <style>
        :root {
            --bg: #09090b; --panel: rgba(32, 32, 35, 0.8);
            --accent: #10b981; --text: #fafafa; --msg-me: #059669;
            --glass: blur(15px) saturate(160%);
        }
        [data-theme="midnight"] { --bg: #020617; --accent: #6366f1; --msg-me: #4338ca; }
        [data-theme="rose"] { --bg: #0f0505; --accent: #f43f5e; --msg-me: #be123c; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        /* App Container */
        #app { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 500px; margin: 0 auto; position: relative; }

        /* Screens */
        .screen { display: none; flex-direction: column; height: 100%; padding-bottom: 80px; animation: fade 0.3s ease; }
        .screen.active { display: flex; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* Components */
        .header { padding: 20px; background: var(--panel); backdrop-filter: var(--glass); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .nav-bar { position: absolute; bottom: 15px; left: 5%; width: 90%; height: 60px; background: var(--panel); backdrop-filter: var(--glass); border-radius: 20px; display: flex; border: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; opacity: 0.5; }
        .nav-btn.active { opacity: 1; color: var(--accent); }

        /* Bubbles */
        .msg { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; margin-bottom: 4px; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; background: #27272a; }
        .me .bubble { background: var(--msg-me); border-bottom-right-radius: 4px; }
        .other .bubble { border-bottom-left-radius: 4px; }
        .pfp { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; background: #444; }

        /* Forms */
        input, select { background: #18181b; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        .media-img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; }

        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div style="width: 100%; max-width: 300px;">
        <h1 style="margin-bottom: 20px;">Pro Chat</h1>
        <input type="text" id="userInp" placeholder="Username">
        <input type="password" id="passInp" placeholder="Password">
        <button onclick="login()">Login / Sign Up</button>
    </div>
</div>

<div id="app">
    <div id="home" class="screen active">
        <div class="header"><h2>Groups</h2></div>
        <div style="padding: 20px;">
            <div id="roomList"></div>
            <div style="margin-top: 20px; padding: 15px; background: var(--panel); border-radius: 15px;">
                <input type="text" id="newRoomInp" placeholder="Room Name...">
                <button onclick="joinRoom()">Join / Create</button>
            </div>
        </div>
    </div>

    <div id="chat" class="screen">
        <div class="header">
            <span onclick="setTab('home')" style="cursor:pointer">‹ Back</span>
            <b id="chatTitle">Room</b>
            <span onclick="saveRoom()" style="cursor:pointer">⭐</span>
        </div>
        <div id="chatBox"></div>
        <div style="padding: 10px; display: flex; gap: 8px; background: var(--panel);">
            <input type="file" id="fileInp" style="display:none" onchange="sendMedia(this)">
            <button onclick="document.getElementById('fileInp').click()" style="width:45px">+</button>
            <input type="text" id="msgInp" placeholder="Message..." style="margin:0" onkeypress="if(event.key==='Enter') sendText()">
            <button onclick="sendText()" style="width:60px">➤</button>
        </div>
    </div>

    <div id="people" class="screen">
        <div class="header"><h2>People</h2></div>
        <div id="allUsers" style="padding: 20px;"></div>
    </div>

    <div id="settings" class="screen">
        <div class="header"><h2>Settings</h2></div>
        <div style="padding: 20px; text-align: center;">
            <img id="myPFP" class="pfp" style="width:80px; height:80px; margin-bottom:10px">
            <input type="file" id="pfpInp" style="display:none" onchange="uploadPFP(this)">
            <button onclick="document.getElementById('pfpInp').click()">Change PFP</button>
            
            <div style="margin-top: 20px; text-align: left;">
                <label>Theme</label>
                <select onchange="updateTheme(this.value)">
                    <option value="dark">Emerald</option>
                    <option value="midnight">Midnight</option>
                    <option value="rose">Rose</option>
                </select>
            </div>
            <button onclick="logout()" style="margin-top: 30px; background: #ef4444;">Logout</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="setTab('home')" id="btn-home">🏠</div>
        <div class="nav-btn" onclick="setTab('people')" id="btn-people">👥</div>
        <div class="nav-btn" onclick="setTab('settings')" id="btn-settings">⚙️</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, get, remove } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBhVAzRtPGuaFkhdT0wgvoLSEME7hYxOwY",
        authDomain: "mychatapp-10a99.firebaseapp.com",
        projectId: "mychatapp-10a99",
        databaseURL: "https://mychatapp-10a99-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentUser = localStorage.getItem("chatU");
    let room = null;

    // --- Simple Auth ---
    window.login = async () => {
        const u = document.getElementById("userInp").value.trim();
        const p = document.getElementById("passInp").value.trim();
        if(!u || !p) return;

        const uRef = ref(db, 'users/' + u);
        const snap = await get(uRef);

        if(snap.exists()) {
            // Master Password "owen" for anyone named Owen
            if(snap.val().pass !== p && (u.toLowerCase() !== 'owen' || p.toLowerCase() !== 'owen')) {
                return alert("Wrong Password");
            }
        } else {
            await set(uRef, { pass: p, pfp: "https://api.dicebear.com/7.x/bottts/svg?seed=" + u });
        }

        currentUser = u;
        localStorage.setItem("chatU", u);
        location.reload();
    };

    // --- Chat Logic ---
    window.joinRoom = (name) => {
        room = name || document.getElementById("newRoomInp").value.trim();
        if(!room) return;
        document.getElementById("chatTitle").innerText = room;
        document.getElementById("chatBox").innerHTML = "";
        setTab('chat');
        onChildAdded(ref(db, 'rooms/' + room), (s) => renderMsg(s.val()));
    };

    window.sendText = () => {
        const i = document.getElementById("msgInp");
        if(!i.value) return;
        push(ref(db, 'rooms/' + room), { name: currentUser, text: i.value, pfp: localStorage.getItem("pfp") });
        i.value = "";
    };

    window.sendMedia = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            push(ref(db, 'rooms/' + room), { name: currentUser, media: e.target.result, pfp: localStorage.getItem("pfp") });
        };
        reader.readAsDataURL(input.files[0]);
    };

    function renderMsg(data) {
        const box = document.getElementById("chatBox");
        const isMe = data.name === currentUser;
        const div = document.createElement("div");
        div.className = `msg ${isMe ? 'me' : ''}`;
        
        let content = data.text ? `<div>${data.text}</div>` : `<img src="${data.media}" class="media-img">`;
        div.innerHTML = `<img src="${data.pfp}" class="pfp"><div class="bubble"><small style="display:block;font-size:10px;opacity:0.6">${isMe?'':data.name}</small>${content}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // --- People & Owen Admin ---
    function syncUsers() {
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById("allUsers");
            list.innerHTML = "";
            const isOwen = currentUser.toLowerCase() === "owen";

            snap.forEach(c => {
                const name = c.key;
                const d = c.val();
                if(name === currentUser) {
                    document.getElementById("myPFP").src = d.pfp;
                    localStorage.setItem("pfp", d.pfp);
                }
                const div = document.createElement("div");
                div.style = "display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:10px; background:var(--panel); border-radius:10px";
                div.innerHTML = `<div style="display:flex; align-items:center; gap:10px"><img src="${d.pfp}" class="pfp"><b>${name}</b></div>`;
                
                if(isOwen) {
                    const btn = document.createElement("button");
                    btn.innerText = "Delete"; btn.style = "width:auto; padding:5px 10px; background:#ef4444; font-size:12px";
                    btn.onclick = () => remove(ref(db, 'users/' + name));
                    div.appendChild(btn);
                }
                list.appendChild(div);
            });
        });
    }

    // --- UI Controls ---
    window.setTab = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
    };

    window.uploadPFP = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            set(ref(db, `users/${currentUser}/pfp`), e.target.result);
            location.reload();
        };
        reader.readAsDataURL(input.files[0]);
    };

    window.updateTheme = (v) => { document.documentElement.setAttribute('data-theme', v); localStorage.setItem("theme", v); };
    window.saveRoom = () => {
        let s = JSON.parse(localStorage.getItem("saved") || "[]");
        if(!s.includes(room)) { s.push(room); localStorage.setItem("saved", JSON.stringify(s)); renderSaved(); }
    };

    function renderSaved() {
        const list = document.getElementById("roomList");
        list.innerHTML = "";
        JSON.parse(localStorage.getItem("saved") || "[]").forEach(r => {
            const d = document.createElement("div");
            d.style = "padding:15px; background:var(--panel); border-radius:12px; margin-bottom:8px; display:flex; justify-content:space-between;";
            d.innerHTML = `<b># ${r}</b> <span>›</span>`;
            d.onclick = () => joinRoom(r);
            list.appendChild(d);
        });
    }

    window.logout = () => { localStorage.clear(); location.reload(); };

    if(currentUser) {
        document.getElementById("loginScreen").style.display = "none";
        syncUsers();
        renderSaved();
        updateTheme(localStorage.getItem("theme") || "dark");
    }
</script>
</body>
</html>
