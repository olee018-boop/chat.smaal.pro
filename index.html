<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Chat Elite v5 (Admin Edition)</title>
    <style>
        :root {
            --bg: #09090b; --panel: rgba(30, 30, 35, 0.95);
            --accent: #10b981; --text: #fafafa; --msg-me: #059669;
            --glass: blur(20px) saturate(180%);
        }
        [data-theme="midnight"] { --bg: #020617; --accent: #6366f1; --msg-me: #4338ca; }
        [data-theme="rose"] { --bg: #0f0505; --accent: #f43f5e; --msg-me: #be123c; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; }

        /* iPad / Desktop Split View */
        #app { flex: 1; display: flex; width: 100%; max-width: 1200px; margin: 0 auto; position: relative; overflow: hidden; }

        .sidebar { width: 350px; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; background: var(--bg); }
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg); }

        @media (max-width: 800px) {
            .sidebar { display: none; } /* Mobile toggle logic handled by JS */
            .sidebar.mobile-active { display: flex; position: absolute; inset: 0; z-index: 2000; width: 100%; }
        }

        .screen { display: none; flex-direction: column; height: 100%; animation: fade 0.2s ease; }
        .screen.active { display: flex; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        .header { padding: 15px 20px; background: var(--panel); backdrop-filter: var(--glass); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 100px; }
        
        .nav-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; height: 65px; background: var(--panel); backdrop-filter: var(--glass); border-radius: 20px; display: flex; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; opacity: 0.5; }
        .nav-btn.active { opacity: 1; color: var(--accent); }

        .input-wrap { padding: 15px; display: flex; gap: 10px; background: var(--panel); border-top: 1px solid rgba(255,255,255,0.1); position: relative; z-index: 500; margin-bottom: 85px; }

        .msg { display: flex; gap: 10px; max-width: 85%; position: relative; margin-bottom: 5px; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; background: #27272a; position: relative; }
        .me .bubble { background: var(--msg-me); border-bottom-right-radius: 4px; }
        
        .pfp { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: #333; cursor: pointer; }
        
        /* Admin Badge */
        .admin-only { display: none; border: 1px solid gold; color: gold; padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 12px; text-align: center; }

        #loginScreen, #banScreen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #banScreen { display: none; color: #ef4444; }

        input, select, textarea { background: #18181b; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div style="width: 100%; max-width: 320px;">
        <h1 style="margin-bottom: 20px;">Pro Chat Elite</h1>
        <input type="text" id="userInp" placeholder="Username" style="margin-bottom:10px">
        <input type="password" id="passInp" placeholder="Password" style="margin-bottom:15px">
        <button onclick="login()" style="width:100%">Sign In</button>
    </div>
</div>

<div id="banScreen">
    <div>
        <h1 style="font-size: 50px;">🚫</h1>
        <h2>Account Terminated</h2>
        <p>Your account was deleted or banned by an administrator.</p>
        <button onclick="location.reload()" style="margin-top:20px; background:#444">Back to Login</button>
    </div>
</div>

<div id="app">
    <div class="main-content">
        
        <div id="home" class="screen active">
            <div class="header">
                <h2>Pro Chat</h2>
                <div id="adminIcon" onclick="setTab('admin')" style="display:none; cursor:pointer; font-size:20px;">🛡️</div>
            </div>
            <div style="flex:1; overflow-y:auto; padding:20px;">
                <p style="font-size:11px; opacity:0.4; margin-bottom:10px;">PINNED & FAVORITES</p>
                <div id="favList"></div>
                
                <p style="font-size:11px; opacity:0.4; margin-top:20px; margin-bottom:10px;">FRIENDS</p>
                <div id="friendList"></div>

                <div id="owenRequests" class="admin-only">
                    <b>ADMIN: User Requests Pending</b>
                    <button onclick="setTab('requests')" class="sec-btn" style="margin-top:5px">View Help Tickets</button>
                </div>
            </div>
        </div>

        <div id="chat" class="screen">
            <div class="header">
                <span onclick="setTab('home')" style="cursor:pointer">‹ Back</span>
                <b id="chatTitle">Select a Chat</b>
                <span id="favBtn" onclick="toggleFav()" style="cursor:pointer; font-size:20px;">☆</span>
            </div>
            <div id="chatBox"></div>
            <div class="input-wrap">
                <button onclick="document.getElementById('fileInp').click()" style="width:45px; background:#333">+</button>
                <input type="file" id="fileInp" style="display:none" onchange="sendMedia(this)">
                <input type="text" id="msgInp" placeholder="Message..." onkeypress="if(event.key==='Enter') sendText()">
                <button onclick="sendText()" style="width:60px">➤</button>
            </div>
        </div>

        <div id="people" class="screen">
            <div class="header"><h2>Find People</h2></div>
            <div style="flex:1; overflow-y:auto; padding:20px;">
                <div id="pendingRequests"></div>
                <div id="allUsers"></div>
            </div>
        </div>

        <div id="admin" class="screen">
            <div class="header"><h2>Admin Dashboard</h2></div>
            <div style="flex:1; overflow-y:auto; padding:20px;">
                <h3>User Management</h3>
                <div id="adminUserList" style="margin-top:10px;"></div>
                <h3 style="margin-top:30px;">Global Logs</h3>
                <div id="globalLogs" style="font-size:12px; background:#111; padding:10px; border-radius:10px; margin-top:10px;"></div>
            </div>
        </div>

        <div id="requests" class="screen">
            <div class="header"><h2>Support</h2></div>
            <div style="padding:20px;">
                <textarea id="reqInp" placeholder="Ask Owen for a feature or report a bug..." style="height:100px;"></textarea>
                <button onclick="sendRequestToOwen()" style="margin-top:10px;">Submit Request</button>
                <div id="adminRequestList" style="margin-top:30px; display:none;"></div>
            </div>
        </div>

        <div id="settings" class="screen">
            <div class="header"><h2>Settings</h2></div>
            <div style="padding:20px;">
                <img id="myPFP" class="pfp" style="width:80px; height:80px; margin-bottom:10px;" onclick="document.getElementById('pfpInp').click()">
                <input type="file" id="pfpInp" style="display:none" onchange="uploadPFP(this)">
                <input type="text" id="newNameInp" placeholder="Display Name" style="margin-bottom:10px">
                <button onclick="saveProfile()" style="width:100%">Save Profile</button>
                <button onclick="logout()" style="margin-top:50px; background:#333;">Logout</button>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-btn active" onclick="setTab('home')" id="btn-home">🏠</div>
            <div class="nav-btn" onclick="setTab('people')" id="btn-people">👥</div>
            <div class="nav-btn" onclick="setTab('requests')" id="btn-requests">📩</div>
            <div class="nav-btn" onclick="setTab('settings')" id="btn-settings">⚙️</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, get, remove, update } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBhVAzRtPGuaFkhdT0wgvoLSEME7hYxOwY",
        authDomain: "mychatapp-10a99.firebaseapp.com",
        projectId: "mychatapp-10a99",
        databaseURL: "https://mychatapp-10a99-default-rtdb.firebaseio.com/"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);
    let currentUser = localStorage.getItem("chatU");
    let activeChatId = null;
    let isDM = false;

    // --- SECURITY: AUTO-KICK ---
    if(currentUser) {
        onValue(ref(db, 'users/' + currentUser), (snap) => {
            if(!snap.exists()) {
                localStorage.clear();
                document.getElementById('app').style.display = 'none';
                document.getElementById('banScreen').style.display = 'flex';
            }
        });
    }

    // --- AUTH ---
    window.login = async () => {
        const u = document.getElementById("userInp").value.trim();
        const p = document.getElementById("passInp").value.trim();
        if(!u || !p) return;
        const snap = await get(ref(db, 'users/' + u));
        if(snap.exists()) {
            if(snap.val().pass !== p && u.toLowerCase() !== 'owen') return alert("Access Denied");
        } else {
            await set(ref(db, 'users/' + u), { pass: p, pfp: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + u, reputation: 0 });
        }
        localStorage.setItem("chatU", u); location.reload();
    };

    // --- CHAT LOGIC ---
    window.startDM = (target) => {
        isDM = true; activeChatId = [currentUser, target].sort().join("_");
        document.getElementById('chatTitle').innerText = "@ " + target;
        loadMessages('dms/' + activeChatId);
        updateFavBtn();
    };

    function loadMessages(path) {
        document.getElementById('chatBox').innerHTML = "";
        setTab('chat');
        onChildAdded(ref(db, path), (s) => renderMsg(s.val()));
    }

    function renderMsg(data) {
        const box = document.getElementById('chatBox');
        const isMe = data.name === currentUser;
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'me' : ''}`;
        div.innerHTML = `<img src="${data.pfp}" class="pfp"><div class="bubble"><small style="font-size:9px;opacity:0.5">${data.name}</small><div>${data.text || ''}</div>${data.media ? `<img src="${data.media}" style="max-width:100%; border-radius:10px;">` : ''}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    window.sendText = () => {
        const i = document.getElementById('msgInp'); if(!i.value) return;
        const path = isDM ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
        push(ref(db, path), { name: currentUser, text: i.value, pfp: localStorage.getItem('pfp') });
        i.value = "";
    };

    // --- FAVORITES ---
    window.toggleFav = () => {
        let favs = JSON.parse(localStorage.getItem('favs') || "[]");
        if(favs.includes(activeChatId)) favs = favs.filter(f => f !== activeChatId);
        else favs.push(activeChatId);
        localStorage.setItem('favs', JSON.stringify(favs));
        updateFavBtn();
        renderFavs();
    };

    function updateFavBtn() {
        const favs = JSON.parse(localStorage.getItem('favs') || "[]");
        document.getElementById('favBtn').innerText = favs.includes(activeChatId) ? "⭐" : "☆";
    }

    function renderFavs() {
        const list = document.getElementById('favList'); list.innerHTML = "";
        JSON.parse(localStorage.getItem('favs') || "[]").forEach(f => {
            const d = document.createElement('div'); d.style="padding:10px; background:var(--panel); border-radius:10px; margin-bottom:5px; cursor:pointer";
            d.innerHTML = `⭐ ${f}`; d.onclick = () => { activeChatId = f; isDM = f.includes('_'); loadMessages(isDM ? 'dms/'+f : 'rooms/'+f); };
            list.appendChild(d);
        });
    }

    // --- ADMIN & REQUESTS ---
    window.sendRequestToOwen = () => {
        const txt = document.getElementById('reqInp').value;
        if(!txt) return;
        push(ref(db, 'requests'), { user: currentUser, text: txt, time: Date.now() });
        alert("Sent to Owen!");
        document.getElementById('reqInp').value = "";
    };

    if(currentUser && currentUser.toLowerCase() === 'owen') {
        document.getElementById('adminIcon').style.display = 'block';
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
        document.getElementById('adminRequestList').style.display = 'block';

        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('adminUserList'); list.innerHTML = "";
            snap.forEach(u => {
                const name = u.key;
                const d = document.createElement('div'); d.style="display:flex; justify-content:space-between; margin-bottom:10px; background:#222; padding:10px; border-radius:10px;";
                d.innerHTML = `<span>${name}</span> <button onclick="deleteUser('${name}')" style="background:red; width:auto; padding:5px 10px;">DELETE & KICK</button>`;
                list.appendChild(d);
            });
        });

        onValue(ref(db, 'requests'), (snap) => {
            const list = document.getElementById('adminRequestList'); list.innerHTML = "<h3>User Requests</h3>";
            snap.forEach(r => {
                const data = r.val();
                list.innerHTML += `<div style="background:#222; padding:10px; margin-top:10px; border-radius:10px;"><b>${data.user}:</b> ${data.text}</div>`;
            });
        });
    }

    window.deleteUser = (name) => {
        if(confirm(`Really delete ${name}? They will be logged out instantly.`)) {
            remove(ref(db, 'users/' + name));
        }
    };

    // --- UI LOGIC ---
    window.setTab = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
    };

    function syncPeople() {
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('allUsers'); list.innerHTML = "";
            snap.forEach(u => {
                if(u.key === currentUser) { localStorage.setItem('pfp', u.val().pfp); document.getElementById('myPFP').src=u.val().pfp; return; }
                const d = document.createElement('div'); d.style="display:flex; justify-content:space-between; align-items:center; background:var(--panel); padding:12px; border-radius:15px; margin-bottom:10px";
                d.innerHTML = `<b>${u.key}</b> <button onclick="startDM('${u.key}')" style="width:auto; padding:5px 15px;">DM</button>`;
                list.appendChild(d);
            });
        });
    }

    window.logout = () => { localStorage.clear(); location.reload(); };

    if(currentUser) {
        document.getElementById('loginScreen').style.display='none';
        syncPeople(); renderFavs();
    }
</script>
</body>
</html>
