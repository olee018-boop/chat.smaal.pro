<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Chat Elite v4.4</title>
    <style>
        :root {
            --bg: #09090b; --panel: rgba(30, 30, 35, 0.95);
            --accent: #10b981; --text: #fafafa; --msg-me: #059669;
            --glass: blur(20px) saturate(180%);
            --safe-bottom: env(safe-area-inset-bottom);
            --transit: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="midnight"] { --bg: #020617; --accent: #6366f1; --msg-me: #4338ca; }
        [data-theme="rose"] { --bg: #0f0505; --accent: #f43f5e; --msg-me: #be123c; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; position: fixed; width: 100%; }

        #app { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 600px; margin: 0 auto; position: relative; overflow: hidden; transition: var(--transit); }

        /* Animations */
        .screen { 
            display: none; flex-direction: column; height: 100%; 
            animation: slideUp 0.4s ease; 
        }
        .screen.active { display: flex; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { padding: 15px 20px; background: var(--panel); backdrop-filter: var(--glass); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 100; padding-top: env(safe-area-inset-top); }
        .header-actions { display: flex; gap: 15px; align-items: center; }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 180px; -webkit-overflow-scrolling: touch; }
        
        .nav-bar { 
            position: absolute; bottom: calc(15px + var(--safe-bottom)); left: 5%; width: 90%; height: 65px; 
            background: var(--panel); backdrop-filter: var(--glass); border-radius: 20px; 
            display: flex; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; opacity: 0.5; transition: var(--transit); position: relative; }
        .nav-btn.active { opacity: 1; color: var(--accent); transform: translateY(-5px); }
        .notif-dot { position: absolute; top: 15px; right: 25%; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; display: none; }

        .input-wrap { 
            position: absolute; bottom: 90px; left: 0; width: 100%;
            padding: 12px; display: flex; gap: 10px; background: var(--panel); 
            backdrop-filter: var(--glass); border-top: 1px solid rgba(255,255,255,0.1);
        }

        .msg { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; margin-bottom: 4px; animation: msgIn 0.3s ease; }
        @keyframes msgIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; background: #27272a; word-wrap: break-word; line-height: 1.4; transition: var(--transit); }
        .me .bubble { background: var(--msg-me); border-bottom-right-radius: 4px; }
        
        .pfp { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #444; flex-shrink: 0; }
        
        input, select { background: #18181b; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; font-size: 16px; margin-bottom: 8px; transition: var(--transit); }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: var(--transit); }
        button:active { transform: scale(0.95); }
        .sec-btn { background: #27272a; }
        .danger-btn { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #27272a; border: 1px solid var(--accent); color: white; padding: 8px 16px; border-radius: 20px; z-index: 3000; display: none; font-size: 13px; animation: fadeIn 0.2s; }

        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2500; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-box { background: #18181b; padding: 20px; border-radius: 24px; width: 100%; max-width: 320px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }

        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 15px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); transition: var(--transit); }
        .list-item:hover { background: rgba(255,255,255,0.06); }
        .badge { font-size: 10px; background: var(--accent); color: white; padding: 2px 6px; border-radius: 5px; margin-left: 5px; }

        /* iPad / Desktop Full Screen Support */
        @media (min-width: 768px) {
            #app { max-width: 100%; }
            .nav-bar { width: 50%; left: 25%; }
            .msg { max-width: 50%; }
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="modal">
    <div class="modal-box">
        <h3 id="modalTitle">Confirm</h3>
        <p id="modalText" style="margin: 12px 0; opacity: 0.7; font-size: 14px;"></p>
        <button id="modalConfirm" style="width:100%; margin-bottom: 8px;">Confirm</button>
        <button onclick="closeModal()" class="sec-btn" style="width:100%">Cancel</button>
    </div>
</div>

<div id="lobbyCreateModal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2500; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px);">
    <div class="modal-box">
        <h3>Create Private Lobby</h3>
        <p style="opacity: 0.7; font-size: 12px; margin-bottom: 15px;">Setup your secure room.</p>
        <input type="text" id="lobbyNameInp" placeholder="Lobby Name (Required)">
        <input type="text" id="lobbyPassInp" placeholder="Password (Optional)">
        <button onclick="confirmCreateLobby()" style="width:100%; margin-bottom: 8px;">Create & Join</button>
        <button onclick="document.getElementById('lobbyCreateModal').style.display='none'" class="sec-btn" style="width:100%">Cancel</button>
    </div>
</div>

<div id="loginScreen">
    <div style="width: 100%; max-width: 300px;">
        <h1 style="margin-bottom: 20px;">Pro Chat <span class="badge" style="background:#444">v4.4</span></h1>
        <input type="text" id="userInp" placeholder="Username">
        <input type="password" id="passInp" placeholder="Password">
        <button onclick="login()" style="width:100%">Enter</button>
        <button onclick="loginWithGoogle()" style="background:#fff; color:#000; width:100%; margin-top:10px; font-size:14px;">Google Login</button>
    </div>
</div>

<div id="app">
    <div id="home" class="screen active">
        <div class="header"><h2>Home</h2></div>
        <div style="flex: 1; overflow-y: auto; padding: 20px 20px 150px;">
            <p style="font-size: 11px; font-weight: 800; opacity: 0.4; margin-bottom: 12px;">FRIENDS</p>
            <div id="friendList"></div>
            
            <p style="font-size: 11px; font-weight: 800; opacity: 0.4; margin: 25px 0 12px;">PINNED ROOMS & LOBBIES</p>
            <div id="roomList"></div>
            
            <div style="margin-top: 20px; display: flex; gap: 8px;">
                <input type="text" id="newRoomInp" placeholder="Join Public ID..." style="margin-bottom:0">
                <button onclick="joinRoom()" style="padding: 0 15px;">Join</button>
            </div>
            
            <div style="margin-top: 15px;">
                <button onclick="document.getElementById('lobbyCreateModal').style.display='flex'" class="sec-btn" style="width:100%; border: 1px dashed var(--accent);">+ Create Private Lobby</button>
            </div>
        </div>
    </div>

    <div id="chat" class="screen">
        <div class="header">
            <span onclick="setTab('home')" style="cursor:pointer; font-size: 20px;">✕</span>
            <b id="chatTitle" style="max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">...</b>
            <div class="header-actions">
                <span id="lobbyActionIcon" onclick="manageLobby()" style="cursor:pointer; font-size: 18px; display:none;" title="Delete Lobby">⚙️</span>
                <span id="shareIcon" onclick="shareLobby()" style="cursor:pointer; font-size: 18px;" title="Copy Invite Link">🔗</span>
                <span id="pinIcon" onclick="togglePin()" style="cursor:pointer; font-size: 20px;">☆</span>
            </div>
        </div>
        <div id="chatBox"></div>
        <div class="input-wrap">
            <input type="file" id="fileInp" style="display:none" accept="image/*" onchange="sendMedia(this)">
            <button onclick="document.getElementById('fileInp').click()" class="sec-btn" style="width:45px">+</button>
            <input type="text" id="msgInp" placeholder="Message..." onkeypress="if(event.key==='Enter') sendText()">
            <button onclick="sendText()" style="width:60px">➤</button>
        </div>
    </div>

    <div id="notifications" class="screen">
        <div class="header"><h2>Notifications</h2></div>
        <div style="flex: 1; overflow-y: auto; padding: 20px 20px 150px;">
            <div id="pendingRequests"></div>
        </div>
    </div>

    <div id="people" class="screen">
        <div class="header"><h2>Explore</h2></div>
        <div style="flex: 1; overflow-y: auto; padding: 20px 20px 150px;">
            <p style="font-size: 11px; font-weight: 800; opacity: 0.4; margin-bottom: 12px;">MEMBERS</p>
            <div id="allUsers"></div>
        </div>
    </div>

    <div id="settings" class="screen">
        <div class="header"><h2>Settings</h2></div>
        <div style="padding: 20px; overflow-y: auto; flex:1; padding-bottom: 120px;">
            <div style="text-align: center; margin-bottom: 25px;">
                <img id="myPFP" class="pfp" style="width:80px; height:80px; border: 2px solid var(--accent);">
                <button onclick="document.getElementById('pfpInp').click()" class="sec-btn" style="display:block; margin: 10px auto; font-size:12px">Update Photo</button>
                <input type="file" id="pfpInp" style="display:none" accept="image/*" onchange="uploadPFP(this)">
            </div>
            
            <input type="text" id="newNameInp" placeholder="Change Username">
            <input type="password" id="newPassInp" placeholder="Change Password">
            <button onclick="updateAccount()" class="sec-btn" style="width:100%">Save Changes</button>

            <div id="adminPanel" style="display:none; margin-top:25px; padding:15px; border:1px solid gold; border-radius:15px; background:rgba(255,215,0,0.05)">
                <p style="color:gold; font-size:11px; font-weight:bold; margin-bottom:10px">ADMIN CONSOLE</p>
                <button onclick="viewAllRooms()" style="background:gold; color:black; width:100%; font-size:12px">Spy All Active Rooms</button>
                <div id="adminLog" style="font-size:10px; margin-top:10px; opacity:0.7"></div>
            </div>

            <button onclick="logout()" style="margin-top: 40px; background: #333; width:100%">Log Out</button>
            <button onclick="askDelete()" style="background: rgba(239,68,68,0.1); color:#ef4444; border:1px solid #ef4444; margin-top:10px; width:100%">Delete Account</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="setTab('home')" id="btn-home">🏠</div>
        <div class="nav-btn" onclick="setTab('people')" id="btn-people">🧭</div>
        <div class="nav-btn" onclick="setTab('notifications')" id="btn-notifications">
            🔔<div class="notif-dot" id="notifDot"></div>
        </div>
        <div class="nav-btn" onclick="setTab('settings')" id="btn-settings">⚙️</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, get, remove, update } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBUl-7CM3nl38AIr7MUb8fozBCikz1No7g",
        authDomain: "hostpxp.firebaseapp.com",
        databaseURL: "https://hostpxp-default-rtdb.firebaseio.com",
        projectId: "hostpxp",
        storageBucket: "hostpxp.firebasestorage.app",
        messagingSenderId: "891844604890",
        appId: "1:891844604890:web:b7bc043499d024207d86e3",
        measurementId: "G-BDKNBWYL8Z"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);
    const auth = getAuth(fbApp);
    const provider = new GoogleAuthProvider();

    let currentUser = localStorage.getItem("chatU");
    let activeChatId = null;
    let isDM = false;
    let isAdmin = currentUser === "owen";
    let currentLobbyMeta = null;

    // --- UTILS ---
    window.showToast = (m) => { const t = document.getElementById("toast"); t.innerText = m; t.style.display="block"; setTimeout(()=>t.style.display="none", 2500); };
    window.openModal = (t, m, c) => { document.getElementById("modalTitle").innerText=t; document.getElementById("modalText").innerText=m; document.getElementById("modal").style.display="flex"; document.getElementById("modalConfirm").onclick=()=>{c();closeModal();}; };
    window.closeModal = () => document.getElementById("modal").style.display="none";

    // --- AUTH ---
    window.login = async () => {
        const u = document.getElementById("userInp").value.trim().toLowerCase();
        const p = document.getElementById("passInp").value.trim();
        if(!u || !p) return showToast("Enter details");
        const snap = await get(ref(db, 'users/' + u));
        if(snap.exists()){ if(snap.val().pass !== p && (u !== 'owen' || p !== 'owen')) return showToast("Error"); }
        else { await set(ref(db, 'users/' + u), { pass: p, pfp: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + u }); }
        currentUser = u; localStorage.setItem("chatU", u); location.reload();
    };

    // --- ACCOUNT ---
    window.uploadPFP = (i) => {
        const r = new FileReader(); r.onload = async (e) => { await update(ref(db, `users/${currentUser}`), { pfp: e.target.result }); document.getElementById("myPFP").src=e.target.result; };
        r.readAsDataURL(i.files[0]);
    };

    window.updateAccount = async () => {
        const newU = document.getElementById("newNameInp").value.trim().toLowerCase();
        const newP = document.getElementById("newPassInp").value.trim();
        if(newU && newU !== currentUser){
            const check = await get(ref(db, 'users/'+newU));
            if(check.exists()) return showToast("Taken");
            const old = (await get(ref(db, 'users/'+currentUser))).val();
            await set(ref(db, 'users/'+newU), {...old, pass: newP || old.pass});
            await remove(ref(db, 'users/'+currentUser));
            currentUser = newU; localStorage.setItem("chatU", newU);
        } else if(newP) { await update(ref(db, `users/${currentUser}`), { pass: newP }); }
        location.reload();
    };

    // --- CHAT, LOBBIES & PINNING ---
    window.confirmCreateLobby = async () => {
        const name = document.getElementById('lobbyNameInp').value.trim();
        const pass = document.getElementById('lobbyPassInp').value.trim();
        if(!name) return showToast("Lobby Name is required");
        
        const privateId = "lobby_" + Math.random().toString(36).substring(2, 12);
        
        await set(ref(db, 'rooms_meta/' + privateId), {
            name: name,
            password: pass,
            creator: currentUser
        });

        document.getElementById('lobbyCreateModal').style.display = 'none';
        document.getElementById('lobbyNameInp').value = '';
        document.getElementById('lobbyPassInp').value = '';

        if(pass) localStorage.setItem("unlocked_" + privateId, "true"); // Memory unlock for creator
        
        joinRoom(privateId);
        showToast("Private Lobby Created!");
        
        // Pin it automatically
        let pins = JSON.parse(localStorage.getItem("pins_v4") || "[]");
        if(!pins.some(p => p.id === privateId)) {
            pins.push({ id: privateId, type: 'room', name: name });
            localStorage.setItem("pins_v4", JSON.stringify(pins));
            renderPins();
        }
    };

    window.shareLobby = () => {
        if(isDM) return showToast("Cannot link DMs");
        const url = window.location.origin + window.location.pathname + "?lobby=" + activeChatId;
        navigator.clipboard.writeText(url).then(() => {
            showToast("Invite Link Copied!");
        }).catch(err => {
            showToast("Failed to copy link");
        });
    };

    window.joinRoom = async (n) => {
        const r = n || document.getElementById("newRoomInp").value.trim(); if(!r) return;
        
        let displayTitle = r;
        document.getElementById("lobbyActionIcon").style.display = "none";
        currentLobbyMeta = null;
        
        if(r.startsWith("lobby_")) {
            const metaSnap = await get(ref(db, 'rooms_meta/' + r));
            if(metaSnap.exists()) {
                const meta = metaSnap.val();
                
                // 1. Check if deleted
                if(meta.deletedBy) {
                    showToast(`This lobby was deleted by ${meta.deletedBy}`);
                    unpin(r); // auto-remove dead lobby from pins
                    return;
                }

                // 2. Strict Password Protection (Skip if it's the creator)
                if(meta.password && meta.creator !== currentUser) {
                    if(!localStorage.getItem("unlocked_" + r)) {
                        const entered = prompt("This lobby is protected. Enter password:");
                        if(entered !== meta.password) {
                            showToast("Incorrect password.");
                            return; // Blocks them entirely from joining
                        }
                        localStorage.setItem("unlocked_" + r, "true");
                    }
                }
                
                displayTitle = meta.name;
                currentLobbyMeta = meta;

                // 3. Only show gear icon to the creator
                if(meta.creator === currentUser) {
                    document.getElementById("lobbyActionIcon").style.display = "inline-block";
                }
            } else {
                displayTitle = "Private Lobby";
            }
        }
        
        // Change state ONLY after password passes
        isDM = false; activeChatId = r; 
        document.getElementById("chatTitle").innerText = "# " + displayTitle;
        document.getElementById("chatBox").innerHTML = ""; setTab('chat');
        checkPinStatus();
        document.getElementById("shareIcon").style.display = "inline-block"; 
        onChildAdded(ref(db, 'rooms/' + r), (s) => renderMsg(s.val()));
    };

    window.manageLobby = () => {
        if(!currentLobbyMeta) return;
        // Since only the creator sees the icon, this will always be a delete action
        if(currentLobbyMeta.creator === currentUser) {
            openModal("Delete Lobby?", "This will permanently delete the lobby for everyone.", async () => {
                await update(ref(db, 'rooms_meta/' + activeChatId), { deletedBy: currentUser });
                showToast("Lobby Deleted");
                unpin(activeChatId);
                setTab('home');
            });
        }
    };

    window.openDM = (f) => {
        isDM = true; activeChatId = [currentUser, f].sort().join("_dm_");
        document.getElementById("chatTitle").innerText = f; document.getElementById("chatBox").innerHTML = "";
        setTab('chat'); checkPinStatus();
        document.getElementById("shareIcon").style.display = "none"; 
        document.getElementById("lobbyActionIcon").style.display = "none";
        onChildAdded(ref(db, 'dms/' + activeChatId), (s) => renderMsg(s.val()));
    };

    window.togglePin = () => {
        let pins = JSON.parse(localStorage.getItem("pins_v4") || "[]");
        const idx = pins.findIndex(p => p.id === activeChatId);
        if(idx > -1) { pins.splice(idx, 1); showToast("Unpinned"); }
        else { 
            let pinName = document.getElementById("chatTitle").innerText.replace('# ', '');
            pins.push({ id: activeChatId, type: isDM ? 'dm' : 'room', name: pinName }); 
            showToast("Pinned"); 
        }
        localStorage.setItem("pins_v4", JSON.stringify(pins));
        checkPinStatus(); renderPins();
    };

    function checkPinStatus() {
        const pins = JSON.parse(localStorage.getItem("pins_v4") || "[]");
        document.getElementById("pinIcon").innerText = pins.some(p => p.id === activeChatId) ? "★" : "☆";
    }

    function renderPins() {
        const list = document.getElementById("roomList"); list.innerHTML = "";
        const pins = JSON.parse(localStorage.getItem("pins_v4") || "[]");
        pins.forEach(p => {
            const d = document.createElement("div"); d.className = "list-item";
            d.innerHTML = `<b>${p.name}</b> <span style="color:red; font-size:18px" onclick="event.stopPropagation(); unpin('${p.id}')">×</span>`;
            d.onclick = () => p.type === 'room' ? joinRoom(p.id) : openDM(p.name);
            list.appendChild(d);
        });
    }

    window.unpin = (id) => {
        let pins = JSON.parse(localStorage.getItem("pins_v4") || "[]");
        localStorage.setItem("pins_v4", JSON.stringify(pins.filter(p => p.id !== id)));
        renderPins();
    };

    // --- MESSAGING & MEDIA ---
    window.sendText = async () => {
        const i = document.getElementById("msgInp"); if(!i.value.trim()) return;
        const pfp = (await get(ref(db, `users/${currentUser}/pfp`))).val();
        const path = isDM ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
        push(ref(db, path), { sender: currentUser, text: i.value, pfp: pfp || "", time: Date.now() });
        i.value = "";
    };

    window.sendMedia = (input) => {
        if(!input.files || !input.files[0]) return;
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const pfp = (await get(ref(db, `users/${currentUser}/pfp`))).val();
            const path = isDM ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
            push(ref(db, path), { sender: currentUser, text: "", media: e.target.result, pfp: pfp || "", time: Date.now() });
        };
        reader.readAsDataURL(file);
    };

    function renderMsg(d) {
        if(d.time < Date.now() - 86400000) return; // 24hr auto-delete filter
        const box = document.getElementById("chatBox");
        const isMe = d.sender === currentUser;
        const div = document.createElement("div"); div.className = `msg ${isMe ? 'me' : ''}`;
        div.innerHTML = `<img src="${d.pfp}" class="pfp"><div class="bubble"><small style="display:block; font-size:9px; opacity:0.5">${d.sender}</small>${d.text || `<img src="${d.media}" style="max-width:100%; border-radius:10px">`}</div>`;
        box.appendChild(div); box.scrollTop = box.scrollHeight;
    }

    // --- SOCIAL ---
    function syncSocial() {
        onValue(ref(db, 'users'), async (snap) => {
            const list = document.getElementById("allUsers"); list.innerHTML = "";
            
            // Get current user's friends and outgoing requests
            const friendSnap = await get(ref(db, 'friends/' + currentUser));
            const myFriends = friendSnap.val() ? Object.keys(friendSnap.val()) : [];
            
            snap.forEach(c => {
                const name = c.key; if(name === currentUser) { document.getElementById("myPFP").src = c.val().pfp; return; }
                
                const div = document.createElement("div"); div.className = "list-item";
                let actionBtn = "";

                // Check for existing state
                get(ref(db, `requests/${name}/${currentUser}`)).then(reqSnap => {
                    if(myFriends.includes(name)) {
                        actionBtn = `<button id="btn-${name}" class="danger-btn" onclick="removeFriendPrompt('${name}')" style="padding:6px 12px; font-size:11px">Remove</button>`;
                    } else if(reqSnap.exists()) {
                        actionBtn = `<button disabled style="opacity:0.5; padding:6px 12px; font-size:11px; background:#444">Pending</button>`;
                    } else {
                        actionBtn = `<button onclick="sendReq('${name}')" style="padding:6px 12px; font-size:11px">Add Friend</button>`;
                    }

                    if(isAdmin) actionBtn += `<button onclick="kickUser('${name}')" style="background:red; margin-left:5px; padding:6px 12px; font-size:11px">Kick</button>`;
                    
                    div.innerHTML = `<span>${name}</span> <div id="action-${name}">${actionBtn}</div>`;
                    list.appendChild(div);
                });
            });
        });

        // Friend List
        onValue(ref(db, 'friends/' + currentUser), (snap) => {
            const list = document.getElementById("friendList"); list.innerHTML = "";
            snap.forEach(c => {
                const f = c.key;
                const d = document.createElement("div"); d.className = "list-item";
                d.innerHTML = `<b>${f}</b> <span style="opacity:0.3">›</span>`;
                d.onclick = () => openDM(f);
                list.appendChild(d);
            });
        });

        // Notifications (Incoming Requests)
        onValue(ref(db, 'requests/' + currentUser), (s) => {
            const div = document.getElementById("pendingRequests"); div.innerHTML = "";
            const dot = document.getElementById("notifDot");
            dot.style.display = s.exists() ? "block" : "none";

            if(!s.exists()) div.innerHTML = "<p style='text-align:center; opacity:0.5; margin-top:20px;'>No new notifications</p>";

            s.forEach(c => {
                const sender = c.key;
                const card = document.createElement("div"); 
                card.className = "list-item";
                card.style.flexDirection = "column"; card.style.alignItems = "flex-start"; card.style.gap = "10px";
                card.innerHTML = `
                    <span><b>${sender}</b> sent you a friend request</span>
                    <div style="display:flex; gap:8px; width:100%;">
                        <button onclick="acceptFriend('${sender}')" style="flex:1; padding:8px;">Accept</button>
                        <button onclick="declineFriend('${sender}')" class="sec-btn" style="flex:1; padding:8px;">Decline</button>
                    </div>
                `;
                div.appendChild(card);
            });
        });
    }

    window.sendReq = (t) => { set(ref(db, `requests/${t}/${currentUser}`), true); showToast("Request Sent"); };
    
    window.acceptFriend = async (s) => { 
        await update(ref(db, `friends/${currentUser}`), { [s]: true }); 
        await update(ref(db, `friends/${s}`), { [currentUser]: true }); 
        await remove(ref(db, `requests/${currentUser}/${s}`)); 
        showToast("Friend Added!");
    };

    window.declineFriend = async (s) => {
        await remove(ref(db, `requests/${currentUser}/${s}`));
    };

    window.removeFriendPrompt = (name) => {
        const btn = document.getElementById(`btn-${name}`);
        if(btn.innerText === "Remove") {
            btn.innerText = "Sure?";
            btn.style.background = "#ef4444";
            btn.style.color = "white";
            setTimeout(() => { if(btn) btn.innerText = "Remove"; btn.style.background = ""; }, 3000);
        } else {
            removeFriend(name);
        }
    };

    window.removeFriend = async (name) => {
        await remove(ref(db, `friends/${currentUser}/${name}`));
        await remove(ref(db, `friends/${name}/${currentUser}`));
        showToast("Friend Removed");
    };

    // --- ADMIN ---
    window.kickUser = (u) => openModal("Kick User?", `Delete ${u} permanently?`, () => remove(ref(db, 'users/' + u)));
    window.viewAllRooms = () => {
        get(ref(db, 'rooms')).then(s => {
            let log = "Active Channels: ";
            s.forEach(r => log += r.key + ", ");
            document.getElementById("adminLog").innerText = log;
        });
    };

    window.logout = () => { localStorage.clear(); location.reload(); };
    window.setTab = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
    };

    // --- BOOTSTRAP & LINK ROUTING ---
    if(currentUser) {
        document.getElementById("loginScreen").style.display = "none";
        if(isAdmin) document.getElementById("adminPanel").style.display = "block";
        syncSocial(); renderPins();
        
        onValue(ref(db, 'users/'+currentUser), s => { if(!s.exists()) logout(); });

        // Check if user clicked an invite link
        const urlParams = new URLSearchParams(window.location.search);
        const lobbyId = urlParams.get('lobby');
        if (lobbyId) {
            window.history.replaceState({}, document.title, window.location.pathname);
            joinRoom(lobbyId);
        }
    }
</script>
</body>
</html>
