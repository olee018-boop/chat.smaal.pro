<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elite Chat v4.2</title>
    <style>
        :root {
            --bg: #09090b; 
            --panel: rgba(24, 24, 27, 0.9);
            --accent: #10b981; 
            --text: #fafafa; 
            --msg-me: #059669;
            --glass: blur(20px) saturate(180%);
            --safe-bottom: env(safe-area-inset-bottom);
            --safe-top: env(safe-area-inset-top);
        }

        /* Mobile Reset & iPad Optimization */
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }
        
        body { 
            background: var(--bg); color: var(--text); height: 100dvh; 
            overflow: hidden; display: flex; flex-direction: column; 
            position: fixed; width: 100%; 
        }

        #app-container { 
            flex: 1; display: flex; flex-direction: column; width: 100%; 
            max-width: 850px; /* Perfect for iPad centering */
            margin: 0 auto; position: relative; overflow: hidden; 
        }

        /* Navigation & Screens */
        .screen { 
            position: absolute; inset: 0; display: none; 
            flex-direction: column; background: var(--bg); z-index: 10;
        }
        .screen.active { 
            display: flex; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header { 
            padding: 15px 20px; background: var(--panel); backdrop-filter: var(--glass); 
            border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; 
            justify-content: space-between; align-items: center; z-index: 100; 
            padding-top: calc(15px + var(--safe-top)); 
        }
        
        #chatBox { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; 
            flex-direction: column; gap: 12px; padding-bottom: 180px; 
            -webkit-overflow-scrolling: touch; 
        }
        
        /* Mobile Navbar */
        .nav-bar { 
            position: fixed; bottom: calc(20px + var(--safe-bottom)); 
            left: 50%; transform: translateX(-50%); width: 92%; 
            max-width: 400px; height: 68px; background: rgba(39, 39, 42, 0.95); 
            backdrop-filter: var(--glass); border-radius: 35px; display: flex; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 1000; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); transition: 0.3s;
        }
        body.keyboard-up .nav-bar { opacity: 0; transform: translate(-50%, 100px); }

        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 26px; opacity: 0.4; }
        .nav-btn.active { opacity: 1; color: var(--accent); }

        /* Input Bar */
        .input-container {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--panel); backdrop-filter: var(--glass);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px calc(12px + var(--safe-bottom));
            z-index: 1100; transition: transform 0.1s ease-out;
        }
        .input-wrap { display: flex; gap: 10px; max-width: 850px; margin: 0 auto; }

        /* UI Elements */
        input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 14px 20px; border-radius: 25px; width: 100%; outline: none; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.92); }

        .bubble { padding: 12px 16px; border-radius: 22px; font-size: 16px; background: #27272a; max-width: 85%; align-self: flex-start; }
        .me { background: var(--msg-me) !important; align-self: flex-end !important; color: white; }
        
        #toast { position: fixed; top: calc(20px + var(--safe-top)); left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 10px 20px; border-radius: 20px; z-index: 9999; display: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="loginOverlay" style="position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center; padding:30px;">
    <div style="width: 100%; max-width: 320px; text-align: center;">
        <h1 style="margin-bottom: 5px; font-size: 32px;">Elite Chat</h1>
        <p style="opacity:0.5; margin-bottom:30px; font-size: 14px;">Pseudo-Auth v4.2</p>
        <input type="text" id="uInp" placeholder="Choose Username" style="margin-bottom:10px" autocomplete="off">
        <input type="password" id="pInp" placeholder="Choose Password" style="margin-bottom:20px">
        <button onclick="fastLogin()" id="lBtn" style="width:100%; padding:18px;">Enter Chat</button>
    </div>
</div>

<div id="app-container">
    <div id="home" class="screen active">
        <div class="header"><h2>Home</h2><div id="myPFP" style="width:32px; height:32px; background:var(--accent); border-radius:50%"></div></div>
        <div style="flex:1; overflow-y:auto; padding: 20px 20px 150px;">
            <p style="font-size:12px; opacity:0.4; font-weight:bold; margin-bottom:10px">DIRECT MESSAGES</p>
            <div id="friendList"></div>
            <p style="font-size:12px; opacity:0.4; font-weight:bold; margin:25px 0 10px">JOIN A ROOM</p>
            <div style="display:flex; gap:10px">
                <input type="text" id="roomInp" placeholder="Room Name...">
                <button onclick="joinRoom()">Join</button>
            </div>
        </div>
    </div>

    <div id="chat" class="screen">
        <div class="header">
            <span onclick="setTab('home')" style="font-size:20px">✕</span>
            <b id="chatTitle">Room</b>
            <span style="opacity:0">✕</span>
        </div>
        <div id="chatBox"></div>
        <div class="input-container" id="kbWrap">
            <div class="input-wrap">
                <input type="text" id="msgInp" placeholder="Type a message..." autocomplete="off">
                <button onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>

    <div id="settings" class="screen">
        <div class="header"><h2>Settings</h2></div>
        <div style="padding: 20px; text-align: center;">
            <div style="width:100px; height:100px; background:var(--accent); border-radius:50%; margin: 20px auto;"></div>
            <h3 id="displayUser">User</h3>
            <button onclick="logout()" style="margin-top:40px; background:#27272a; width:100%">Log Out</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="setTab('home')" id="nav-home">🏠</div>
        <div class="nav-btn" onclick="setTab('settings')" id="nav-settings">⚙️</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, get } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBUl-7CM3nl38AIr7MUb8fozBCikz1No7g",
        authDomain: "hostpxp.firebaseapp.com",
        databaseURL: "https://hostpxp-default-rtdb.firebaseio.com",
        projectId: "hostpxp",
        storageBucket: "hostpxp.firebasestorage.app",
        messagingSenderId: "891844604890",
        appId: "1:891844604890:web:b7bc043499d024207d86e3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let user = localStorage.getItem("chatUser");
    let activeChat = null;

    // --- KEYBOARD FIX FOR MOBILE ---
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            const h = window.visualViewport.height;
            const diff = window.innerHeight - h;
            const kb = document.getElementById('kbWrap');
            if (diff > 60) {
                document.body.classList.add('keyboard-up');
                kb.style.transform = `translateY(-${diff}px)`;
            } else {
                document.body.classList.remove('keyboard-up');
                kb.style.transform = `translateY(0)`;
            }
        });
    }

    window.showToast = (m) => { const t = document.getElementById("toast"); t.innerText = m; t.style.display="block"; setTimeout(()=>t.style.display="none", 3000); };

    // --- THE "FAST LOGIN" LOGIC ---
    window.fastLogin = async () => {
        const u = document.getElementById("uInp").value.trim().toLowerCase();
        const p = document.getElementById("pInp").value.trim();
        const btn = document.getElementById("lBtn");

        if(!u || !p) return showToast("Missing Fields");
        btn.innerText = "Checking...";
        btn.disabled = true;

        try {
            const snap = await get(ref(db, 'users/' + u));
            
            if(snap.exists()) {
                // User exists, check password
                if(snap.val().pass === p) {
                    completeLogin(u);
                } else {
                    btn.innerText = "Enter Chat";
                    btn.disabled = false;
                    showToast("Wrong Password for this User");
                }
            } else {
                // User doesn't exist, create them instantly in the database
                await set(ref(db, 'users/' + u), { pass: p, created: Date.now() });
                completeLogin(u);
            }
        } catch (e) {
            btn.innerText = "Enter Chat";
            btn.disabled = false;
            showToast("Firebase Error: Check your RULES tab!");
            console.error(e);
        }
    };

    function completeLogin(u) {
        localStorage.setItem("chatUser", u);
        location.reload();
    }

    // --- CHAT LOGIC ---
    window.joinRoom = (rName) => {
        const r = rName || document.getElementById("roomInp").value.trim();
        if(!r) return;
        activeChat = r;
        document.getElementById("chatTitle").innerText = "# " + r;
        document.getElementById("chatBox").innerHTML = "";
        setTab('chat');
        onChildAdded(ref(db, 'rooms/' + r), (s) => renderMsg(s.val()));
    };

    window.sendMsg = () => {
        const i = document.getElementById("msgInp");
        if(!i.value.trim() || !activeChat) return;
        push(ref(db, 'rooms/' + activeChat), { sender: user, text: i.value, time: Date.now() });
        i.value = "";
    };

    function renderMsg(d) {
        const box = document.getElementById("chatBox");
        const div = document.createElement("div");
        div.className = `bubble ${d.sender === user ? 'me' : ''}`;
        div.innerHTML = `<small style="display:block; opacity:0.5; font-size:10px">${d.sender}</small>${d.text}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // --- TABS & SYSTEM ---
    window.setTab = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(document.getElementById('nav-'+id)) document.getElementById('nav-'+id).classList.add('active');
    };

    window.logout = () => { localStorage.clear(); location.reload(); };

    if(user) {
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("displayUser").innerText = user;
    }
</script>
</body>
</html>
