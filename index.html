<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Chat Elite v4.2</title>
    <style>
        :root {
            --bg: #09090b; --panel: rgba(30, 30, 35, 0.95);
            --accent: #10b981; --text: #fafafa; --msg-me: #059669;
            --glass: blur(20px) saturate(180%);
            --safe-bottom: env(safe-area-inset-bottom);
            --card: #18181b;
        }
        /* THEMES */
        [data-theme="light"] { --bg: #f4f4f5; --panel: rgba(255, 255, 255, 0.9); --accent: #10b981; --text: #09090b; --msg-me: #10b981; --card: #ffffff; }
        [data-theme="rumple"] { --bg: #2b1d1d; --panel: rgba(60, 40, 40, 0.95); --accent: #d97706; --text: #fde68a; --msg-me: #92400e; --card: #452b2b; }
        [data-theme="midnight"] { --bg: #020617; --accent: #6366f1; --msg-me: #4338ca; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; position: fixed; width: 100%; }

        #app { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 600px; margin: 0 auto; position: relative; overflow: hidden; }

        /* NOTIFICATION BANNER */
        #notifPopup { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 400px; background: var(--panel); backdrop-filter: var(--glass);
            padding: 15px; border-radius: 20px; border: 1px solid var(--accent);
            z-index: 5000; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #notifPopup.show { top: 20px; }

        .screen { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.2s ease; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header { padding: 15px 20px; background: var(--panel); backdrop-filter: var(--glass); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 100; padding-top: env(safe-area-inset-top); }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 180px; -webkit-overflow-scrolling: touch; }
        
        .nav-bar { position: absolute; bottom: calc(15px + var(--safe-bottom)); left: 5%; width: 90%; height: 65px; background: var(--panel); backdrop-filter: var(--glass); border-radius: 20px; display: flex; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; opacity: 0.5; transition: 0.2s; }
        .nav-btn.active { opacity: 1; color: var(--accent); transform: scale(1.1); }

        .input-wrap { position: absolute; bottom: 90px; left: 0; width: 100%; padding: 12px; display: flex; gap: 10px; background: var(--panel); backdrop-filter: var(--glass); border-top: 1px solid rgba(255,255,255,0.1); }

        .msg { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; background: var(--card); border: 1px solid rgba(255,255,255,0.05); word-wrap: break-word; overflow: hidden; }
        .me .bubble { background: var(--msg-me); border-bottom-right-radius: 4px; color: white; }
        
        .media-content { max-width: 100%; border-radius: 12px; display: block; margin-top: 5px; background: #000; }
        .pfp { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #444; flex-shrink: 0; cursor: pointer; }
        
        input, select { background: var(--card); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 12px; border-radius: 12px; width: 100%; outline: none; font-size: 16px; margin-bottom: 8px; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .sec-btn { background: rgba(255,255,255,0.1); color: var(--text); }

        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-box { background: var(--card); padding: 20px; border-radius: 24px; width: 100%; max-width: 340px; text-align: center; }

        .banner-view { width: 100%; height: 100px; border-radius: 15px 15px 0 0; background: #333; object-fit: cover; margin-bottom: -40px; }
        .pfp-large { width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--card); position: relative; z-index: 2; object-fit: cover; }

        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 15px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div id="notifPopup">
    <img id="notifImg" src="" style="width:40px; height:40px; border-radius:50%; display:none">
    <div style="flex:1">
        <b id="notifTitle" style="font-size:14px; display:block"></b>
        <span id="notifText" style="font-size:12px; opacity:0.8"></span>
    </div>
</div>

<div id="modal">
    <div class="modal-box" id="modalContent">
        <div id="profileViewArea" style="display:none">
            <img id="viewBanner" class="banner-view" src="">
            <img id="viewPFP" class="pfp-large" src="">
            <h2 id="viewDisplayName" style="margin-top:10px"></h2>
            <p id="viewHandle" style="opacity:0.5; font-size:14px; margin-bottom:15px"></p>
        </div>
        <div id="confirmArea">
            <h3 id="modalTitle">Confirm</h3>
            <p id="modalText" style="margin: 12px 0; opacity: 0.7; font-size: 14px;"></p>
        </div>
        <button id="modalConfirm" style="width:100%; margin-bottom: 8px;">Action</button>
        <button onclick="closeModal()" class="sec-btn" style="width:100%">Close</button>
    </div>
</div>

<div id="loginScreen">
    <div style="width: 100%; max-width: 300px;">
        <h1 style="margin-bottom: 20px;">Pro Chat <span style="opacity:0.5">v4.2</span></h1>
        <input type="text" id="userInp" placeholder="Username">
        <input type="password" id="passInp" placeholder="Password">
        <button onclick="login()" style="width:100%">Enter</button>
    </div>
</div>

<div id="app">
    <div id="home" class="screen active">
        <div class="header"><h2>Home</h2></div>
        <div style="flex: 1; overflow-y: auto; padding: 20px 20px 150px;">
            <p style="font-size: 11px; font-weight: 800; opacity: 0.4; margin-bottom: 12px;">FRIENDS</p>
            <div id="friendList"></div>
            <p style="font-size: 11px; font-weight: 800; opacity: 0.4; margin: 25px 0 12px;">PINNED</p>
            <div id="roomList"></div>
            <div style="margin-top: 20px; display: flex; gap: 8px;">
                <input type="text" id="newRoomInp" placeholder="Join ID..." style="margin-bottom:0">
                <button onclick="joinRoom()" style="padding: 0 15px;">Join</button>
            </div>
        </div>
    </div>

    <div id="chat" class="screen">
        <div class="header">
            <span onclick="setTab('home')" style="cursor:pointer; font-size: 20px;">✕</span>
            <b id="chatTitle">...</b>
            <span id="pinIcon" onclick="togglePin()" style="cursor:pointer; font-size: 20px;">☆</span>
        </div>
        <div id="chatBox"></div>
        <div class="input-wrap">
            <input type="file" id="mediaInp" style="display:none" accept="image/*,video/*" onchange="sendMedia(this)">
            <button onclick="document.getElementById('mediaInp').click()" class="sec-btn" style="width:45px">+</button>
            <input type="text" id="msgInp" placeholder="Message..." onkeypress="if(event.key==='Enter') sendText()">
            <button onclick="sendText()" style="width:60px">➤</button>
        </div>
    </div>

    <div id="people" class="screen">
        <div class="header"><h2>Explore</h2></div>
        <div style="flex: 1; overflow-y: auto; padding: 20px 20px 150px;">
            <div id="pendingRequests"></div>
            <p style="font-size: 11px; font-weight: 800; opacity: 0.4; margin-bottom: 12px;">MEMBERS</p>
            <div id="allUsers"></div>
        </div>
    </div>

    <div id="settings" class="screen">
        <div class="header"><h2>Settings</h2></div>
        <div style="padding: 20px; overflow-y: auto; flex:1; padding-bottom: 150px;">
            <div style="text-align: center; margin-bottom: 25px;">
                <div style="position:relative; width:100%; height:120px; border-radius:15px; background:#333; overflow:hidden; margin-bottom:10px">
                    <img id="myBanner" style="width:100%; height:100%; object-fit:cover;">
                    <button onclick="document.getElementById('bannerInp').click()" style="position:absolute; bottom:5px; right:5px; font-size:10px; padding:5px" class="sec-btn">Edit Banner</button>
                </div>
                <img id="myPFP" class="pfp" style="width:80px; height:80px; border: 4px solid var(--bg); margin-top:-50px; position:relative; z-index:2">
                <button onclick="document.getElementById('pfpInp').click()" class="sec-btn" style="display:block; margin: 5px auto; font-size:12px">Update Photo</button>
                <input type="file" id="pfpInp" style="display:none" accept="image/*" onchange="uploadFile(this, 'pfp')">
                <input type="file" id="bannerInp" style="display:none" accept="image/*" onchange="uploadFile(this, 'banner')">
            </div>
            
            <input type="text" id="newNameInp" placeholder="Display Name">
            <select id="themeSelect" onchange="changeTheme(this.value)">
                <option value="dark">Dark</option>
                <option value="light">Light</option>
                <option value="rumple">Rumple</option>
                <option value="midnight">Midnight</option>
            </select>
            <button onclick="updateAccount()" class="sec-btn" style="width:100%; margin-top:10px">Save Changes</button>
            <button onclick="logout()" style="margin-top: 40px; background: #333; width:100%">Log Out</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="setTab('home')" id="btn-home">🏠</div>
        <div class="nav-btn" onclick="setTab('people')" id="btn-people">🧭</div>
        <div class="nav-btn" onclick="setTab('settings')" id="btn-settings">⚙️</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, get, remove, update } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBUl-7CM3nl38AIr7MUb8fozBCikz1No7g",
        authDomain: "hostpxp.firebaseapp.com",
        databaseURL: "https://hostpxp-default-rtdb.firebaseio.com",
        projectId: "hostpxp",
        storageBucket: "hostpxp.firebasestorage.app",
        messagingSenderId: "891844604890",
        appId: "1:891844604890:web:b7bc043499d024207d86e3"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);

    let currentUser = localStorage.getItem("chatU");
    let activeChatId = null;
    let currentTab = 'home';

    // --- POPUP NOTIFICATIONS ---
    window.triggerNotif = (title, text, img = null) => {
        const p = document.getElementById("notifPopup");
        const i = document.getElementById("notifImg");
        document.getElementById("notifTitle").innerText = title;
        document.getElementById("notifText").innerText = text;
        if(img) { i.src = img; i.style.display = "block"; } else { i.style.display = "none"; }
        p.classList.add("show");
        setTimeout(() => p.classList.remove("show"), 4000);
    };

    window.closeModal = () => document.getElementById("modal").style.display="none";

    // --- PROFILE VIEW ---
    window.viewProfile = async (uid) => {
        const snap = await get(ref(db, `users/${uid}`));
        if(!snap.exists()) return;
        const u = snap.val();
        document.getElementById("confirmArea").style.display="none";
        document.getElementById("profileViewArea").style.display="block";
        document.getElementById("viewBanner").src = u.banner || "";
        document.getElementById("viewPFP").src = u.pfp || "";
        document.getElementById("viewDisplayName").innerText = u.displayName || uid;
        document.getElementById("viewHandle").innerText = "@" + uid;
        document.getElementById("modalConfirm").style.display="none";
        document.getElementById("modal").style.display="flex";
    };

    // --- AUTH ---
    window.login = async () => {
        const u = document.getElementById("userInp").value.trim().toLowerCase();
        const p = document.getElementById("passInp").value.trim();
        if(!u || !p) return;
        const snap = await get(ref(db, 'users/' + u));
        if(!snap.exists()) {
            await set(ref(db, 'users/' + u), { pass: p, displayName: u, pfp: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + u });
        } else if (snap.val().pass !== p) return alert("Wrong pass");
        currentUser = u; localStorage.setItem("chatU", u); location.reload();
    };

    // --- MEDIA HANDLING ---
    window.sendMedia = (input) => {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        const type = file.type.startsWith('video') ? 'video' : 'image';
        reader.onload = async (e) => {
            const uSnap = await get(ref(db, `users/${currentUser}`));
            const path = activeChatId.includes("_dm_") ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
            push(ref(db, path), {
                sender: currentUser,
                senderName: uSnap.val().displayName || currentUser,
                media: e.target.result,
                mediaType: type,
                pfp: uSnap.val().pfp || "",
                time: Date.now()
            });
        };
        reader.readAsDataURL(file);
    };

    window.sendText = async () => {
        const i = document.getElementById("msgInp"); if(!i.value.trim()) return;
        const uSnap = await get(ref(db, `users/${currentUser}`));
        const path = activeChatId && activeChatId.includes("_dm_") ? 'dms/' + activeChatId : 'rooms/' + activeChatId;
        push(ref(db, path), { 
            sender: currentUser, senderName: uSnap.val().displayName || currentUser,
            text: i.value, pfp: uSnap.val().pfp || "", time: Date.now() 
        });
        i.value = "";
    };

    function renderMsg(d) {
        const box = document.getElementById("chatBox");
        const isMe = d.sender === currentUser;
        const div = document.createElement("div"); div.className = `msg ${isMe ? 'me' : ''}`;
        let content = d.text ? d.text : "";
        if(d.media) {
            content = d.mediaType === 'video' 
                ? `<video src="${d.media}" controls class="media-content"></video>` 
                : `<img src="${d.media}" class="media-content" onclick="window.open('${d.media}')">`;
        }
        div.innerHTML = `<img src="${d.pfp}" class="pfp" onclick="viewProfile('${d.sender}')"><div class="bubble"><small style="display:block; font-size:9px; opacity:0.5">${d.senderName || d.sender}</small>${content}</div>`;
        box.appendChild(div); box.scrollTop = box.scrollHeight;
    }

    // --- CHAT LOGIC ---
    window.joinRoom = (n) => {
        const r = n || document.getElementById("newRoomInp").value.trim(); if(!r) return;
        activeChatId = r; document.getElementById("chatTitle").innerText = "# " + r;
        document.getElementById("chatBox").innerHTML = ""; setTab('chat');
        onChildAdded(ref(db, 'rooms/' + r), (s) => renderMsg(s.val()));
    };

    window.openDM = async (f) => {
        activeChatId = [currentUser, f].sort().join("_dm_");
        const fSnap = await get(ref(db, `users/${f}`));
        document.getElementById("chatTitle").innerText = fSnap.val()?.displayName || f; 
        document.getElementById("chatBox").innerHTML = ""; setTab('chat');
        onChildAdded(ref(db, 'dms/' + activeChatId), (s) => renderMsg(s.val()));
    };

    // --- LISTENERS ---
    function initListeners() {
        // Real-time notifications for DMs
        onValue(ref(db, `notifs/${currentUser}`), (s) => {
            s.forEach(n => {
                triggerNotif("Notification", n.val().text);
                remove(ref(db, `notifs/${currentUser}/${n.key}`));
            });
        });

        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById("allUsers"); list.innerHTML = "";
            snap.forEach(c => {
                const id = c.key; if(id === currentUser) return;
                const div = document.createElement("div"); div.className = "list-item";
                div.innerHTML = `<div onclick="viewProfile('${id}')" style="display:flex; align-items:center; gap:10px"><img src="${c.val().pfp}" class="pfp"><b>${c.val().displayName || id}</b></div> <button onclick="sendReq('${id}')" style="padding:5px 10px; font-size:10px">Add</button>`;
                list.appendChild(div);
            });
        });

        onValue(ref(db, 'friends/' + currentUser), (snap) => {
            const list = document.getElementById("friendList"); list.innerHTML = "";
            snap.forEach(c => {
                const d = document.createElement("div"); d.className = "list-item";
                d.innerHTML = `<b>${c.key}</b>`; d.onclick = () => openDM(c.key);
                list.appendChild(d);
            });
        });

        onValue(ref(db, 'requests/' + currentUser), (s) => {
            const div = document.getElementById("pendingRequests"); div.innerHTML = "";
            s.forEach(c => {
                triggerNotif("Friend Request", `${c.key} wants to be friends!`);
                const card = document.createElement("div"); card.style="background:var(--accent); padding:10px; border-radius:15px; margin-bottom:10px;";
                card.innerHTML = `${c.key} <button onclick="acceptFriend('${c.key}')" style="background:white; color:var(--accent); float:right">Accept</button>`;
                div.appendChild(card);
            });
        });
    }

    window.sendReq = (t) => { set(ref(db, `requests/${t}/${currentUser}`), true); triggerNotif("Sent", "Request sent!"); };
    window.acceptFriend = async (s) => { 
        await update(ref(db, `friends/${currentUser}`), { [s]: true }); await update(ref(db, `friends/${s}`), { [currentUser]: true }); 
        await remove(ref(db, `requests/${currentUser}/${s}`));
    };

    window.changeTheme = (t) => { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('userTheme', t); };
    window.setTab = (id) => {
        currentTab = id;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
    };

    window.logout = () => { localStorage.clear(); location.reload(); };

    if(currentUser) {
        document.getElementById("loginScreen").style.display = "none";
        initListeners();
        changeTheme(localStorage.getItem('userTheme') || 'dark');
    }
</script>
</body>
</html>
